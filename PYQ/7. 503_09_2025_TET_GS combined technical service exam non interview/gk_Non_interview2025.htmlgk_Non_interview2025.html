<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTSNI503GS/2025 – Questions 101–200 | Bilingual Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Tamil:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --border: #2c3347;
    --accent: #c9a84c;
    --accent2: #7eb8d4;
    --green: #4caf82;
    --red: #e05b5b;
    --text: #e8e4d9;
    --muted: #8a8f9e;
    --tamil: #d4a857;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(126,184,212,0.05) 0%, transparent 60%);
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .header-left p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'Noto Serif Tamil', serif;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  #scoreboard {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.85rem;
    display: flex;
    gap: 20px;
  }

  .score-item { text-align: center; }
  .score-num { font-size: 1.4rem; font-weight: 700; font-family: 'Playfair Display', serif; }
  .score-num.correct { color: var(--green); }
  .score-num.wrong { color: var(--red); }
  .score-num.total { color: var(--accent); }
  .score-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  #progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
    position: sticky;
    top: 82px;
    z-index: 99;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.3s ease;
  }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 28px;
    transition: box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .question-card.answered::before { opacity: 1; }
  .question-card.correct-card::before { background: linear-gradient(90deg, var(--green), transparent); }
  .question-card.wrong-card::before { background: linear-gradient(90deg, var(--red), transparent); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
  }

  .q-num {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .q-text-wrap { flex: 1; }

  .q-en {
    font-size: 1.02rem;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 10px;
  }

  .q-ta {
    font-family: 'Noto Serif Tamil', serif;
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--tamil);
    background: rgba(201,168,76,0.05);
    border-left: 2px solid var(--accent);
    padding: 8px 12px;
    border-radius: 0 6px 6px 0;
  }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }

  @media (max-width: 600px) {
    .options { grid-template-columns: 1fr; }
    header { padding: 16px; }
    main { padding: 20px 12px 60px; }
    .question-card { padding: 20px; }
  }

  .opt-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
    color: var(--text);
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    line-height: 1.5;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(201,168,76,0.08);
    transform: translateY(-1px);
  }

  .opt-btn:disabled { cursor: default; }

  .opt-btn.correct-opt {
    border-color: var(--green);
    background: rgba(76,175,130,0.12);
    color: #a8f0cc;
  }

  .opt-btn.wrong-opt {
    border-color: var(--red);
    background: rgba(224,91,91,0.1);
    color: #f0a8a8;
  }

  .opt-btn.reveal-opt {
    border-color: var(--green);
    background: rgba(76,175,130,0.08);
    color: #a8f0cc;
    opacity: 0.7;
  }

  .opt-key {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
  }

  .opt-ta {
    font-family: 'Noto Serif Tamil', serif;
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 4px;
    display: block;
  }

  .feedback {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.85rem;
    display: none;
  }

  .feedback.correct-fb {
    background: rgba(76,175,130,0.1);
    border: 1px solid rgba(76,175,130,0.3);
    color: #a8f0cc;
    display: block;
  }

  .feedback.wrong-fb {
    background: rgba(224,91,91,0.1);
    border: 1px solid rgba(224,91,91,0.3);
    color: #f0a8a8;
    display: block;
  }

  .feedback .correct-ans {
    color: var(--green);
    font-weight: 600;
  }

  #final-result {
    display: none;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 48px 32px;
    text-align: center;
    margin-top: 40px;
  }

  #final-result h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    color: var(--accent);
    margin-bottom: 12px;
  }

  #final-result .big-score {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin: 20px 0;
  }

  #final-result .grade-label {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 24px;
  }

  #final-result .restart-btn {
    background: linear-gradient(135deg, var(--accent), #a87830);
    color: #0d0f14;
    border: none;
    border-radius: 10px;
    padding: 14px 36px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    transition: opacity 0.2s;
  }

  #final-result .restart-btn:hover { opacity: 0.85; }

  .lang-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    font-size: 0.78rem;
  }

  .lang-toggle button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 7px 14px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    transition: all 0.15s;
  }

  .lang-toggle button.active {
    background: var(--accent);
    color: #0d0f14;
    font-weight: 700;
  }

  body.en-only .q-ta,
  body.en-only .opt-ta { display: none !important; }

  body.ta-only .q-en { display: none !important; }
  body.ta-only .opt-ta { display: block !important; color: var(--text) !important; font-size: 0.88rem !important; }
  body.ta-only .opt-btn > span:first-child + span:not(.opt-ta) { display: none; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>CTSNI503GS/2025 — Questions 101–200</h1>
    <p>பொது அறிவு மற்றும் திறனறிவு · Part-B & Part-C</p>
  </div>
  <div class="header-right">
    <div class="lang-toggle">
      <button onclick="setLang('both')" class="active" id="btn-both">EN+தமிழ்</button>
      <button onclick="setLang('en')" id="btn-en">EN</button>

    <div id="scoreboard">

</header>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<main id="quiz-container"></main>

<script>
const questions = [
  {
    num: 101,
    en: "Considering HIV type I and II, which statement is correct?\n(a) Infects mainly CD4+ T cells and macrophages\n(b) Lyses CD4+ T cells; breaks the macrophages persistently\n(c) Infects long lived cells, establishing reservoir for persistent infection\n(d) Infected monocytes spread to brain causing dementia",
    ta: "HIV வகை I மற்றும் II யை கருத்தில் கொண்டு பின்வரும் நான்கில் சரியானவற்றை தேர்ந்தெடுக்கவும்.",
    opts: [
      { key: "A", en: "(a), (c) and (d)", ta: "(a), (c) மற்றும் (d)" },

      { key: "C", en: "(a), (b), (c) and (d)", ta: "(a), (b), (c) மற்றும் (d)" },
      { key: "D", en: "(b), (c) and (d)", ta: "(b), (c) மற்றும் (d)" }

    ans: "C"

  {
    num: 102,
    en: "Theme for Earth Day 2020 is",
    ta: "2020 ம் ஆண்டில் பூமி தினத்தின் கருப்பொருள்",
    opts: [
      { key: "A", en: "Climate action", ta: "பருவநிலை செயல்" },
      { key: "B", en: "Protect our species", ta: "நமது உயிரினங்களைக் காத்தல்" },
      { key: "C", en: "End plastic pollution", ta: "பிளாஸ்டிக் மாசின் முடிவு" },
      { key: "D", en: "Climate literacy", ta: "பருவநிலை குறித்த கல்வியறிவு" }
    ],
    ans: "A"
  },
  {
    num: 103,
    en: "What is 3E?",
    ta: "3E என்பதன் விளக்கம் என்ன?",
    opts: [
      { key: "A", en: "Reduce, reuse, recycle", ta: "குறைத்தல், திரும்பப்பயன்படுத்துதல், மறுசுழற்சி" },
      { key: "B", en: "Energy, economy and envision", ta: "ஆற்றல், பொருளாதாரம், கற்பனை" },
      { key: "C", en: "Ergonomics, evolution and economy", ta: "பணிச்சூழலியல், மதிப்பீடு, பொருளாதாரம்" },
      { key: "D", en: "Energy, economy and environment", ta: "ஆற்றல், பொருளாதாரம், சுற்றுச்சூழல்" }
    ],
    ans: "D"
  },
  {
    num: 104,
    en: "Which of the following statements are true about tropical thorn and tropical desert type?\n(i) These are associated with semi-deserts and deserts\n(ii) These are associated with the coastal region of Tamil Nadu and Andhrapradesh\n(iii) These are found in the inner Himalayas",
    ta: "வெப்பமண்டல முள் மற்றும் வெப்பமண்டல பாலைவன வகைகளைப் பற்றி பின்வரும் கூற்றுகளில் எது உண்மை?",
    opts: [
      { key: "A", en: "(i) only", ta: "(i) மட்டும்" },
      { key: "B", en: "(i) and (iii) only", ta: "(i) மற்றும் (iii) மட்டும்" },
      { key: "C", en: "(i) and (ii) only", ta: "(i) மற்றும் (ii) மட்டும்" },
      { key: "D", en: "(ii) and (iii) only", ta: "(ii) மற்றும் (iii) மட்டும்" }
    ],
    ans: "A"
  },
  {
    num: 105,
    en: "Match the Padma Shri Awardees, 2025 with their respective field:\n(a) Purisai Kannappa Sambandan – (b) R. Ashwin – (c) Seeni Viswanathan – (d) R.G. Chandramogan",
    ta: "2025 ம் ஆண்டிற்கான பத்ம ஸ்ரீ விருது பெற்றவர்களை அவர்களுடைய துறையோடு சரியாக பொருத்தவும்.",
    opts: [
      { key: "A", en: "a-1, b-3, c-2, d-4", ta: "a-1, b-3, c-2, d-4" },
      { key: "B", en: "a-2, b-1, c-3, d-4", ta: "a-2, b-1, c-3, d-4" },

    opts: [
      { key: "A", en: "(i) only", ta: "(i) மட்டும்" },
      { key: "B", en: "(i) and (ii) only", ta: "(i) மற்றும் (ii) மட்டும்" },
      { key: "C", en: "(iii) only", ta: "(iii) மட்டும்" },
      { key: "D", en: "(i) and (iii) only", ta: "(i) மற்றும் (iii) மட்டும்" }
    ],
    ans: "B"
  },
  {
    num: 107,
    en: "(i) Shambhu is another title of this god.\n(ii) Vedic god Rudra is identified with him.\nWhich god is described in the above statements?",

      { key: "B", en: "Muruga", ta: "முருகன்" },

      { key: "D", en: "Vishnu", ta: "விஷ்ணு" }

    ans: "C"

  {
    num: 108,
    en: "Nizam Shahi kingdom of Ahmadnagar was founded by",
    ta: "அகமது நகரின் நிஜாம் ஷாஹி அரசினைத் தோற்றுவித்தவர்",
    opts: [
      { key: "A", en: "Hasan Shah", ta: "ஹஸன் ஷா" },

  {
    num: 109,
    en: "Match the following:\n(a) Abolition of Jizya – (b) Abolition of Pilgrimage Tax – (c) Abolition of Enslaving war prisoner – (d) Fall of Bairam Khan",
    ta: "பொருத்துக: (a) ஜிஸியாவை ஒழித்தல் – (b) புனிதப் பயண வரியை ஒழித்தல் – (c) போர்க் கைதிகளை அடிமைகளாக வைத்திருத்தலை ஒழித்தல் – (d) பைராம் கான் வீழ்க்சி",

      { key: "B", en: "a-4, b-1, c-3, d-2", ta: "a-4, b-1, c-3, d-2" },
      { key: "C", en: "a-1, b-2, c-3, d-4", ta: "a-1, b-2, c-3, d-4" },
      { key: "D", en: "a-3, b-4, c-2, d-1", ta: "a-3, b-4, c-2, d-1" }
    ],
    ans: "A"
  },
  {
    num: 110,
    en: "Assertion [A]: Human Right is a Legal Right.\nReason [R]: While Human Being have rights, the State has a corresponding duty to protect the rights.",
    ta: "கூற்று [A]: மனித உரிமைகள் என்பது சட்ட உரிமைகள் ஆகும். காரணம் [R]: மனித உயிர்கள் உரிமைகள் கொண்டிருக்கும் பொழுது, அரசு, அதற்குரிய உரிமைகளை பாதுகாக்க வேண்டிய கடமைகளை கொண்டிருக்கிறது.",
    opts: [
      { key: "A", en: "[A] and [R] are correct; [R] is the correct explanation of [A]", ta: "[A] மற்றும் [R] இரண்டும் சரி; [R] என்பது [A]க்கு சரியான விளக்கம்" },
      { key: "B", en: "[A] and [R] are correct; [R] is not correct explanation of [A]", ta: "[A] மற்றும் [R] இரண்டும் சரி; [R] என்பது [A]க்கு சரியான விளக்கமல்ல" },
      { key: "C", en: "[A] is true; [R] is false", ta: "[A] என்பது சரி [R] என்பது தவறு" },
      { key: "D", en: "[R] is true; [A] is false", ta: "[R] என்பது சரி [A] என்பது தவறு" }
    ],
    ans: "A"
  },
  {

let scores = { correct: 0, wrong: 0, attempted: 0 };

function setLang(lang) {
  document.body.classList.remove('en-only', 'ta-only');
  ['btn-both','btn-en','btn-ta'].forEach(id => document.getElementById(id).classList.remove('active'));
  if (lang === 'en') { document.body.classList.add('en-only'); document.getElementById('btn-en').classList.add('active'); }
  else if (lang === 'ta') { document.body.classList.add('ta-only'); document.getElementById('btn-ta').classList.add('active'); }
  else { document.getElementById('btn-both').classList.add('active'); }
}

function updateScoreboard() {
  document.getElementById('sc-correct').textContent = scores.correct;
  document.getElementById('sc-wrong').textContent = scores.wrong;
  document.getElementById('sc-total').textContent = scores.attempted + '/100';
  document.getElementById('progress-bar').style.width = (scores.attempted) + '%';
  if (scores.attempted === 100) showFinalResult();
}

function handleAnswer(qIndex, selectedKey, correctKey, cardEl) {
  if (cardEl.dataset.answered) return;
  cardEl.dataset.answered = '1';

  const buttons = cardEl.querySelectorAll('.opt-btn');
  buttons.forEach(btn => {
    btn.disabled = true;
    const k = btn.dataset.key;
    if (k === correctKey) btn.classList.add('reveal-opt');
    if (k === selectedKey && selectedKey !== correctKey) btn.classList.add('wrong-opt');
    if (k === selectedKey && selectedKey === correctKey) btn.classList.add('correct-opt');
  });

  const feedback = cardEl.querySelector('.feedback');
  if (selectedKey === correctKey) {
    scores.correct++;
    cardEl.classList.add('answered', 'correct-card');
    feedback.textContent = '✓ Correct! சரியான விடை!';
    feedback.classList.add('correct-fb');
  } else {
    scores.wrong++;
    cardEl.classList.add('answered', 'wrong-card');
    const correctOpt = questions[qIndex].opts.find(o => o.key === correctKey);
    feedback.innerHTML = `✗ Wrong. Correct answer: <span class="correct-ans">(${correctKey}) ${correctOpt.en}</span>`;
    feedback.classList.add('wrong-fb');
  }

  scores.attempted++;
  updateScoreboard();
}

function renderQuiz() {
  const container = document.getElementById('quiz-container');
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q' + q.num;

    const optsHtml = q.opts.map(opt => `
      <button class="opt-btn" data-key="${opt.key}" onclick="handleAnswer(${i}, '${opt.key}', '${q.ans}', document.getElementById('q${q.num}'))">
        <span class="opt-key">${opt.key}.</span>
        <span>${opt.en}<span class="opt-ta">${opt.ta}</span></span>
      </button>
    `).join('');

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">Q.${q.num}</div>
        <div class="q-text-wrap">
          <div class="q-en">${q.en.replace(/\n/g,'<br>')}</div>
          <div class="q-ta">${q.ta}</div>
        </div>
      </div>
      <div class="options">${optsHtml}</div>
      <div class="feedback"></div>
    `;
    container.appendChild(card);
  });
}

function showFinalResult() {
  const pct = Math.round((scores.correct / 100) * 100);
  let grade = pct >= 80 ? '🏆 Excellent!' : pct >= 60 ? '👍 Good' : pct >= 40 ? '📚 Keep Studying' : '💪 Try Again';
  const div = document.getElementById('final-result');
  div.style.display = 'block';
  div.innerHTML = `
    <h2>Quiz Complete! · வினாடி வினா முடிந்தது!</h2>
    <div class="big-score">${scores.correct}/100</div>
    <div class="grade-label">${grade} · ${pct}% Score</div>
    <p style="color:var(--muted);margin-bottom:24px">Correct: ${scores.correct} &nbsp;|&nbsp; Wrong: ${scores.wrong}</p>
    <button class="restart-btn" onclick="location.reload()">Restart Quiz · மீண்டும் தொடங்கு</button>
  `;
  div.scrollIntoView({ behavior: 'smooth' });
}

renderQuiz();
const finalDiv = document.createElement('div');
finalDiv.id = 'final-result';
document.getElementById('quiz-container').appendChild(finalDiv);
</script>
