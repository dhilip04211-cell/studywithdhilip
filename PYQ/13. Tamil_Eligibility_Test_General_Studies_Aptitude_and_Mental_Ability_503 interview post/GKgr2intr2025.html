<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TET General Studies Quiz – Q101 to Q200</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f13;--card:#1a1a24;--card2:#22222f;--border:#2e2e42;
    --accent:#6c63ff;--accent2:#ff6584;--green:#22c55e;--red:#ef4444;
    --text:#e2e2f0;--muted:#888;--shadow:0 4px 20px rgba(0,0,0,.4);
    --radius:14px;
  }
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:0 0 60px}
  header{background:linear-gradient(135deg,#1a1240,#2a1850);padding:28px 20px 22px;text-align:center;border-bottom:2px solid var(--accent)}
  header h1{font-size:1.5rem;color:#fff;letter-spacing:.5px}
  header p{color:#aaa;font-size:.85rem;margin-top:6px}
  .meta-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:var(--card2);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
  .meta-bar span{font-size:.82rem;color:var(--muted)}
  .meta-bar strong{color:var(--text)}
  #progress-wrap{padding:10px 20px 0}
  #prog-bar-bg{background:var(--border);border-radius:99px;height:7px;overflow:hidden}
  #prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .4s}
  #prog-label{font-size:.78rem;color:var(--muted);margin-top:4px}
  .container{max-width:820px;margin:0 auto;padding:16px}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .3s}
  .q-card.answered{border-color:#444}
  .q-header{background:var(--card2);padding:14px 18px 10px;display:flex;gap:10px;align-items:flex-start}
  .q-num{background:var(--accent);color:#fff;font-size:.75rem;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap;margin-top:2px}
  .q-text{flex:1}
  .q-text .en{font-size:.95rem;line-height:1.6;color:var(--text)}
  .q-text .ta{font-size:.88rem;line-height:1.6;color:#aaa;margin-top:5px}
  .options{padding:12px 18px 16px;display:grid;gap:8px}
  .opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all .2s;background:transparent}
  .opt:hover{border-color:var(--accent);background:rgba(108,99,255,.08)}
  .opt.selected{border-color:var(--accent);background:rgba(108,99,255,.12)}
  .opt.correct{border-color:var(--green)!important;background:rgba(34,197,94,.12)!important}
  .opt.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.12)!important}
  .opt-letter{min-width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid var(--border);font-size:.78rem;font-weight:700;color:var(--muted);margin-top:1px}
  .opt.selected .opt-letter{border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,.15)}
  .opt.correct .opt-letter{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.15)}
  .opt.wrong .opt-letter{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.15)}
  .opt-body .en{font-size:.9rem;color:var(--text)}
  .opt-body .ta{font-size:.82rem;color:#888;margin-top:2px}
  .feedback{padding:0 18px 14px;font-size:.85rem;display:none}
  .feedback .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-weight:600}
  .feedback .correct-badge{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
  .feedback .wrong-badge{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
  .nav-bar{position:sticky;bottom:0;background:rgba(15,15,19,.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .nav-bar button{padding:9px 22px;border-radius:99px;font-size:.88rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
  #prev-btn{background:var(--card2);color:var(--text)}
  #prev-btn:hover{background:var(--border)}
  #next-btn{background:linear-gradient(135deg,var(--accent),#9b5cff);color:#fff}
  #next-btn:hover{opacity:.9;transform:translateY(-1px)}
  #submit-btn{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;padding:9px 28px;border-radius:99px;font-size:.9rem;font-weight:700;cursor:pointer;border:none;display:none}
  #submit-btn:hover{opacity:.9}
  #q-counter{font-size:.82rem;color:var(--muted)}
  /* RESULT PANEL */
  #result-panel{display:none;max-width:620px;margin:40px auto;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 28px;text-align:center;box-shadow:var(--shadow)}
  #result-panel h2{font-size:2rem;color:#fff;margin-bottom:6px}
  #result-panel .score-big{font-size:4rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:16px 0}
  .score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
  .score-box{background:var(--card2);border-radius:12px;padding:14px 8px}
  .score-box .val{font-size:1.6rem;font-weight:700}
  .score-box .lbl{font-size:.75rem;color:var(--muted);margin-top:4px}
  .score-box.g .val{color:var(--green)}
  .score-box.r .val{color:var(--red)}
  .score-box.b .val{color:#60a5fa}
  .grade-badge{display:inline-block;padding:6px 20px;border-radius:99px;font-size:1rem;font-weight:700;margin:10px 0}
  #restart-btn{margin-top:18px;padding:12px 32px;background:linear-gradient(135deg,var(--accent),#9b5cff);color:#fff;border:none;border-radius:99px;font-size:1rem;font-weight:700;cursor:pointer}
  #restart-btn:hover{opacity:.9}
  .single-q{display:none}
  .single-q.active{display:block}
  @media(max-width:600px){
    .q-text .en{font-size:.88rem}
    .score-big{font-size:3rem}
    .score-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>

<header>
  <h1>🎓 Tamil Eligibility Test – General Studies</h1>
  <p>Part-B • Questions 101–200 • Bilingual (English / தமிழ்)</p>
</header>

<div class="meta-bar">
  <span>மொத்த வினாக்கள் / Total Questions: <strong>100</strong></span>
  <span>மொத்த மதிப்பெண்கள் / Total Marks: <strong>150</strong></span>
  <span>Dark Mode 🌙</span>
</div>

<div id="progress-wrap">
  <div id="prog-bar-bg"><div id="prog-bar"></div></div>
  <div id="prog-label">0 / 100 answered</div>
</div>

<div class="container" id="quiz-area"></div>

<div class="nav-bar">
  <button id="prev-btn" onclick="navigate(-1)">← Prev</button>
  <span id="q-counter">Q 1 / 100</span>
  <button id="next-btn" onclick="navigate(1)">Next →</button>
  <button id="submit-btn" onclick="submitQuiz()">Submit ✔</button>
</div>

<div id="result-panel">
  <h2>📊 Quiz Result</h2>
  <div class="score-big" id="res-percent">0%</div>
  <div class="score-grid">
    <div class="score-box g"><div class="val" id="res-correct">0</div><div class="lbl">✅ Correct</div></div>
    <div class="score-box r"><div class="val" id="res-wrong">0</div><div class="lbl">❌ Wrong</div></div>
    <div class="score-box b"><div class="val" id="res-skip">0</div><div class="lbl">⬜ Skipped</div></div>
  </div>
  <div id="res-grade" class="grade-badge"></div>
  <br>
  <button id="restart-btn" onclick="restartQuiz()">🔄 Restart Quiz</button>
</div>

<script>
const questions = [
  {
    n:101, en:"Which of the following statements are true about the functions of ecosystem?",
    ta:"சுற்றுச்சூழலின் செயல்பாடுகளைப் பற்றிய பின்வரும் கூற்றுகளில் எது உண்மை?",
    opts:[
      {en:"(i) only / (i) மட்டும்",ta:""},
      {en:"(i) and (iii) only / (i) மற்றும் (iii) மட்டும்",ta:""},
      {en:"(i) and (ii) only / (i) மற்றும் (ii) மட்டும்",ta:""},
      {en:"(ii) and (iii) only / (ii) மற்றும் (iii) மட்டும்",ta:""}
    ], ans:2
  },
  {
    n:102, en:"Choose the correct answer: Assertion: Haemoglobin contains Iron. Reason: Iron deficiency leads to anemia.",
    ta:"சரியான விடையை தேர்ந்தெடு: கூற்று: ஹீமோகுளோபினில் இரும்பு உள்ளன. காரணம்: இரும்புச்சத்து குறைவினால் இரத்த சோகை உருவாகின்றது.",
    opts:[
      {en:"(i) is correct",ta:"(i) சரி"},
      {en:"(ii) is correct — Both A & R true, R not correct explanation",ta:"(ii) சரி"},
      {en:"(iii) is correct — Assertion true, Reason false",ta:"(iii) சரி"},
      {en:"(iv) is correct — Both false",ta:"(iv) சரி"}
    ], ans:1
  },
  {
    n:103, en:"Find out the correct statements from the following about jumping genes (plasmids, retroviruses).",
    ta:"சரியான சொற்றொடர்/சொற்றொடர்களை கண்டறிக (பாக்டீரியோஃபேஜ்கள், ரெட்ரோவைரஸ்கள் பற்றி).",
    opts:[
      {en:"(i) alone is correct",ta:"(i) மட்டுமே சரி"},
      {en:"(i) and (ii) are correct",ta:"(i) மற்றும் (ii) இரண்டும் சரி"},
      {en:"(i), (ii) and (iv) are correct",ta:"(i), (ii) மற்றும் (iv) சரியானவை"},
      {en:"(i), (ii), (iii) and (iv) are correct",ta:"(i), (ii), (iii) மற்றும் (iv) சரியானவை"}
    ], ans:2
  },
  {
    n:104, en:"Assertion [A]: Aqueous solution of hydrofluoric acid is weak acid. Reason [R]: The dissociation energy of H-F bond in HF molecule is high.",
    ta:"கூற்று [A]: நீர்த்த ஹைட்ரோ புளோரிக் அமில கரைசலானது ஒரு வீரியம் குறைந்த அமிலம். காரணம் [R]: H-F பிணைப்பின் பிரிகை ஆற்றல் அதிகம்.",
    opts:[
      {en:"[A] is true, [R] is false",ta:"[A] சரி, ஆனால் [R] தவறு"},
      {en:"Both [A] and [R] are true, but [R] is not correct explanation of [A]",ta:"[A] மற்றும் [R] இரண்டும் சரி, ஆனால் [R] என்பது [A]விற்கு சரியான விளக்கமில்லை"},
      {en:"Both [A] and [R] are false",ta:"[A] மற்றும் [R] இரண்டும் தவறு"},
      {en:"Both [A] and [R] are true, [R] is the correct explanation of [A]",ta:"[A] மற்றும் [R] இரண்டும் சரி, மேலும் [R] என்பது [A]விற்கு சரியான விளக்கமாகும்"}
    ], ans:3
  },
  {
    n:105, en:"A circular road runs round a circular ground. If the difference between the circumference of the outer circle and inner circle is 66 metres, the width of the road is",
    ta:"ஒரு வட்டச் சாலை ஒரு வட்டமான மைதானத்தைச் சுற்றிச் செல்கிறது. வெளி வட்டம் மற்றும் உள் வட்டத்தின் சுற்றளவுக்கு இடையே உள்ள வித்தியாசம் 66 மீட்டர் எனில் சாலையின் அகலத்தை கண்டறிக.",
    opts:[
      {en:"5.25 m / 5.25 மீ",ta:""},
      {en:"7 m / 7 மீ",ta:""},
      {en:"10.5 m / 10.5 மீ",ta:""},
      {en:"21 m / 21 மீ",ta:""}
    ], ans:2
  },
  {
    n:106, en:"The greenhouse effect in the earth's environment takes place because:",
    ta:"பூமியின் மேல் பசுமைக்குடில் விளைவு எதனால் ஏற்படுகிறது?",
    opts:[
      {en:"The polar ice caps are melting / துருவ பனிக்கட்டிகள் உருகுதல்",ta:""},
      {en:"The atmosphere is transparent to IR at some wavelength and opaque to IR at other wavelengths",ta:"வளிமண்டலம் அகச்சிவப்புக் கதிர்களை குறிப்பிட்ட அலைநீளத்தில் அனுமதிப்பதும், ஒளிபுகாத்தன்மை ஒரு குறிப்பிட்ட அலைநீளத்தில் இருப்பதாலும்"},
      {en:"The atmosphere does not contain enough oxygen to block IR from the sun",ta:"சூரியனிலிருந்து வரும் அகச்சிவப்புக் கதிர்களைத் தடுக்க போதிய ஆக்சிஜன் இன்மை"},
      {en:"The ozone hole is growing, letting in more IR",ta:"ஓசோன் துளை வளர்ந்து வருகிறதினால் அகச்சிவப்புக் கதிர்களை அனுமதிக்கிறது."}
    ], ans:1
  },
  {
    n:107, en:"From the following, identify the effects of 'climate change'.",
    ta:"பின்வருவனவற்றிலிருந்து 'கால நிலை மாற்றத்தின்' விளைவை அடையாளம் காணவும்.",
    opts:[
      {en:"(i) and (ii) / (i) மற்றும் (ii)",ta:""},
      {en:"(i) and (iii) / (i) மற்றும் (iii)",ta:""},
      {en:"(ii) and (iii) / (ii) மற்றும் (iii)",ta:""},
      {en:"(i) and (iv) / (i) மற்றும் (iv)",ta:""}
    ], ans:1
  },
  {
    n:108, en:"On the ozone layer, the chlorofluoro hydro carbon has continuing their effect as",
    ta:"ஓசோன் மண்டலத்தின் மீது குளோரோரோ புளோரோரோ ஹைட்ரோ கார்பன் தொடர்ந்து ஏற்படுத்தும் விளைவு என்ன?",
    opts:[
      {en:"Reactions use up by the Cl atoms formed by them leads to the degradation of ozone.",ta:"குளோரின் அணுக்களால் ஏற்படும் வினைகள் பயன்பாடு ஓசோனின் மண்டலத்தை வலுவிழக்கச் செய்கிறது."},
      {en:"Their efficient absorption by water vapours of the atmosphere",ta:"அதன் வலுவான கவர்ந்திழுத்தலால் நீராவியை வளிமண்டலத்தில் கவருவது."},
      {en:"In reactions, the chlorine atoms formed by them serves as catalysts leading to the degradation of ozone.",ta:"வினைகளில், குளோரின் அணுக்கள் உருவாக்க வினையூக்கியாகச் செயல்பட்டு ஓசோன் மண்டலத்தை வலுவிழக்கச் செய்கிறது."},
      {en:"They are constantly produced in increasing quantities, globally.",ta:"உலகளவில் இதன் அளவு அதிகரித்துக் கொண்டே வருகிறது."}
    ], ans:2
  },
  {
    n:109, en:"Which of the following statements are true about the Indus River System?",
    ta:"சிந்து நதி அமைப்பு பற்றி பின்வரும் கூற்றுகளில் எது உண்மை?",
    opts:[
      {en:"(i) only / (i) மட்டும்",ta:""},
      {en:"(i) and (ii) only / (i) மற்றும் (ii) மட்டும்",ta:""},
      {en:"(i) and (iii) only / (i) மற்றும் (iii) மட்டும்",ta:""},
      {en:"(ii) and (iii) only / (ii) மற்றும் (iii) மட்டும்",ta:""}
    ], ans:0
  },
  {
    n:110, en:"As per National Academy of Agricultural Sciences (NAAS) Report, ________ state of India reports high acidic soil.",
    ta:"தேசிய வேளாண் அறிவியல் அகாடமி (NAAS) அறிக்கையின்படி, ________ இந்திய மாநிலம் அதிக அமிலத்தன்மை கொண்ட மண்ணைக் கொண்டுள்ளது.",
    opts:[
      {en:"Himachal Pradesh / இமாச்சல பிரதேசம்",ta:""},
      {en:"Gujarat / குஜராத்",ta:""},
      {en:"Kerala / கேரளா",ta:""},
      {en:"Haryana / ஹரியானா",ta:""}
    ], ans:2
  },
  {
    n:111, en:"Match the following International Airports with their city of Location: (a) Veer Savarkar (b) Dr. Babasaheb Ambedkar (c) Chaudhary Charan Singh (d) Lal Bahadur Shastri",
    ta:"பின்வரும் சர்வதேச விமான நிலையங்களை அவற்றின் நகரத்துடன் பொருத்துக:",
    opts:[
      {en:"a-2, b-1, c-4, d-3",ta:""},
      {en:"a-3, b-2, c-4, d-1",ta:""},
      {en:"a-3, b-1, c-4, d-2",ta:""},
      {en:"a-2, b-4, c-1, d-3",ta:""}
    ], ans:3
  },
  {
    n:112, en:"Which of the given statement/s is/are true about the Second Khelo India Para Games 2025 (KIPG 2025)?",
    ta:"இரண்டாவது கேலோ இந்தியா பாரா விளையாட்டுப் போட்டிகள் 2025 (KIPG 2025) குறித்த பின்வரும் கூற்றுகளில் சரியானவற்றை எழுதுக.",
    opts:[
      {en:"(i) only / (i) மட்டும்",ta:""},
      {en:"(i) and (iii) only / (i) மற்றும் (iii) மட்டும்",ta:""},
      {en:"(ii) and (iii) only / (ii) மற்றும் (iii) மட்டும்",ta:""},
      {en:"(ii), (iii) and (iv) only / (ii), (iii) மற்றும் (iv) மட்டும்",ta:""}
    ], ans:3
  },

let current=0, userAnswers=new Array(questions.length).fill(-1);

function buildQuiz(){
  const area=document.getElementById('quiz-area');
  area.innerHTML='';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='single-q'+(i===0?' active':'');
    div.id='q'+i;
    div.innerHTML=`
      <div class="q-card" id="card${i}">
        <div class="q-header">
          <span class="q-num">Q${q.n}</span>
          <div class="q-text">
            <div class="en">${q.en}</div>
            ${q.ta?`<div class="ta">${q.ta}</div>`:''}
          </div>
        </div>
        <div class="options" id="opts${i}">
          ${q.opts.map((o,j)=>`
          <div class="opt" id="opt${i}_${j}" onclick="selectOpt(${i},${j})">
            <div class="opt-letter">${String.fromCharCode(65+j)}</div>
            <div class="opt-body">
              <div class="en">${o.en}</div>
              ${o.ta?`<div class="ta">${o.ta}</div>`:''}
            </div>
          </div>`).join('')}
        </div>
        <div class="feedback" id="fb${i}"></div>
      </div>`;
    area.appendChild(div);
  });
  updateUI();
}

function selectOpt(qi,oi){
  if(userAnswers[qi]!==-1) return;
  userAnswers[qi]=oi;
  const q=questions[qi];
  const opts=document.getElementById('opts'+qi).querySelectorAll('.opt');
  opts.forEach((el,j)=>{
    if(j===q.ans) el.classList.add('correct');
    else if(j===oi && oi!==q.ans) el.classList.add('wrong');
  });
  const fb=document.getElementById('fb'+qi);
  fb.style.display='block';
  if(oi===q.ans){
    fb.innerHTML='<span class="badge correct-badge">✅ Correct! / சரியான விடை!</span>';
  } else {
    fb.innerHTML=`<span class="badge wrong-badge">❌ Wrong. Correct answer: ${String.fromCharCode(65+q.ans)} / தவறு. சரியான விடை: ${String.fromCharCode(65+q.ans)}</span>`;
  }
  document.getElementById('card'+qi).classList.add('answered');
  updateProgress();
  updateUI();
}

function navigate(d){
  document.getElementById('q'+current).classList.remove('active');
  current=Math.max(0,Math.min(questions.length-1,current+d));
  document.getElementById('q'+current).classList.add('active');
  updateUI();
}

function updateUI(){
  const total=questions.length;
  document.getElementById('q-counter').textContent=`Q ${current+1} / ${total}`;
  document.getElementById('prev-btn').disabled=(current===0);
  const allAnswered=userAnswers.every(a=>a!==-1);
  const isLast=(current===total-1);
  document.getElementById('next-btn').style.display=isLast?'none':'inline-block';
  document.getElementById('submit-btn').style.display=(isLast||allAnswered)?'inline-block':'none';
  updateProgress();
}

function updateProgress(){
  const answered=userAnswers.filter(a=>a!==-1).length;
  const pct=Math.round(answered/questions.length*100);
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`${answered} / ${questions.length} answered`;
}

function submitQuiz(){
  const correct=userAnswers.filter((a,i)=>a===questions[i].ans).length;
  const wrong=userAnswers.filter((a,i)=>a!==-1&&a!==questions[i].ans).length;
  const skip=userAnswers.filter(a=>a===-1).length;
  const pct=Math.round(correct/questions.length*100);
  document.getElementById('quiz-area').style.display='none';
  document.querySelector('.nav-bar').style.display='none';
  document.getElementById('progress-wrap').style.display='none';
  const rp=document.getElementById('result-panel');
  rp.style.display='block';
  document.getElementById('res-percent').textContent=pct+'%';
  document.getElementById('res-correct').textContent=correct;
  document.getElementById('res-wrong').textContent=wrong;
  document.getElementById('res-skip').textContent=skip;
  let grade='',color='';
  if(pct>=90){grade='🏆 Excellent! / சிறப்பு!';color='#22c55e';}
  else if(pct>=75){grade='⭐ Good / நல்லது';color='#60a5fa';}
  else if(pct>=50){grade='📘 Average / சராசரி';color='#f59e0b';}
  else{grade='📖 Need Practice / மேலும் படிக்க வேண்டும்';color='#ef4444';}
  const gb=document.getElementById('res-grade');
  gb.textContent=grade;
  gb.style.background=color+'22';
  gb.style.color=color;
  gb.style.border=`1px solid ${color}55`;
}

function restartQuiz(){
  userAnswers=new Array(questions.length).fill(-1);
  current=0;
  document.getElementById('result-panel').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  document.querySelector('.nav-bar').style.display='flex';
  document.getElementById('progress-wrap').style.display='block';
  buildQuiz();
}

buildQuiz();
