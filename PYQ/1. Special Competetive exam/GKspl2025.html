<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNPSC General Studies Quiz | Questions 101–200</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=Spectral:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f13;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #f0b429;
    --accent2: #4fa3e0;
    --correct: #3ecf8e;
    --wrong: #e05c5c;
    --text: #e8eaf0;
    --text-muted: #7a8099;
    --text-tamil: #c8cfe8;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Spectral', Georgia, serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1224 0%, #141e35 60%, #0d1224 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  header h1 {
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
  }
  header p.subtitle {
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .progress-bar-wrap {
    margin: 14px auto 0;
    max-width: 520px;
    background: var(--border);
    height: 5px;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 6px;
    text-align: center;
  }

  /* QUIZ WRAPPER */
  .quiz-container {
    max-width: 780px;
    margin: 0 auto;
    padding: 28px 16px 0;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 24px 18px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
    animation: slideIn 0.3s ease;
    display: none;
  }
  .question-card.active { display: block; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .q-text-en {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .q-text-ta {
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text-tamil);
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  /* OPTIONS */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  @media (max-width: 560px) { .options-grid { grid-template-columns: 1fr; } }

  .option-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s ease;
    position: relative;
    outline: none;
    color: var(--text);
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: #1e2540;
    transform: translateY(-1px);
  }
  .opt-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent2);
    display: block;
    margin-bottom: 4px;
    letter-spacing: 0.06em;
  }
  .opt-en {
    font-size: 0.88rem;
    line-height: 1.5;
    color: var(--text);
    display: block;
  }
  .opt-ta {
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 0.8rem;
    line-height: 1.6;
    color: var(--text-tamil);
    display: block;
    margin-top: 3px;
  }

  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(62, 207, 142, 0.1);
  }
  .option-btn.correct .opt-label { color: var(--correct); }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(224, 92, 92, 0.1);
  }
  .option-btn.wrong .opt-label { color: var(--wrong); }
  .option-btn:disabled { cursor: default; transform: none; }

  /* FEEDBACK */
  .feedback {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 7px;
    font-size: 0.85rem;
    display: none;
    font-family: 'IBM Plex Mono', monospace;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(62,207,142,0.12); color: var(--correct); border: 1px solid rgba(62,207,142,0.3); }
  .feedback.wrong-fb   { background: rgba(224,92,92,0.12);  color: var(--wrong);   border: 1px solid rgba(224,92,92,0.3); }

  /* NAV BUTTONS */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    gap: 10px;
  }
  .nav-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    padding: 10px 22px;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .nav-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .nav-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .nav-btn.primary:hover { background: #f7c948; }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* RESULTS */
  #result-screen {
    display: none;
    text-align: center;
    padding: 48px 24px;
    animation: slideIn 0.5s ease;
  }
  #result-screen.show { display: block; }
  .result-score {
    font-size: 5rem;
    font-weight: 700;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1;
  }
  .result-denom {
    font-size: 1.5rem;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
  }
  .result-title {
    font-size: 1.5rem;
    margin: 16px 0 8px;
    color: var(--text);
  }
  .result-msg {
    font-size: 0.95rem;
    color: var(--text-muted);
    max-width: 420px;
    margin: 0 auto 28px;
    line-height: 1.7;
    font-family: 'Noto Sans Tamil', sans-serif;
  }
  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    max-width: 440px;
    margin: 0 auto 32px;
  }
  .result-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 8px;
  }
  .stat-val { font-size: 1.6rem; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
  .stat-lbl { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.07em; text-transform: uppercase; }
  .restart-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px 40px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: background 0.15s;
  }
  .restart-btn:hover { background: #f7c948; }

  /* SIDEBAR DOTS */
  .dot-nav {
    position: fixed;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 5px;
    z-index: 200;
  }
  @media (max-width: 900px) { .dot-nav { display: none; } }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }
  .dot.answered { background: var(--accent2); }
  .dot.current  { background: var(--accent); transform: scale(1.4); }
  .dot.correct-dot { background: var(--correct); }
  .dot.wrong-dot  { background: var(--wrong); }
</style>
</head>

<header>
  <h1>TNPSC General Studies &amp; Tamil Eligibility Quiz</h1>
  <p class="subtitle">பொது அறிவு மற்றும் தமிழ் தகுதித் தேர்வு — கேள்விகள் 101–200</p>

let current = 0;
let answers = new Array(questions.length).fill(null);
let score = 0;

function buildQuiz(){
  const container = document.getElementById('quiz-container');
  const dotNav = document.getElementById('dot-nav');
  container.innerHTML = '';
  dotNav.innerHTML = '';

  questions.forEach((q, i) => {
    // Card
    const card = document.createElement('div');
    card.className = 'question-card' + (i === 0 ? ' active' : '');
    card.id = `q${i}`;

    card.innerHTML = `
      <div class="q-number">Q ${101+i} · General Studies</div>
      <div class="q-text-en">${q.en}</div>
      <div class="q-text-ta">${q.ta}</div>
      <div class="options-grid" id="opts${i}">
        ${q.opts.map((o,j)=>`
          <button class="option-btn" id="opt${i}_${j}" onclick="selectAnswer(${i},${j})">
            <span class="opt-label">${['A','B','C','D'][j]}</span>
            <span class="opt-en">${o.en}</span>
            <span class="opt-ta">${o.ta}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="fb${i}"></div>
      <div class="nav-row">
        <button class="nav-btn" onclick="navigate(${i-1})" ${i===0?'disabled':''}>← Prev</button>
        <span style="font-family:'IBM Plex Mono';font-size:0.75rem;color:var(--text-muted)">${i+1} / ${questions.length}</span>
        ${i < questions.length-1
          ? `<button class="nav-btn primary" onclick="navigate(${i+1})">Next →</button>`
          : `<button class="nav-btn primary" onclick="showResults()">Submit ✓</button>`}
      </div>
    `;
    container.appendChild(card);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot' + (i===0?' current':'');
    dot.id = `dot${i}`;
    dot.title = `Q${101+i}`;
    dot.onclick = () => navigate(i);
    dotNav.appendChild(dot);
  });

  updateProgress();
}

function selectAnswer(qi, ai){
  if(answers[qi] !== null) return;
  answers[qi] = ai;

  const opts = document.querySelectorAll(`#opts${qi} .option-btn`);
  opts.forEach(btn => btn.disabled = true);

  const correct = questions[qi].ans;
  const fb = document.getElementById(`fb${qi}`);

  opts[correct].classList.add('correct');
  if(ai !== correct){
    opts[ai].classList.add('wrong');
    fb.textContent = `✗ Wrong — Correct answer: ${['A','B','C','D'][correct]}`;
    fb.className = 'feedback show wrong-fb';
    document.getElementById(`dot${qi}`).classList.add('wrong-dot');
  } else {
    score++;
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback show correct-fb';
    document.getElementById(`dot${qi}`).classList.add('correct-dot');
  }

  updateProgress();
}

function navigate(i){
  if(i < 0 || i >= questions.length) return;
  document.getElementById(`q${current}`).classList.remove('active');
  document.getElementById(`dot${current}`).classList.remove('current');
  current = i;
  document.getElementById(`q${current}`).classList.add('active');
  document.getElementById(`dot${current}`).classList.add('current');
  document.getElementById(`q${current}`).scrollIntoView({behavior:'smooth',block:'start'});
}

function updateProgress(){
  const answered = answers.filter(a => a !== null).length;
  const pct = (answered / questions.length) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${answered} / ${questions.length} answered`;
}

function showResults(){
  const unanswered = answers.filter(a => a === null).length;
  if(unanswered > 0){
    if(!confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) return;
  }
  document.getElementById('quiz-container').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const correct = answers.filter((a,i)=> a !== null && a === questions[i].ans).length;
  const wrong   = answers.filter((a,i)=> a !== null && a !== questions[i].ans).length;
  const pct = Math.round((correct/questions.length)*100);

  document.getElementById('res-score').textContent = correct;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-pct').textContent = pct+'%';

  let title, msg;
  if(pct >= 85)      { title='Excellent! 🏆'; msg='அருமை! நீங்கள் மிகச் சிறப்பாக செய்தீர்கள். Keep it up!'; }
  else if(pct >= 70) { title='Good Job! 👍';  msg='நல்ல முயற்சி! தொடர்ந்து படிக்கவும். You are on track!'; }
  else if(pct >= 50) { title='Keep Practising 📚'; msg='இன்னும் கொஞ்சம் படிக்கவும். Practice makes perfect!'; }
  else               { title='More Effort Needed 💪'; msg='கவலைப்படாதீர்கள். மீண்டும் முயற்சிக்கவும்!'; }

  document.getElementById('res-title').textContent = title;
  document.getElementById('res-msg').textContent = msg;
  window.scrollTo({top:0,behavior:'smooth'});
}

function restartQuiz(){
  answers = new Array(questions.length).fill(null);
  score = 0;
  current = 0;
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-container').style.display = 'block';
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

buildQuiz();
</script>
</body>
</html>
