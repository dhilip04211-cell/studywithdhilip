  .green { color: #4ade80; }
  .red { color: #f87171; }
  .yellow { color: #fbbf24; }

let cur = 0;
let answers = new Array(Q.length).fill(null);
let revealed = new Array(Q.length).fill(false);

function startQuiz() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQ();
}

function renderQ() {
  const q = Q[cur];
  const total = Q.length;
  const pct = ((cur) / total) * 100;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('plabel').textContent = `Question ${cur + 1} of ${total}`;

  const optLabels = ['A', 'B', 'C', 'D'];
  const opts = [q.a, q.b, q.c, q.d];
  const userAns = answers[cur];
  const isRevealed = revealed[cur];

  let optHtml = '';
  opts.forEach((txt, i) => {
    let cls = 'opt-btn';
    const ltr = optLabels[i];
    if (isRevealed) {
      if (ltr === q.ans) cls += ' correct';
      else if (userAns === ltr) cls += ' wrong';
    } else if (userAns === ltr) {
      cls += ' selected';
    }
    const disabled = isRevealed ? 'disabled' : '';
    optHtml += `<button class="${cls}" onclick="selectOpt('${ltr}')" ${disabled}>
      <span class="lbl">${ltr}</span><span>${txt}</span>
    </button>`;
  });

  let feedbackHtml = '';
  if (isRevealed) {
    const correct = userAns === q.ans;
    const cls = correct ? 'feedback show ok' : 'feedback show bad';
    const icon = correct ? '✅' : '❌';
    const msg = correct ? 'Correct!' : `Wrong! Correct answer: <strong>(${q.ans}) ${opts[optLabels.indexOf(q.ans)]}</strong>`;
    feedbackHtml = `<div class="${cls}">${icon} ${msg}</div>`;
  }

  document.getElementById('qarea').innerHTML = `
    <div class="q-card">
      <div class="q-num">Question ${cur + 1} · Part-A General Studies</div>
      <div class="q-text" style="white-space:pre-line">${q.q}</div>
    </div>
    <div class="options">${optHtml}</div>
    ${feedbackHtml}
  `;

  // Nav buttons
  const isLast = cur === Q.length - 1;
  document.getElementById('prevBtn').style.display = cur === 0 ? 'none' : 'block';
  const nextBtn = document.getElementById('nextBtn');
  if (isLast) {
    nextBtn.textContent = 'Submit Quiz ✓';
    nextBtn.className = 'nav-btn submit-btn';
    nextBtn.onclick = showResult;
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'nav-btn next-btn';
    nextBtn.onclick = () => navigate(1);
  }
}

function selectOpt(ltr) {
  if (revealed[cur]) return;
  answers[cur] = ltr;
  revealed[cur] = true;
  renderQ();
}

function navigate(dir) {
  cur = Math.max(0, Math.min(Q.length - 1, cur + dir));
  renderQ();
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const res = document.getElementById('result');
  res.style.display = 'block';

  let correct = 0, wrong = 0, skipped = 0;
  Q.forEach((q, i) => {
    if (answers[i] === null) skipped++;
    else if (answers[i] === q.ans) correct++;
    else wrong++;
  });

  const pct = Math.round((correct / Q.length) * 100);
  const deg = (pct / 100) * 360;
  let grade = pct >= 80 ? '🏆 Excellent!' : pct >= 60 ? '👍 Good Work!' : pct >= 40 ? '📚 Keep Studying!' : '💪 Don\'t Give Up!';
  let msg = pct >= 80 ? 'Outstanding performance! You are well prepared.' : pct >= 60 ? 'Good score! Focus on weak areas.' : pct >= 40 ? 'Keep practising. Review incorrect answers.' : 'More practice needed. Review all topics carefully.';

  let reviewHtml = '';
  Q.forEach((q, i) => {
    const ua = answers[i];
    let cls = 'review-item rev-skip';
    let ansInfo = '<span style="color:#64748b">⊘ Skipped</span>';
    if (ua !== null) {
      if (ua === q.ans) {
        cls = 'review-item rev-ok';
        ansInfo = `<span class="green">✓ Correct: (${q.ans})</span>`;
      } else {
        cls = 'review-item rev-bad';
        const opts = [q.a, q.b, q.c, q.d];
        const lbs = ['A','B','C','D'];
        const corTxt = opts[lbs.indexOf(q.ans)];
        ansInfo = `<span class="red">✗ You: (${ua})</span> &nbsp; <span class="green">✓ Correct: (${q.ans}) ${corTxt}</span>`;
      }
    }
    reviewHtml += `<div class="${cls}">
      <div class="review-qnum">Q${q.n}</div>
      <div class="review-q">${q.q.split('\n')[0]}</div>
      <div class="review-ans">${ansInfo}</div>
    </div>`;
  });

  res.innerHTML = `
    <div style="font-size:13px;color:#64748b;margin-bottom:16px;">GST2AM/2025 · Part-A General Studies</div>
    <div class="result-circle" style="--pct:${deg}deg">
      <div class="result-inner">
        <div class="result-score">${correct}</div>
        <div class="result-total">/ ${Q.length}</div>
      </div>
    </div>
    <div class="result-title">${grade}</div>
    <div class="result-msg">${msg}</div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-n green">${correct}</div><div class="stat-l">Correct</div></div>
      <div class="stat-box"><div class="stat-n red">${wrong}</div><div class="stat-l">Wrong</div></div>
      <div class="stat-box"><div class="stat-n yellow">${skipped}</div><div class="stat-l">Skipped</div></div>
      <div class="stat-box"><div class="stat-n" style="color:#818cf8">${pct}%</div><div class="stat-l">Score</div></div>
    </div>
    <div class="review-title">📋 Answer Review</div>
    ${reviewHtml}
    <button class="retry-btn" onclick="location.reload()">🔄 Try Again</button>
  `;
}
</script>
