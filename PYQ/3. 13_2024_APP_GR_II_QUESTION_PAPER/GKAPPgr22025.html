<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APPGR-II/2025 Bilingual Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}

/* SPLASH */
#splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.logo{font-size:52px;margin-bottom:10px}
.splash-title{font-size:24px;font-weight:800;background:linear-gradient(135deg,#f97316,#ef4444,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.splash-sub{font-size:13px;color:#8b949e;margin-bottom:6px}
.badge{display:inline-block;background:#161b22;border:1px solid #30363d;border-radius:20px;padding:4px 14px;font-size:12px;color:#8b949e;margin-bottom:24px}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:420px;width:100%;margin-bottom:28px}
.info-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:14px 8px;text-align:center}
.info-num{font-size:26px;font-weight:800;color:#f97316}
.info-lbl{font-size:11px;color:#8b949e;margin-top:2px}
.lang-toggle{display:flex;gap:8px;margin-bottom:20px}
.lang-btn{padding:8px 20px;border-radius:20px;border:2px solid #30363d;background:#161b22;color:#8b949e;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.lang-btn.active{border-color:#f97316;background:rgba(249,115,22,.15);color:#f97316}
.start-btn{background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;border:none;border-radius:14px;padding:15px 44px;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(249,115,22,.35);transition:transform .15s,box-shadow .15s}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(249,115,22,.45)}

/* QUIZ */
#quiz{display:none;max-width:720px;margin:0 auto;padding:16px 14px 90px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px}
.prog-wrap{flex:1;background:#161b22;border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#f97316,#ef4444,#ec4899);transition:width .4s}
.q-counter{font-size:12px;color:#8b949e;white-space:nowrap}
.lang-switch{display:flex;gap:6px}
.ls-btn{padding:4px 10px;border-radius:8px;border:1.5px solid #30363d;background:transparent;color:#8b949e;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.ls-btn.active{border-color:#f97316;color:#f97316;background:rgba(249,115,22,.1)}

.q-card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:22px 20px;margin-bottom:14px}
.q-num{font-size:11px;font-weight:700;color:#f97316;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.q-text{font-size:15px;line-height:1.65;color:#e6edf3;font-weight:500;white-space:pre-line}
.q-text-ta{font-size:15px;line-height:1.8;color:#c9d1d9;font-weight:400;margin-top:10px;padding-top:10px;border-top:1px dashed #21262d;white-space:pre-line}

.options{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.opt-btn{background:#0d1117;border:1.5px solid #30363d;border-radius:12px;padding:12px 16px;text-align:left;color:#c9d1d9;font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px}
.opt-btn:hover:not(:disabled){border-color:#f97316;background:#161b22;color:#e6edf3}
.opt-lbl{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:2px 7px;font-size:12px;font-weight:700;color:#f97316;min-width:26px;text-align:center;flex-shrink:0;margin-top:1px}
.opt-text{flex:1}
.opt-ta{font-size:12px;color:#8b949e;margin-top:2px;display:block}
.opt-btn.selected{border-color:#f97316;background:rgba(249,115,22,.1);color:#e6edf3}
.opt-btn.selected .opt-lbl{background:#f97316;color:#fff;border-color:#f97316}
.opt-btn.correct{border-color:#22c55e;background:rgba(34,197,94,.1);color:#e6edf3}
.opt-btn.correct .opt-lbl{background:#22c55e;color:#fff;border-color:#22c55e}
.opt-btn.wrong{border-color:#ef4444;background:rgba(239,68,68,.08);color:#e6edf3}
.opt-btn.wrong .opt-lbl{background:#ef4444;color:#fff;border-color:#ef4444}
.opt-btn:disabled{cursor:default}

.feedback{display:none;margin-top:10px;padding:11px 15px;border-radius:10px;font-size:14px;font-weight:600;align-items:center;gap:8px}
.feedback.show{display:flex}
.feedback.ok{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.feedback.bad{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.18)}

.nav-row{display:flex;gap:10px;margin-top:16px}
.nav-btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.prev-btn{background:#161b22;color:#8b949e;border:1.5px solid #30363d}
.prev-btn:hover{background:#21262d;color:#e6edf3}
.next-btn{background:linear-gradient(135deg,#f97316,#ef4444);color:#fff}
.next-btn:hover{opacity:.9;transform:translateY(-1px)}
.submit-btn{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}

/* RESULT */
#result{display:none;max-width:640px;margin:0 auto;padding:28px 14px 40px;text-align:center}
.score-ring{width:140px;height:140px;border-radius:50%;margin:0 auto 22px;position:relative;display:flex;align-items:center;justify-content:center}
.score-ring svg{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg)}
.score-inner{font-size:30px;font-weight:900;color:#f97316;line-height:1}
.score-lbl{font-size:12px;color:#8b949e}
.res-title{font-size:22px;font-weight:800;color:#e6edf3;margin-bottom:5px}
.res-msg{font-size:13px;color:#8b949e;margin-bottom:24px}
.stat-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.stat-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:14px 18px;min-width:90px}
.sn{font-size:24px;font-weight:800}.sl{font-size:11px;color:#8b949e}
.green{color:#4ade80}.red{color:#f87171}.orange{color:#f97316}.yellow{color:#fbbf24}
.rev-wrap{text-align:left;margin-top:4px}
.rev-hdr{font-size:15px;font-weight:700;color:#8b949e;margin-bottom:12px}
.rev-item{background:#161b22;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:4px solid transparent}
.rev-ok{border-color:#22c55e}.rev-bad{border-color:#ef4444}.rev-skip{border-color:#8b949e}
.rev-qn{font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:1px}
.rev-q{font-size:13px;color:#c9d1d9;margin:3px 0 5px;line-height:1.4}
.rev-a{font-size:12px}
.retry-btn{background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;border:none;border-radius:12px;padding:13px 36px;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo">📚</div>
  <div class="splash-title">APPGR-II / 2025</div>
  <div class="splash-sub">Part-A — General Studies, Aptitude & Mental Ability</div>
  <div class="badge">APPGR-II/2025 · Official Question Paper · Bilingual</div>
  <div class="info-grid">
    <div class="info-card"><div class="info-num">100</div><div class="info-lbl">Questions</div></div>
    <div class="info-card"><div class="info-num">2</div><div class="info-lbl">Languages</div></div>
    <div class="info-card"><div class="info-num">∞</div><div class="info-lbl">No Limit</div></div>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="splashEN" onclick="setStartLang('en')">English</button>
    <button class="lang-btn" id="splashTA" onclick="setStartLang('ta')">தமிழ்</button>
    <button class="lang-btn" id="splashBI" onclick="setStartLang('bi')">Bilingual</button>
  </div>
  <button class="start-btn" onclick="startQuiz()">தொடங்கு / Start →</button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="top-bar">
    <div class="prog-wrap"><div class="prog-fill" id="pbar"></div></div>
    <div class="q-counter" id="qctr"></div>
    <div class="lang-switch">
      <button class="ls-btn" id="lsEN" onclick="switchLang('en')">EN</button>
      <button class="ls-btn" id="lsTA" onclick="switchLang('ta')">தமிழ்</button>
      <button class="ls-btn" id="lsBI" onclick="switchLang('bi')">BI</button>
    </div>
  </div>
  <div id="qarea"></div>
  <div class="nav-row">
    <button class="nav-btn prev-btn" id="prevBtn" onclick="navigate(-1)">← முந்தையது</button>
    <button class="nav-btn next-btn" id="nextBtn" onclick="navigate(1)">அடுத்தது →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result"></div>

<script>
// lang: 'en' | 'ta' | 'bi'
let lang = 'bi';
let cur = 0;
let answers = [];
let revealed = [];

const Q = [
  {n:1,
   q:"Which of the following newspapers are related to South Indian Liberal Federation 1917?\n(1) Swadesamitran  (2) Justice  (3) New India  (4) Dravidian",
   qt:"கீழ்க்கண்டவற்றுள் 1917-ல் தோற்றுவிக்கப்பட்ட தென்னிந்திய தாராளவாத கூட்டமைப்புடன் தொடர்புடைய பத்திரிக்கைகள் எவை?",
   a:"(1) only"                ,at:"(1) மட்டும்",
   b:"(3) and (1) only"        ,bt:"(3) மற்றும் (1) மட்டும்",
   c:"(2) and (4) only"        ,ct:"(2) மற்றும் (4) மட்டும்",
   d:"(3) only"                ,dt:"(3) மட்டும்",
   ans:"C"},

  {n:2,
   q:'Who warned "K. Kamaraj that resignation from Chief Ministership was political suicide"?',
   qt:'"கு. காமராஜ் முதலமைச்சர் பதவியிலிருந்து விலகுதல் அரசியல் தற்கொலையாகும்" என்று எச்சரிக்கை விடுத்தது யார்?',
   a:"C. Rajagopalachari",at:"C. இராஜகோபாலச்சாரி",
   b:"E.V. Ramaswamy"    ,bt:"E.V. இராமசாமி",
   c:"Lal Bahadur Sastri",ct:"லால் பகதூர் சாஸ்திரி",
   d:"Jawaharlal Nehru"  ,dt:"ஜவஹர்லால் நேரு",
   ans:"B"},

  {n:3,
   q:"When did Subash Chandra Bose form All India Forward Block?",
   qt:"எப்போது அகில இந்திய பார்வர்டு பிளாக்கை சுபாஸ் சந்திர போஷ் தோற்றுவித்தார்?",
   a:"May 1939"      ,at:"மே 1939",
   b:"June 1939"     ,bt:"ஜூன் 1939",
   c:"September 1939",ct:"செப்டம்பர் 1939",
   d:"December 1939" ,dt:"டிசம்பர் 1939",
   ans:"B"},

  {n:4,
   q:"'The Indigo Planting Mirror' is the translation of the Bengali Play",
   qt:"'தெளிவு கண்ணாடி' என்பது எந்த வங்க நாடகத்தின் மொழிபெயர்ப்பாகும்?",
   a:"Sharmistha"  ,at:"சர்மிஷ்டா",
   b:"Nil Darpan"  ,bt:"நீல் தர்பான்",
   c:"Raktakarabi" ,ct:"ரக்தகரபி",
   d:"Pratapaditya",dt:"பிரதாபாதித்யா",
   ans:"B"},

  {n:5,
   q:"Performance Grading Index (PGI) shows:",
   qt:"செயல்திறன் தரவரிசை குறியீடு (PGI) எதை காட்டுகிறது?",
   a:"Rural Technology Development",at:"கிராமப்புற தொழில்நுட்ப வளர்ச்சி",
   b:"Employability Skills"        ,bt:"வேலைவாய்ப்பு திறன்கள்",
   c:"Industrial Locations"        ,ct:"தொழிற்சாலை இடங்கள்",
   d:"The Status of School Education",dt:"பள்ளிக் கல்வியின் நிலை",
   ans:"D"},

  {n:6,
   q:"India's programme made strategic endeavours to improve the overall quality of life in rural clusters is",
   qt:"கிராமப்புற மக்களின் வாழ்க்கைத் தரத்தை மேம்படுத்த இந்திய அரசு மேற்கொண்ட திட்டம் என்ன?",
   a:"Pradhan Mantri Awas Yojana Gramin (PMAY-G)"          ,at:"பிரதான் மந்திரி ஆவாஸ் யோஜனா கிராமீண",
   b:"Shyam Prasad Mukherji Rurban Mission (SPMRM)"        ,bt:"சியாம் பிரசாத் முகர்ஜி ரூர்பன் மிஷன்",
   c:"Pradhan Mantri Grama Sadak Yojana (PMGSY)"           ,ct:"பிரதான் மந்திரி கிராம சாலை யோஜனா",
   d:"Deendayal Upadhyaya Grameen Kaushlya Yojana (DDU-GKY)",dt:"தீன்தயாள் உபாத்யாய கிராமீண கௌஷல்யா யோஜனா",
   ans:"B"},

  {n:7,
   q:"The following statements are true about Administrative revenues:\n(i) Special assessments are referred as betterment levy\n(ii) Fines and Penalties are arbitrarily determined\n(iii) It is a voluntary contribution",
   qt:"நிர்வாக வருவாய் பற்றி சரியான கூற்றுகள்:\n(i) சிறப்பு மதிப்பீடுகள் மேம்பாட்டு வரி என குறிப்பிடப்படும்\n(ii) அபராதங்கள் தன்னிச்சையாக நிர்ணயிக்கப்படுகின்றன\n(iii) இது தன்னார்வ பங்களிப்பு",
   a:"(i) only"            ,at:"(i) மட்டும்",
   b:"(i) and (ii) only"   ,bt:"(i) மற்றும் (ii) மட்டும்",
   c:"(iii) only"          ,ct:"(iii) மட்டும்",
   d:"(ii) and (iii) only" ,dt:"(ii) மற்றும் (iii) மட்டும்",
   ans:"B"},

  {n:8,
   q:"Which of the following is incorrectly paired?\n(1) India's Population in 2011 — 121.09 crores\n(2) Annual Average Growth Rate 2001-2011 — 1.64 percent\n(3) India's Population in 1951 — 28.83 crores\n(4) India's Population in 2001 — 120 crores",
   qt:"கீழ்க்கண்டவற்றில் தவறாக இணைக்கப்பட்டது எது?",
   a:"(3) and (4)"            ,at:"(3) மற்றும் (4)",
   b:"(1), (2) and (3)"       ,bt:"(1), (2) மற்றும் (3)",
   c:"(2), (3) and (4)"       ,ct:"(2), (3) மற்றும் (4)",
   d:"(1), (2), (3) and (4)"  ,dt:"(1), (2), (3) மற்றும் (4)",
   ans:"A"},

  {n:9,
   q:"Identify the non-recognized observer of the Election Commission of India",
   qt:"இந்திய தேர்தல் ஆணையத்தின் அங்கீகரிக்கப்படாத கண்காணிப்பாளர் யார்?",
   a:"General observers" ,at:"பொது கண்காணிப்பாளர்கள்",
   b:"Micro observers"   ,bt:"நுண்ணிய கண்காணிப்பாளர்கள்",
   c:"Police observers"  ,ct:"காவல் கண்காணிப்பாளர்கள்",
   d:"Specific observers",dt:"குறிப்பிட்ட கண்காணிப்பாளர்கள்",
   ans:"D"},

  {n:10,
   q:"Identify the subject of the state list",
   qt:"மாநிய பட்டியலில் உள்ள பொருளை கண்டறிக",
   a:"Banking"       ,at:"வங்கி",
   b:"Irrigation"    ,bt:"நீர்ப்பாசனம்",
   c:"Defence"       ,ct:"பாதுகாப்பு",
   d:"Foreign Affairs",dt:"வெளியுறவு",
   ans:"B"},

  {n:11,
   q:"Arrange in chronological order the term of presidents of India:\n(i) N. Sanjeeva Reddy  (ii) Dr. Zakir Hussein  (iii) Fakhruddin Ali Ahmed  (iv) V.V. Giri",
   qt:"இந்திய குடியரசுத் தலைவர்களின் பதவிக்காலத்தை காலவரிசைப்படுத்துக:\n(i) N. சஞ்சீவ ரெட்டி  (ii) Dr. ஜாகிர் ஹுசைன்  (iii) பக்ருதீன் அலி அகமது  (iv) V.V. கிரி",
   a:"(i), (iv), (ii), (iii)",at:"(i), (iv), (ii), (iii)",
   b:"(ii), (iii), (i), (iv)",bt:"(ii), (iii), (i), (iv)",
   c:"(ii), (iv), (iii), (i)",ct:"(ii), (iv), (iii), (i)",
   d:"(iii), (ii), (i), (iv)",dt:"(iii), (ii), (i), (iv)",
   ans:"C"},

  {n:12,
   q:"Right to Property removed from the list of fundamental rights by",
   qt:"சொத்துரிமை அடிப்படை உரிமைகள் பட்டியலிலிருந்து நீக்கப்பட்டது எந்த திருத்தச் சட்டத்தின் மூலம்?",
   a:"42nd Amendment Act 1976",at:"42வது திருத்தச் சட்டம் 1976",
   b:"43rd Amendment Act 1977",bt:"43வது திருத்தச் சட்டம் 1977",
   c:"44th Amendment Act 1978",ct:"44வது திருத்தச் சட்டம் 1978",
   d:"45th Amendment Act 1980",dt:"45வது திருத்தச் சட்டம் 1980",
   ans:"C"},

  {n:13,
   q:"The weapons of the Indus valley people were mostly made of",
   qt:"சிந்துவெளி மக்களின் ஆயுதங்கள் பெரும்பாலும் எதனால் செய்யப்பட்டன?",
   a:"Copper and bronze",at:"செப்பு மற்றும் வெண்கலம்",
   b:"Gold and silver"  ,bt:"தங்கம் மற்றும் வெள்ளி",
   c:"Iron and copper"  ,ct:"இரும்பு மற்றும் செப்பு",
   d:"Stone and Bricks" ,dt:"கல் மற்றும் செங்கல்",
   ans:"A"},

  {n:14,
   q:"The supremacy of Guptas was challenged by the unexpected invasion of",
   qt:"குப்தர்களின் மேலாண்மை எந்த ஆக்கிரமிப்பால் சவாலுக்கு உள்ளானது?",

answers = new Array(Q.length).fill(null);
revealed = new Array(Q.length).fill(false);

function setStartLang(l){
  lang = l;
  ['EN','TA','BI'].forEach(x => {
    document.getElementById('splash'+x).classList.toggle('active', l === x.toLowerCase());
  });
}

function startQuiz(){
  document.getElementById('splash').style.display='none';
  document.getElementById('quiz').style.display='block';
  updateLangBtns();
  renderQ();
}

function switchLang(l){
  lang = l;
  updateLangBtns();
  renderQ();
}

function updateLangBtns(){
  ['en','ta','bi'].forEach(l => {
    document.getElementById('ls'+l.toUpperCase()).classList.toggle('active', lang===l);
  });
}

function renderQ(){
  const q = Q[cur];
  const total = Q.length;
  document.getElementById('pbar').style.width = (cur/total*100)+'%';
  document.getElementById('qctr').textContent = `${cur+1} / ${total}`;

  const opts = ['a','b','c','d'];
  const lbls = ['A','B','C','D'];
  const ua = answers[cur];
  const isRev = revealed[cur];

  // Question text
  let qtxt = '';
  if(lang==='en') qtxt = `<div class="q-text">${q.q}</div>`;
  else if(lang==='ta') qtxt = `<div class="q-text" style="font-family:serif">${q.qt}</div>`;
  else qtxt = `<div class="q-text">${q.q}</div><div class="q-text-ta">${q.qt}</div>`;

  // Options
  let optsHtml = '';
  opts.forEach((k,i) => {
    const ltr = lbls[i];
    let cls = 'opt-btn';
    if(isRev){
      if(ltr===q.ans) cls+=' correct';
      else if(ua===ltr) cls+=' wrong';
    } else if(ua===ltr) cls+=' selected';
    const dis = isRev ? 'disabled' : '';
    const enTxt = q[k];
    const taTxt = q[k+'t'];
    let optContent = '';
    if(lang==='en') optContent = enTxt;
    else if(lang==='ta') optContent = `<span style="font-family:serif">${taTxt}</span>`;
    else optContent = `${enTxt}<span class="opt-ta">${taTxt}</span>`;
    optsHtml += `<button class="${cls}" onclick="selectOpt('${ltr}')" ${dis}>
      <span class="opt-lbl">${ltr}</span>
      <span class="opt-text">${optContent}</span>
    </button>`;
  });

  // Feedback
  let fb = '';
  if(isRev){
    const ok = ua===q.ans;
    const cls = ok ? 'feedback show ok':'feedback show bad';
    const icon = ok ? '✅':'❌';
    const corTxt = lang==='ta' ? q[q.ans.toLowerCase()+'t'] : q[q.ans.toLowerCase()];
    fb = `<div class="${cls}">${icon} ${ok ? (lang==='ta'?'சரியான விடை!':'Correct!') : `${lang==='ta'?'தவறு! சரியான விடை:':'Wrong! Correct answer:'} <strong>(${q.ans}) ${corTxt}</strong>`}</div>`;
  }

  document.getElementById('qarea').innerHTML = `
    <div class="q-card">
      <div class="q-num">${lang==='ta'?'வினா':'Question'} ${cur+1} · Part-A</div>
      ${qtxt}
    </div>
    <div class="options">${optsHtml}</div>
    ${fb}
  `;

  const isLast = cur===Q.length-1;
  document.getElementById('prevBtn').style.display = cur===0?'none':'block';
  const nb = document.getElementById('nextBtn');
  if(isLast){
    nb.textContent = lang==='ta' ? 'முடிவை காண ✓' : 'Submit Quiz ✓';
    nb.className = 'nav-btn submit-btn';
    nb.onclick = showResult;
  } else {
    nb.textContent = lang==='ta' ? 'அடுத்தது →' : 'Next →';
    nb.className = 'nav-btn next-btn';
    nb.onclick = ()=>navigate(1);
  }
}

function selectOpt(ltr){
  if(revealed[cur]) return;
  answers[cur]=ltr;
  revealed[cur]=true;
  renderQ();
}

function navigate(dir){
  cur=Math.max(0,Math.min(Q.length-1,cur+dir));
  renderQ();
}

function showResult(){
  document.getElementById('quiz').style.display='none';
  const rd = document.getElementById('result');
  rd.style.display='block';
  let corr=0,wrong=0,skip=0;
  Q.forEach((q,i)=>{
    if(!answers[i]) skip++;
    else if(answers[i]===q.ans) corr++;
    else wrong++;
  });
  const pct=Math.round(corr/Q.length*100);
  const circ=2*Math.PI*50;
  const off=circ-(pct/100)*circ;
  const grade=pct>=80?'🏆 Outstanding!':pct>=60?'👍 Good Work!':pct>=40?'📚 Keep Practising!':'💪 Don\'t Give Up!';
  const msg=pct>=80?'Excellent! You are well prepared for TNPSC.':pct>=60?'Good score! Review weak areas.':pct>=40?'Keep studying. Focus on incorrect answers.':'More practice needed. Review all topics.';

  let revHtml='';
  Q.forEach((q,i)=>{
    const ua=answers[i];
    let cls='rev-item rev-skip', aInfo=`<span style="color:#8b949e">⊘ Skipped</span>`;
    if(ua){
      if(ua===q.ans){cls='rev-item rev-ok';aInfo=`<span class="green">✓ (${q.ans}) ${q[q.ans.toLowerCase()]}</span>`;}
      else{cls='rev-item rev-bad';aInfo=`<span class="red">✗ (${ua}) ${q[ua.toLowerCase()]}</span> → <span class="green">(${q.ans}) ${q[q.ans.toLowerCase()]}</span>`;}
    }
    revHtml+=`<div class="${cls}">
      <div class="rev-qn">Q${q.n}</div>
      <div class="rev-q">${q.q.split('\n')[0]}</div>
      <div class="rev-a">${aInfo}</div>
    </div>`;
  });

  rd.innerHTML=`
    <div style="font-size:12px;color:#8b949e;margin-bottom:14px">APPGR-II/2025 · Part-A General Studies</div>
    <div class="score-ring">
      <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="none" stroke="#21262d" stroke-width="10"/>
      <circle cx="60" cy="60" r="50" fill="none" stroke="#f97316" stroke-width="10" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>
      <div class="score-inner"><div class="sn orange">${corr}</div><div class="sl">/ ${Q.length}</div></div>
    </div>
    <div class="res-title">${grade}</div>
    <div class="res-msg">${msg}</div>
    <div class="stat-row">
      <div class="stat-box"><div class="sn green">${corr}</div><div class="sl">Correct</div></div>
      <div class="stat-box"><div class="sn red">${wrong}</div><div class="sl">Wrong</div></div>
      <div class="stat-box"><div class="sn yellow">${skip}</div><div class="sl">Skipped</div></div>
      <div class="stat-box"><div class="sn orange">${pct}%</div><div class="sl">Score</div></div>
    </div>
    <div class="rev-wrap">
      <div class="rev-hdr">📋 Answer Review</div>
      ${revHtml}
    </div>
    <button class="retry-btn" onclick="location.reload()">🔄 மீண்டும் தொடங்கு / Retry</button>
  `;
}
</script>
</body>
</html>
