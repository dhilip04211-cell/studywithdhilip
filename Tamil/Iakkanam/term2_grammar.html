// ===================== HELPERS =====================
function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
const CH_COLORS={1:"#f5a623",2:"#4a9eff",3:"#3ecf8e"};

// ===================== COMPONENTS =====================
function Table({data}){
  return(
    <div style={{overflowX:"auto",margin:"10px 0",borderRadius:10,border:"1px solid #2a3554"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(11px,2vw,13px)"}}>
        <thead>
          <tr style={{background:"#1d2840"}}>
            {data.headers.map((h,i)=>(
              <th key={i} style={{padding:"10px 14px",textAlign:"left",color:"#f5a623",fontWeight:700,borderBottom:"2px solid #2a3554",whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {data.rows.map((row,ri)=>(
            <tr key={ri} style={{background:ri%2===0?"#131929":"#182030"}}
              onMouseEnter={e=>e.currentTarget.style.background="#1d2840"}
              onMouseLeave={e=>e.currentTarget.style.background=ri%2===0?"#131929":"#182030"}>
              {row.map((cell,ci)=>(
                <td key={ci} style={{padding:"9px 14px",color:"#ccd4e8",borderBottom:"1px solid #243058",lineHeight:1.7}}>{cell}</td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function Section({sec,color}){
  const [open,setOpen]=useState(true);
  return(
    <div style={{marginBottom:12,borderRadius:12,border:`1px solid ${color}22`,overflow:"hidden",animation:"fadeUp .3s"}}>
      <div onClick={()=>setOpen(o=>!o)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#182030",userSelect:"none",gap:8}}>
        <span style={{fontFamily:"'Noto Sans Tamil',sans-serif",fontWeight:700,fontSize:"clamp(12px,2.5vw,14px)",color:"#e8ecf4",lineHeight:1.6,flex:1}}>{sec.heading}</span>
        <span style={{color,fontSize:14,flexShrink:0,transition:"transform .2s",transform:open?"rotate(0deg)":"rotate(-90deg)"}}>▼</span>
      </div>
      {open&&(
        <div style={{padding:"14px 16px",background:"#0e1220"}}>
          {sec.type==="table"
            ?<Table data={sec.tableData}/>
            :<pre style={{whiteSpace:"pre-wrap",fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(11px,2vw,13px)",color:"#b8c4dc",lineHeight:2,margin:0}}>{sec.content}</pre>
          }
        </div>
      )}
    </div>
  );
}

// ===================== QUIZ TAB =====================
function QuizTab(){
  const SK="tnpsc_q2_v3";
  const getSaved=()=>{try{return JSON.parse(localStorage.getItem(SK))||null;}catch{return null;}};
  const [chFilter,setChFilter]=useState(0);
  const [questions,setQuestions]=useState(null);
  const [current,setCurrent]=useState(0);
  const [answers,setAnswers]=useState([]);
  const [selected,setSelected]=useState(null);
  const [revealed,setRevealed]=useState(false);
  const [done,setDone]=useState(false);
  const [started,setStarted]=useState(false);
  const saved=useMemo(getSaved,[]);

  const buildQs=useCallback((f)=>{
    let q=f===0?ALL_QUIZ:ALL_QUIZ.filter(x=>x.ch===f);
    return shuffle(q).map(item=>{
      const shuf=shuffle(item.opts.map((o,i)=>({text:o,ok:i===item.a})));
      return{...item,sOpts:shuf.map(o=>o.text),cIdx:shuf.findIndex(o=>o.ok)};
    });
  },[]);

  function startQuiz(f){
    const qs=buildQs(f);
    setQuestions(qs);setCurrent(0);setAnswers([]);setSelected(null);setRevealed(false);setDone(false);setStarted(true);setChFilter(f);
  }

  useEffect(()=>{
    if(!started||!questions)return;
    try{localStorage.setItem(SK,JSON.stringify({chFilter,current,answers,started,done}));}catch{}
  },[current,answers,started,done,chFilter,questions]);

  function handleReveal(){
    if(selected===null)return;
    setRevealed(true);
    const ok=selected===questions[current].cIdx;
    setAnswers(a=>[...a,{q:current,selected,ok}]);
  }

  function handleNext(){
    if(current+1>=questions.length){setDone(true);return;}
    setCurrent(c=>c+1);setSelected(null);setRevealed(false);
  }

  function restart(){
    try{localStorage.removeItem(SK);}catch{}
    setStarted(false);setQuestions(null);setDone(false);setAnswers([]);setCurrent(0);
  }

  // Start Screen
  if(!started){
    return(
      <div style={{maxWidth:680,margin:"0 auto",padding:"28px 14px",animation:"fadeUp .4s"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:6}}>🎯</div>
          <h2 style={{fontFamily:"'Noto Serif Tamil',serif",fontSize:"clamp(18px,4vw,26px)",color:"#f5a623",fontWeight:700}}>TNPSC Quiz</h2>
          <p style={{color:"#7a8599",marginTop:6,fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(11px,2vw,13px)"}}>மொத்தம் {ALL_QUIZ.length} கேள்விகள் | TNPSC நோக்குடன் தயாரிக்கப்பட்டவை</p>
        </div>
        {saved?.started&&(
          <div style={{background:"#182030",borderRadius:14,padding:18,marginBottom:18,border:"1px solid #243058",textAlign:"center"}}>
            <p style={{color:"#8a96b0",marginBottom:12,fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(11px,2vw,13px)"}}>⏸️ முந்தைய அமர்வு – கேள்வி {saved.current+1}</p>
            <button onClick={()=>{const qs=buildQs(saved.chFilter);setQuestions(qs);setCurrent(saved.current);setAnswers(saved.answers||[]);setStarted(true);setChFilter(saved.chFilter);setDone(saved.done||false);}}
              style={{padding:"10px 24px",background:"#3ecf8e",border:"none",borderRadius:10,color:"#080b12",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:"clamp(11px,2vw,13px)",marginRight:8}}>↩️ தொடரவும்</button>
            <button onClick={()=>{try{localStorage.removeItem(SK);}catch{}window.location.reload();}}
              style={{padding:"10px 16px",background:"#182030",border:"1px solid #243058",borderRadius:10,color:"#8a96b0",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:"clamp(11px,2vw,13px)"}}>புதிதாகத் தொடங்கு</button>
          </div>
        )}
        <div style={{background:"#182030",borderRadius:14,padding:22,border:"1px solid #243058"}}>
          <p style={{color:"#e8ecf4",marginBottom:14,fontFamily:"'Noto Sans Tamil',sans-serif",fontWeight:600,fontSize:"clamp(12px,2vw,14px)"}}>பாடத்தேர்வு:</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:22}}>
            {[[0,`அனைத்தும் (${ALL_QUIZ.length})`],[1,`இன எழுத்துகள் (${ALL_QUIZ.filter(x=>x.ch===1).length})`],[2,`மயங்கொலிகள் (${ALL_QUIZ.filter(x=>x.ch===2).length})`],[3,`சுட்டு & வினா (${ALL_QUIZ.filter(x=>x.ch===3).length})`]].map(([v,l])=>(
              <button key={v} onClick={()=>setChFilter(v)} style={{
                padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"'Noto Sans Tamil',sans-serif",
                fontWeight:600,fontSize:"clamp(10px,2vw,12px)",
                background:chFilter===v?"#f5a623":"#0e1220",
                color:chFilter===v?"#080b12":"#8a96b0",
                outline:chFilter===v?"none":"1px solid #243058"
              }}>{l}</button>
            ))}
          </div>
          <button onClick={()=>startQuiz(chFilter)} style={{
            width:"100%",padding:14,background:"linear-gradient(90deg,#f5a623,#e8431a)",
            border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer",
            fontSize:"clamp(13px,3vw,17px)",fontFamily:"'Noto Sans Tamil',sans-serif"
          }}>🚀 Quiz தொடங்கு</button>
        </div>
      </div>
    );
  }

  // Done Screen
  if(done){
    const correct=answers.filter(a=>a.ok).length;
    const pct=Math.round((correct/questions.length)*100);
    return(
      <div style={{maxWidth:700,margin:"0 auto",padding:"24px 14px",animation:"pop .4s"}}>
        <div style={{background:"linear-gradient(135deg,#182030,#0e1220)",borderRadius:18,padding:28,textAlign:"center",border:"1px solid #243058",marginBottom:20}}>
          <div style={{fontSize:52,marginBottom:8}}>{pct>=80?"🏆":pct>=60?"🎯":"📚"}</div>
          <h2 style={{fontFamily:"'Noto Serif Tamil',serif",fontSize:"clamp(16px,4vw,26px)",color:"#f5a623",marginBottom:8}}>முடிவுகள்</h2>
          <div style={{fontSize:"clamp(36px,8vw,52px)",fontWeight:900,color:pct>=80?"#3ecf8e":pct>=60?"#f5a623":"#f56565"}}>{pct}%</div>
          <p style={{color:"#8a96b0",fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(12px,2.5vw,15px)",marginTop:6}}>{correct} / {questions.length} சரியான விடைகள்</p>
          <div style={{marginTop:12,padding:"10px 18px",borderRadius:10,display:"inline-block",background:pct>=80?"#3ecf8e22":pct>=60?"#f5a62322":"#f5656522",border:`1px solid ${pct>=80?"#3ecf8e":pct>=60?"#f5a623":"#f56565"}`}}>
            <span style={{color:pct>=80?"#3ecf8e":pct>=60?"#f5a623":"#f56565",fontFamily:"'Noto Sans Tamil',sans-serif",fontWeight:700,fontSize:"clamp(11px,2vw,13px)"}}>
              {pct>=80?"சிறப்பான செயல்திறன்! 🌟":pct>=60?"நல்ல முயற்சி! மேலும் படிக்கவும்.":"மீண்டும் படித்து முயற்சி செய்க."}
            </span>
          </div>
        </div>
        <h3 style={{color:"#e8ecf4",marginBottom:12,fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(13px,2.5vw,15px)"}}>📋 விடைகளை மதிப்பாய்வு செய்க</h3>
        {answers.map((ans,i)=>{
          const q=questions[ans.q];
          return(
            <div key={i} style={{background:"#182030",borderRadius:12,padding:"12px 14px",marginBottom:8,border:`1px solid ${ans.ok?"#3ecf8e44":"#f5656544"}`}}>
              <div style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:ans.ok?0:6}}>
                <span style={{flexShrink:0}}>{ans.ok?"✅":"❌"}</span>
                <p style={{fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(10px,2vw,12px)",color:"#e8ecf4",lineHeight:1.7,margin:0}}>{i+1}. {q.q}</p>
              </div>
              {!ans.ok&&(
                <div style={{marginLeft:22,padding:"6px 10px",background:"#3ecf8e18",borderRadius:7,border:"1px solid #3ecf8e33"}}>
                  <span style={{fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(10px,2vw,12px)",color:"#3ecf8e"}}>✓ சரியான விடை: {q.sOpts[q.cIdx]}</span>
                </div>
              )}
            </div>
          );
        })}
        <button onClick={restart} style={{width:"100%",padding:14,background:"#f5a623",border:"none",borderRadius:12,color:"#080b12",fontWeight:700,cursor:"pointer",fontSize:"clamp(12px,3vw,15px)",fontFamily:"inherit",marginTop:8}}>🔄 மீண்டும் Quiz</button>
      </div>
    );
  }

  // Active Quiz
  const q=questions[current];
  const prog=((current)/questions.length)*100;
  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"18px 14px"}}>
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{color:"#8a96b0",fontSize:"clamp(10px,2vw,12px)",fontFamily:"'Noto Sans Tamil',sans-serif"}}>கேள்வி {current+1} / {questions.length}</span>
          <span style={{color:"#f5a623",fontSize:"clamp(10px,2vw,12px)",fontWeight:700}}>✓ {answers.filter(a=>a.ok).length} சரி</span>
        </div>
        <div style={{height:5,background:"#182030",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",background:"linear-gradient(90deg,#f5a623,#3ecf8e)",width:prog+"%",transition:"width .4s",borderRadius:3}}/>
        </div>
      </div>
      <div style={{background:"#182030",borderRadius:14,padding:"20px 16px",marginBottom:14,border:"1px solid #243058",animation:"fadeUp .3s"}}>
        <div style={{fontSize:"clamp(9px,1.5vw,11px)",color:CH_COLORS[q.ch],fontWeight:700,marginBottom:8,fontFamily:"'Noto Sans Tamil',sans-serif",letterSpacing:1}}>
          {q.ch===1?"இன எழுத்துகள்":q.ch===2?"மயங்கொலிகள்":"சுட்டு & வினா"}
        </div>
        <p style={{fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(12px,2.5vw,16px)",color:"#e8ecf4",lineHeight:1.9,margin:0,fontWeight:600}}>{q.q}</p>
      </div>
      <div style={{display:"grid",gap:8,marginBottom:14}}>
        {q.sOpts.map((opt,i)=>{
          let bg="#182030",border="1px solid #243058",color="#b8c4dc";
          if(revealed){
            if(i===q.cIdx){bg="#3ecf8e22";border="2px solid #3ecf8e";color="#3ecf8e";}
            else if(i===selected){bg="#f5656522";border="2px solid #f56565";color="#f56565";}
          }else if(i===selected){bg="#f5a62318";border="2px solid #f5a623";color="#f5a623";}
          return(
            <button key={i} onClick={()=>{if(!revealed)setSelected(i);}} style={{
              padding:"12px 16px",borderRadius:11,border,background:bg,color,
              cursor:revealed?"default":"pointer",textAlign:"left",fontFamily:"'Noto Sans Tamil',sans-serif",
              fontSize:"clamp(11px,2vw,13px)",lineHeight:1.7,transition:"all .15s",fontWeight:selected===i||revealed?"600":"400"
            }}>
              <span style={{color:"#4a5568",marginRight:8,fontFamily:"Rajdhani",fontWeight:700}}>{String.fromCharCode(65+i)}.</span>
              {opt}
              {revealed&&i===q.cIdx&&<span style={{float:"right"}}>✓</span>}
              {revealed&&i===selected&&i!==q.cIdx&&<span style={{float:"right"}}>✗</span>}
            </button>
          );
        })}
      </div>
      <div style={{display:"flex",gap:8}}>
        {!revealed
          ?<button onClick={handleReveal} disabled={selected===null} style={{
              flex:1,padding:13,border:"none",borderRadius:11,cursor:selected===null?"not-allowed":"pointer",
              background:selected===null?"#182030":"linear-gradient(90deg,#4a9eff,#3ecf8e)",
              color:selected===null?"#4a5568":"#080b12",fontWeight:700,fontSize:"clamp(12px,2.5vw,15px)",fontFamily:"inherit",transition:"all .2s"
            }}>விடையை சரிபார்</button>
          :<button onClick={handleNext} style={{
              flex:1,padding:13,border:"none",borderRadius:11,cursor:"pointer",
              background:"linear-gradient(90deg,#f5a623,#e8431a)",
              color:"#fff",fontWeight:700,fontSize:"clamp(12px,2.5vw,15px)",fontFamily:"inherit"
            }}>{current+1>=questions.length?"முடிவுகளைப் பார்":"அடுத்த கேள்வி →"}</button>
        }
        <button onClick={restart} style={{padding:"13px 14px",border:"1px solid #243058",borderRadius:11,cursor:"pointer",background:"#182030",color:"#7a8599",fontSize:"clamp(11px,2vw,13px)",fontFamily:"inherit"}}>✕</button>
      </div>
    </div>
  );
}

// ===================== GAME TAB =====================
function GameTab(){
  const [mode,setMode]=useState("menu");
  const [matchIdx,setMatchIdx]=useState(0);
  const [leftSel,setLeftSel]=useState(null);
  const [rightSel,setRightSel]=useState(null);
  const [matched,setMatched]=useState({});
  const [wrongPair,setWrongPair]=useState(null);
  const [score,setScore]=useState(0);
  const [completed,setCompleted]=useState(false);
  const [rightOrder,setRightOrder]=useState([]);

  function startMatch(idx){
    const ms=MATCH_SETS[idx];
    setMatchIdx(idx);setLeftSel(null);setRightSel(null);setMatched({});setWrongPair(null);setScore(0);setCompleted(false);
    setRightOrder(shuffle(ms.right.map((_,i)=>i)));
    setMode("match");
  }

  useEffect(()=>{
    if(rightSel===null||leftSel===null)return;
    const ms=MATCH_SETS[matchIdx];
    const correctRightIdx=ms.answers[leftSel];
    const actualRight=rightOrder[rightSel];
    if(actualRight===correctRightIdx){
      const nm={...matched,[leftSel]:rightSel};
      setMatched(nm);setScore(s=>s+10);
      if(Object.keys(nm).length===ms.left.length)setCompleted(true);
    }else{
      setWrongPair([leftSel,rightSel]);
      setTimeout(()=>setWrongPair(null),700);
    }
    setLeftSel(null);setRightSel(null);
  },[rightSel]);

  if(mode==="menu"){
    return(
      <div style={{maxWidth:800,margin:"0 auto",padding:"28px 14px",animation:"fadeUp .4s"}}>
        <div style={{textAlign:"center",marginBottom:26}}>
          <div style={{fontSize:52,marginBottom:6}}>🎮</div>
          <h2 style={{fontFamily:"'Noto Serif Tamil',serif",fontSize:"clamp(16px,4vw,24px)",color:"#e040fb",fontWeight:700}}>Quiz Game – இணைத்தல் விளையாட்டு</h2>
          <p style={{color:"#7a8599",fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(10px,2vw,12px)",marginTop:4}}>Match The Following – அட்டவணை வடிவில்</p>
        </div>
        <div style={{display:"grid",gap:12}}>
          {MATCH_SETS.map((ms,i)=>(
            <div key={i} onClick={()=>startMatch(i)} style={{
              background:"#182030",borderRadius:14,padding:"16px 18px",cursor:"pointer",
              border:"1px solid #2a3554",display:"flex",justifyContent:"space-between",alignItems:"center",
              transition:"all .2s"
            }}
              onMouseEnter={e=>{e.currentTarget.style.background="#1d2840";e.currentTarget.style.borderColor="#e040fb44";}}
              onMouseLeave={e=>{e.currentTarget.style.background="#182030";e.currentTarget.style.borderColor="#2a3554";}}>
              <div>
                <div style={{fontFamily:"'Noto Sans Tamil',sans-serif",fontWeight:700,fontSize:"clamp(11px,2.5vw,14px)",color:"#e8ecf4",marginBottom:3}}>{ms.title}</div>
                <div style={{fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(10px,1.8vw,12px)",color:"#7a8599"}}>{ms.left.length} இணைகள்</div>
              </div>
              <span style={{color:"#e040fb",fontSize:18}}>▶</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // Match game
  const ms=MATCH_SETS[matchIdx];
  return(
    <div style={{maxWidth:980,margin:"0 auto",padding:"18px 14px",animation:"fadeUp .3s"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18,flexWrap:"wrap"}}>
        <button onClick={()=>setMode("menu")} style={{padding:"8px 12px",background:"#182030",border:"1px solid #243058",borderRadius:8,color:"#8a96b0",cursor:"pointer",fontFamily:"inherit",fontSize:"clamp(10px,2vw,12px)"}}>← திரும்பு</button>
        <h3 style={{fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(11px,2.5vw,14px)",color:"#e040fb",margin:0,flex:1,lineHeight:1.5}}>{ms.title}</h3>
        <div style={{background:"#182030",borderRadius:10,padding:"5px 14px",border:"1px solid #243058"}}>
          <span style={{color:"#f5a623",fontWeight:700,fontSize:"clamp(12px,2.5vw,15px)"}}>🏆 {score}</span>
        </div>
      </div>

      {completed?(
        <div style={{textAlign:"center",padding:36,animation:"pop .4s"}}>
          <div style={{fontSize:52,marginBottom:10}}>🎉</div>
          <h2 style={{fontFamily:"'Noto Serif Tamil',serif",color:"#3ecf8e",fontSize:"clamp(16px,4vw,26px)",marginBottom:6}}>அற்புதம்!</h2>
          <p style={{fontFamily:"'Noto Sans Tamil',sans-serif",color:"#8a96b0",fontSize:"clamp(12px,2.5vw,14px)"}}>மதிப்பெண்: {score} / {ms.left.length*10}</p>
          <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:18,flexWrap:"wrap"}}>
            <button onClick={()=>startMatch(matchIdx)} style={{padding:"10px 22px",background:"#3ecf8e",border:"none",borderRadius:10,color:"#080b12",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:"clamp(11px,2vw,13px)"}}>🔄 மீண்டும்</button>
            <button onClick={()=>setMode("menu")} style={{padding:"10px 20px",background:"#182030",border:"1px solid #243058",borderRadius:10,color:"#8a96b0",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:"clamp(11px,2vw,13px)"}}>பட்டியலுக்கு</button>
            {matchIdx+1<MATCH_SETS.length&&(
              <button onClick={()=>startMatch(matchIdx+1)} style={{padding:"10px 22px",background:"#e040fb",border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:"clamp(11px,2vw,13px)"}}>அடுத்தது →</button>
            )}
          </div>
        </div>
      ):(
        <>
          {/* Main match table */}
          <div style={{overflowX:"auto",marginBottom:14,borderRadius:12,border:"1px solid #243058"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(11px,2vw,13px)"}}>
              <thead>
                <tr style={{background:"#1d2840"}}>
                  <th style={{padding:"10px 14px",textAlign:"left",color:"#e040fb",fontWeight:700,borderBottom:"2px solid #243058",width:"48%"}}>A – இடம் (Left)</th>
                  <th style={{padding:"10px 14px",textAlign:"left",color:"#4a9eff",fontWeight:700,borderBottom:"2px solid #243058",width:"52%"}}>B – வலம் (Right) – இணைக்கப்பட்டவை</th>
                </tr>
              </thead>
              <tbody>
                {ms.left.map((lItem,li)=>{
                  const isMatchedLeft=matched.hasOwnProperty(li);
                  const matchedRightText=isMatchedLeft?ms.right[rightOrder[matched[li]]]:null;
                  const isWrongLeft=wrongPair&&wrongPair[0]===li;
                  const leftActive=leftSel===li;
                  return(
                    <tr key={li} style={{background:li%2===0?"#131929":"#182030",borderBottom:"1px solid #243058"}}>
                      <td style={{padding:"9px 12px"}}>
                        <button onClick={()=>!isMatchedLeft&&setLeftSel(leftSel===li?null:li)} disabled={isMatchedLeft} style={{
                          padding:"7px 12px",borderRadius:9,border:"none",cursor:isMatchedLeft?"default":"pointer",
                          background:isMatchedLeft?"#3ecf8e22":isWrongLeft?"#f5656522":leftActive?"#e040fb22":"#0e1220",
                          color:isMatchedLeft?"#3ecf8e":isWrongLeft?"#f56565":leftActive?"#e040fb":"#b8c4dc",
                          fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"inherit",fontWeight:leftActive?"700":"400",
                          width:"100%",textAlign:"left",lineHeight:1.6,
                          outline:leftActive?"2px solid #e040fb":isMatchedLeft?"2px solid #3ecf8e44":"none",
                          transition:"all .15s"
                        }}>{li+1}. {lItem} {isMatchedLeft?"✓":""}</button>
                      </td>
                      <td style={{padding:"9px 12px"}}>
                        {isMatchedLeft
                          ?<div style={{padding:"7px 12px",borderRadius:9,background:"#3ecf8e18",border:"1px solid #3ecf8e44",color:"#3ecf8e",fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"inherit",lineHeight:1.6}}>✓ {matchedRightText}</div>
                          :<span style={{color:"#4a5568",fontSize:"clamp(10px,1.8vw,12px)"}}>—</span>
                        }
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Right side options */}
          <div style={{background:"#182030",borderRadius:12,padding:14,border:"1px solid #243058"}}>
            <p style={{color:"#4a9eff",fontWeight:700,marginBottom:10,fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(10px,2vw,12px)"}}>
              B வரிசை – {leftSel!==null?`'${ms.left[leftSel]}' க்கான இணையை தேர்ந்தெடு ↓`:"இடது பக்கத்தில் முதல் ஒரு சொல்லை தேர்ந்தெடு"}
            </p>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {rightOrder.map((rOrigIdx,rScreenIdx)=>{
                const isMatchedRight=Object.values(matched).includes(rScreenIdx);
                const isWrongRight=wrongPair&&wrongPair[1]===rScreenIdx;
                const rightActive=rightSel===rScreenIdx;
                return(
                  <button key={rScreenIdx} onClick={()=>{if(isMatchedRight||leftSel===null)return;setRightSel(rScreenIdx);}}
                    disabled={isMatchedRight} style={{
                      padding:"8px 12px",borderRadius:9,border:"none",
                      cursor:isMatchedRight?"default":leftSel===null?"not-allowed":"pointer",
                      background:isMatchedRight?"#3ecf8e22":isWrongRight?"#f5656522":rightActive?"#4a9eff22":"#0e1220",
                      color:isMatchedRight?"#3ecf8e":isWrongRight?"#f56565":rightActive?"#4a9eff":"#b8c4dc",
                      fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(10px,2vw,12px)",fontWeight:rightActive?"700":"400",
                      outline:rightActive?"2px solid #4a9eff":"none",
                      opacity:leftSel===null&&!isMatchedRight?0.45:1,
                      transition:"all .15s",lineHeight:1.6
                    }}>
                    {String.fromCharCode(65+rScreenIdx)}. {ms.right[rOrigIdx]}
                  </button>
                );
              })}
            </div>
            {leftSel!==null&&(
              <div style={{marginTop:10,padding:"6px 12px",background:"#e040fb14",borderRadius:7,border:"1px solid #e040fb33"}}>
                <span style={{fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(10px,2vw,12px)",color:"#e040fb"}}>✦ '{ms.left[leftSel]}' – B வரிசையில் இணைக்கவும்</span>
              </div>
            )}
          </div>

          {/* Score progress bar */}
          <div style={{marginTop:14,background:"#182030",borderRadius:10,padding:"10px 14px",border:"1px solid #243058",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontFamily:"'Noto Sans Tamil',sans-serif",fontSize:"clamp(10px,2vw,12px)",color:"#8a96b0"}}>முன்னேற்றம்</span>
            <div style={{flex:1,height:5,background:"#0e1220",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",background:"linear-gradient(90deg,#e040fb,#4a9eff)",width:`${(Object.keys(matched).length/ms.left.length)*100}%`,transition:"width .4s",borderRadius:3}}/>
            </div>
            <span style={{fontFamily:"Rajdhani",fontWeight:700,fontSize:"clamp(11px,2vw,13px)",color:"#e040fb"}}>{Object.keys(matched).length}/{ms.left.length}</span>
          </div>
        </>
      )}
    </div>
  );
}

// ===================== HEADER =====================
function Header({tab,setTab}){
  return(
    <div style={{background:"#0a0d14",borderBottom:"1px solid #1e2a48",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 28px rgba(0,0,0,0.6)"}}>
      <div style={{maxWidth:1050,margin:"0 auto",padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
        <div style={{padding:"12px 0"}}>
          <div style={{fontFamily:"'Noto Serif Tamil',serif",fontSize:"clamp(13px,3vw,18px)",fontWeight:700,color:"#f5a623",letterSpacing:.5}}>🏛️ 6th New Book Term 2</div>
          <div style={{fontSize:"clamp(9px,1.8vw,11px)",color:"#5a6480",fontFamily:"'Noto Sans Tamil',sans-serif"}}>தமிழ் இலக்கணம் – Interactive Study</div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",padding:"8px 0"}}>
          {[["📚","Notes","notes"],["🎯","Quiz","quiz"],["🎮","Game","game"]].map(([ic,lb,val])=>(
            <button key={val} onClick={()=>setTab(val)} style={{
              padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",
              fontWeight:700,fontSize:"clamp(10px,2vw,13px)",
              background:tab===val?"#f5a623":"#182030",
              color:tab===val?"#080b12":"#8a96b0",
              outline:tab===val?"none":"1px solid #243058",
              transition:"all .2s"
            }}>{ic} {lb}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ===================== APP =====================
function App(){
  const [tab,setTab]=useState("notes");
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
      `}</style>
      <Header tab={tab} setTab={setTab}/>
      <div style={{paddingBottom:40}}>
        {tab==="notes"&&<NotesTab/>}
        {tab==="quiz"&&<QuizTab/>}
        {tab==="game"&&<GameTab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
