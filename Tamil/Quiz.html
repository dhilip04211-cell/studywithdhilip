<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Quiz</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .quiz-box {
            background: #16213e;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #0f3460;
            width: 400px;
        }
        .quiz-title { font-size: 1.8rem; margin-bottom: 30px; color: #4ecca3; }
        .quiz-btn {
            background: #e94560;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .quiz-btn:hover { transform: scale(1.05); background: #ff4d6d; }
        .home-link { display: block; margin-top: 20px; color: #999; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="quiz-box">
        <div class="quiz-title">தேர்வு (Quiz)</div>
        <a href="Quiz/pirithu ezhuthuga Quiz.html" class="quiz-btn">பிரித்து எழுதுக Quiz</a>
        <a href="Tamil.html" class="home-link">முகப்புப் பக்கத்திற்குச் செல்ல</a>
    </div>
</body>
</html>
