<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Plant Quiz – Part 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600&family=Source+Code+Pro:wght@400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #2a3a55;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --tamil: #a5f3fc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 16px; }

  /* Header */
  .header {
    text-align: center;
    padding: 24px 16px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, #00d4ff22, #ff6b3522);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Source Code Pro', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 4px 14px;
    border-radius: 2px;
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #00d4ff, #ffffff, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  .header-tamil {
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 14px;
    color: var(--tamil);
    margin-top: 6px;
    opacity: 0.85;
  }
  .coverage-tags {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px;
  }
  .tag {
    background: #1a2235; border: 1px solid var(--border);
    color: var(--muted); font-size: 11px; padding: 3px 10px; border-radius: 20px;
    font-family: 'Source Code Pro', monospace; letter-spacing: 1px;
  }
  .tag.thermal { border-color: #ff6b3544; color: #ff6b35; }
  .tag.hydro { border-color: #00d4ff44; color: #00d4ff; }
  .tag.nuclear { border-color: #22c55e44; color: #22c55e; }

  /* Score bar */
  .score-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .score-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
  .score-val {
    font-size: 22px; font-weight: 700; line-height: 1;
    font-family: 'Source Code Pro', monospace;
  }
  .score-lbl { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }
  .score-divider { width: 1px; height: 36px; background: var(--border); }
  .progress-wrap { flex: 1; min-width: 120px; }
  .progress-track {
    height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-text { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'Source Code Pro', monospace; }

  /* Section label */
  .section-label {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0 10px;
    padding: 8px 14px;
    background: linear-gradient(90deg, #00d4ff11, transparent);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
  }
  .section-label span { font-size: 13px; font-weight: 600; letter-spacing: 2px; color: var(--accent); }
  .section-label .tamil-s { font-family: 'Noto Sans Tamil', sans-serif; font-size: 12px; color: var(--tamil); margin-left: 4px; }

  .section-label.hydro { border-color: #00d4ff; }
  .section-label.hydro span { color: #00d4ff; }
  .section-label.nuclear { border-color: #22c55e; }
  .section-label.nuclear span { color: #22c55e; }
  .section-label.thermal-s { border-color: var(--accent2); }
  .section-label.thermal-s span { color: var(--accent2); }

  /* Question card */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.25s;
  }
  .q-card.answered-correct { border-color: var(--green); }
  .q-card.answered-wrong { border-color: var(--red); }

  .q-header {
    padding: 12px 16px 8px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .q-num {
    background: var(--border);
    color: var(--accent);
    font-family: 'Source Code Pro', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .q-text { font-size: 15px; font-weight: 600; line-height: 1.5; flex: 1; }
  .q-tamil {
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 13px; color: var(--tamil);
    padding: 0 16px 8px 42px;
    line-height: 1.6;
    opacity: 0.9;
  }
  .q-source { font-size: 10px; color: var(--muted); padding: 0 16px 8px 42px; font-family: 'Source Code Pro', monospace; letter-spacing: 1px; }

  /* Options */
  .options { padding: 6px 12px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  @media (max-width: 540px) { .options { grid-template-columns: 1fr; } }

  .opt-btn {
    background: #0f1b2d;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    text-align: left;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; align-items: flex-start; gap: 8px;
    color: var(--text);
  }
  .opt-btn:hover:not(:disabled) {
    background: #1e2d44;
    border-color: var(--accent);
    color: white;
  }
  .opt-btn:disabled { cursor: not-allowed; }
  .opt-btn.correct { background: #14532d; border-color: var(--green); color: #bbf7d0; }
  .opt-btn.wrong   { background: #450a0a; border-color: var(--red);   color: #fecaca; }
  .opt-btn.reveal  { background: #1a3a2a; border-color: #22c55e88; color: #86efac; }

  .opt-key {
    font-family: 'Source Code Pro', monospace;
    font-weight: 600; font-size: 12px;
    min-width: 18px; padding-top: 1px;
    flex-shrink: 0;
  }
  .opt-btn.correct .opt-key { color: var(--green); }
  .opt-btn.wrong   .opt-key { color: var(--red); }
  .opt-btn.reveal  .opt-key { color: #22c55e; }

  .opt-text { font-size: 14px; line-height: 1.4; font-weight: 500; }
  .opt-tamil { font-family: 'Noto Sans Tamil', sans-serif; font-size: 11px; color: var(--tamil); display: block; margin-top: 2px; opacity: 0.8; }

  /* Explanation */
  .explanation {
    margin: 0 12px 12px;
    background: #0a1628;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: #94a3b8;
    display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }
  .expl-tamil { font-family: 'Noto Sans Tamil', sans-serif; font-size: 12px; color: var(--tamil); margin-top: 6px; opacity: 0.85; display: block; }

  /* Nav */
  .nav-bar {
    position: sticky; bottom: 0;
    background: #0a0e1aee;
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; gap: 10px; align-items: center; justify-content: center;
    flex-wrap: wrap;
    z-index: 10;
  }
  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 1px;
    transition: all 0.18s;
  }
  .nav-btn:hover { background: var(--border); }
  .nav-btn.primary {
    background: linear-gradient(135deg, #00d4ff22, #0099bb33);
    border-color: var(--accent); color: var(--accent);
  }
  .nav-btn.primary:hover { background: #00d4ff22; }

  /* Result modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: #000000cc;
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    display: none;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px;
    max-width: 460px; width: 90%;
    text-align: center;
  }
  .modal h2 { font-size: 26px; font-weight: 700; margin-bottom: 6px; letter-spacing: 2px; }
  .modal .score-big {
    font-size: 56px; font-weight: 700;
    font-family: 'Source Code Pro', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1;
    margin: 16px 0;
  }
  .modal .grade { font-size: 18px; margin-bottom: 16px; }
  .modal-breakdown { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
  .mb-item { background: var(--surface); border: 1px solid var(--border); padding: 10px 16px; border-radius: 8px; }
  .mb-val { font-size: 20px; font-weight: 700; font-family: 'Source Code Pro', monospace; }
  .mb-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .mb-item.c .mb-val { color: var(--green); }
  .mb-item.w .mb-val { color: var(--red); }
  .mb-item.s .mb-val { color: var(--yellow); }
  .modal-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  /* Scrolltop */
  .scroll-top {
    position: fixed; bottom: 80px; right: 16px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); width: 36px; height: 36px;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.2s;
    z-index: 9;
  }
  .scroll-top:hover { border-color: var(--accent); color: var(--accent); }

  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="header-badge">TNPSC ELECTRICAL ENGINEERING</div>
    <h1>POWER PLANT — PART 2</h1>
    <div class="header-tamil">மின் நிலைய வினாடி வினா — பகுதி 2</div>
    <div class="coverage-tags">
      <span class="tag thermal">THERMAL II (Q113–123)</span>
      <span class="tag hydro">HYDRO POWER (Q1–87)</span>
      <span class="tag nuclear">NUCLEAR (Q1–31)</span>
    </div>
  </div>

  <div class="score-bar">
    <div class="score-item"><div class="score-val" id="scoreVal" style="color:var(--accent)">0</div><div class="score-lbl">SCORE</div></div>
    <div class="score-divider"></div>
    <div class="score-item"><div class="score-val" id="correctVal" style="color:var(--green)">0</div><div class="score-lbl">CORRECT</div></div>
    <div class="score-divider"></div>
    <div class="score-item"><div class="score-val" id="wrongVal" style="color:var(--red)">0</div><div class="score-lbl">WRONG</div></div>
    <div class="score-divider"></div>
    <div class="score-item"><div class="score-val" id="skipVal" style="color:var(--yellow)">0</div><div class="score-lbl">SKIPPED</div></div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0 / 141 answered</div>
    </div>
  </div>

  <div id="quizContainer"></div>

  <div style="height:80px"></div>
</div>

<!-- Nav -->
<div class="nav-bar">
  <button class="nav-btn" onclick="showAll()">📋 All Questions</button>
  <button class="nav-btn" onclick="showUnanswered()">⏭ Unanswered</button>
  <button class="nav-btn primary" onclick="submitQuiz()">✅ Submit Quiz</button>
  <button class="nav-btn" onclick="resetQuiz()">🔄 Reset</button>
</div>

<button class="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- Result Modal -->
<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <h2>QUIZ COMPLETE</h2>
    <div class="score-big" id="modalPct">--</div>
    <div class="grade" id="modalGrade"></div>
    <div class="modal-breakdown">
      <div class="mb-item c"><div class="mb-val" id="mCorrect">0</div><div class="mb-lbl">CORRECT</div></div>
      <div class="mb-item w"><div class="mb-val" id="mWrong">0</div><div class="mb-lbl">WRONG</div></div>
      <div class="mb-item s"><div class="mb-val" id="mSkip">0</div><div class="mb-lbl">SKIPPED</div></div>
    </div>
    <div class="modal-actions">
      <button class="nav-btn primary" onclick="closeModal()">Review Answers</button>
      <button class="nav-btn" onclick="resetQuiz()">Retake</button>
    </div>
  </div>
</div>

<script>
const questions = [
  // ═══════════════ SECTION II — THERMAL (Q113–Q123) ═══════════════
  {
    section:"thermal",
    num:"II.113",
    en:"Boiler efficiency can be improved by an economiser by:",
    ta:"பாய்லர் திறனை எக்கனாமைசர் மூலம் எவ்வளவு சதவீதம் மேம்படுத்தலாம்?",
    opts:[
      {k:"a",en:"20 percent",ta:"20 சதவீதம்"},
      {k:"b",en:"12 to 15 percent",ta:"12 முதல் 15 சதவீதம்"},
      {k:"c",en:"1 to 2 percent",ta:"1 முதல் 2 சதவீதம்"},
      {k:"d",en:"4 to 10 percent",ta:"4 முதல் 10 சதவீதம்"}
    ],
    ans:"d",
    exp:"An economiser reduces energy consumption and improves boiler efficiency by 4 to 10 percent.",
    exp_ta:"எக்கனாமைசர் பாய்லர் திறனை 4 முதல் 10 சதவீதம் வரை மேம்படுத்துகிறது."
  },
  {
    section:"thermal",
    num:"II.114",
    en:"Which of the following is NOT an advantage of thermal power plants?",
    ta:"பின்வருவனவற்றில் வெப்ப மின் நிலையத்தின் நன்மை அல்லாதது எது?",
    opts:[
      {k:"a",en:"Rapidly changing load without difficulty",ta:"சுமை வேகமாக மாறும் திறன்"},
      {k:"b",en:"Operating cost is low compared to nuclear and hydro",ta:"செயல்பாட்டு செலவு குறைவு"},
      {k:"c",en:"Requires less space than hydro-electric plants",ta:"நீர்மின் நிலையத்தைவிட குறைந்த இடம்"},
      {k:"d",en:"Fuel (coal) is inexpensive",ta:"எரிபொருள் (நிலக்கரி) மலிவானது"}
    ],
    ans:"b",
    exp:"Operating cost of thermal power plant is HIGH compared to hydro and nuclear. Order: Diesel > Steam > Nuclear > Hydro.",
    exp_ta:"வெப்ப மின் நிலையத்தின் இயக்கச் செலவு, நீர்மின் மற்றும் அணுமின் நிலையங்களைவிட அதிகம்."
  },
  {
    section:"thermal",
    num:"II.115",
    en:"Ash from steam power plant is NOT used for:",
    ta:"நீராவி மின் நிலையத்தின் சாம்பல் எதற்காக பயன்படுத்தப்படுவதில்லை?",
    opts:[
      {k:"a",en:"Production of concrete",ta:"கான்கிரீட் தயாரிப்பு"},
      {k:"b",en:"Production of cement",ta:"சிமெண்ட் தயாரிப்பு"},
      {k:"c",en:"Recovery of metals like Fe, Si, Ti",ta:"இரும்பு, சிலிக்கான் உலோக மீட்பு"},
      {k:"d",en:"Treating neutral soils to increase crop yield",ta:"நடுநிலை மண்ணை சோதிக்க"}
    ],
    ans:"d",
    exp:"Coal ash is used in concrete, cement, and metal recovery. It is NOT used for treating neutral soils.",
    exp_ta:"சாம்பலை நடுநிலை மண்ணுக்கு பயன்படுத்துவதில்லை."
  },
  {
    section:"thermal",
    num:"II.116",
    en:"Which is NOT a reason why mechanical coal handling is preferred over manual handling?",
    ta:"இயந்திர நிலக்கரி கையாளுதல் கைமுறை கையாளுதலை விட விரும்பப்படுவதற்கு காரணம் அல்லாதது?",
    opts:[
      {k:"a",en:"Capital cost of mechanical handling is low",ta:"இயந்திர கையாளுதலின் மூலதன செலவு குறைவு"},
      {k:"b",en:"Can be adjusted economically as needed",ta:"தேவைக்கு ஏற்ப சரிசெய்யலாம்"},
      {k:"c",en:"Operation is easy and smooth",ta:"இயக்கம் எளிதானது"},
      {k:"d",en:"Less labour required",ta:"குறைந்த தொழிலாளர் தேவை"}
    ],
    ans:"a",
    exp:"Capital cost of mechanical handling is HIGH compared to manual handling – that is NOT an advantage.",
    exp_ta:"இயந்திர கையாளுதலின் மூலதன செலவு அதிகம் – இது நன்மையல்ல."
  },
  {
    section:"thermal",
    num:"II.117",
    en:"Which type is an electrical dust collector in steam power plants?",
    ta:"நீராவி மின் நிலையங்களில் மின் தூசு சேகரிப்பான் வகை எது?",
    opts:[
      {k:"a",en:"Rod type",ta:"கோல் வகை"},
      {k:"b",en:"Packed type",ta:"மூட்டை வகை"},
      {k:"c",en:"Cyclone separators",ta:"சுழல் பிரிகை"},
      {k:"d",en:"Spray type",ta:"தெளிப்பு வகை"}
    ],
    ans:"a",
    exp:"Rod type is an electrical dust collector used in steam power plants.",
    exp_ta:"கோல் வகை என்பது நீராவி மின் நிலையங்களில் பயன்படும் மின் தூசு சேகரிப்பான்."
  },
  {
    section:"thermal",
    num:"II.118",
    en:"Which is NOT a component of a modern steam power plant?",
    ta:"நவீன நீராவி மின் நிலையத்தின் கூறு அல்லாதது எது?",
    opts:[
      {k:"a",en:"Ash precipitators",ta:"சாம்பல் மழை கலன்"},
      {k:"b",en:"Wagon tippler",ta:"வேகன் டிப்பர்"},
      {k:"c",en:"Switch yard",ta:"சுவிட்ச் முற்றம்"},
      {k:"d",en:"Induced draught mill",ta:"தூண்டல் வரைவு ஆலை"}
    ],
    ans:"d",
    exp:"Induced draught mill is NOT a component of a modern steam power plant.",
    exp_ta:"தூண்டல் வரைவு ஆலை நவீன நீராவி மின் நிலையத்தில் இல்லை."
  },
  {
    section:"thermal",

        thermal: ['THERMAL POWER PLANT — CONTINUED', 'வெப்ப மின் நிலையம் — தொடர்'],
        hydro: ['HYDRO POWER PLANT', 'நீர்மின் நிலையம்'],
        nuclear: ['NUCLEAR POWER PLANT', 'அணு மின் நிலையம்']
      };
      label.innerHTML = `<span>${sectionNames[q.section][0]}</span><span class="tamil-s">${sectionNames[q.section][1]}</span>`;
      container.appendChild(label);
      lastSection = q.section;
    }

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-card-${i}`;

    const ua = userAnswers[i];
    if (ua) {
      card.classList.add(ua === q.ans ? 'answered-correct' : 'answered-wrong');
    }

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.num}</div>
        <div class="q-text">${q.en}</div>
      </div>
      <div class="q-tamil">${q.ta}</div>
      ${q.src ? `<div class="q-source">${q.src}</div>` : ''}
      <div class="options" id="opts-${i}">
        ${q.opts.map(opt => `
          <button class="opt-btn${ua === opt.k ? (ua === q.ans ? ' correct' : ' wrong') : (ua && opt.k === q.ans ? ' reveal' : '')}"
            id="opt-${i}-${opt.k}"
            ${ua ? 'disabled' : ''}
            onclick="selectAnswer(${i},'${opt.k}')">
            <span class="opt-key">${opt.k.toUpperCase()}.</span>
            <span class="opt-text">${opt.en}<span class="opt-tamil">${opt.ta}</span></span>
          </button>
        `).join('')}
      </div>
      <div class="explanation${ua ? ' show' : ''}" id="expl-${i}">
        <strong>Answer: ${q.ans.toUpperCase()}</strong> — ${q.exp}
        <span class="expl-tamil">${q.exp_ta}</span>
      </div>
    `;

    container.appendChild(card);
  });

  updateScoreBar();
}

function selectAnswer(idx, key) {
  if (userAnswers[idx]) return;
  userAnswers[idx] = key;
  const q = questions[idx];
  const correct = key === q.ans;

  if (correct) totalCorrect++; else totalWrong++;
  totalAnswered++;

  // Update card
  const card = document.getElementById(`q-card-${idx}`);
  card.classList.add(correct ? 'answered-correct' : 'answered-wrong');

  // Update buttons
  q.opts.forEach(opt => {
    const btn = document.getElementById(`opt-${idx}-${opt.k}`);
    btn.disabled = true;
    if (opt.k === key) btn.classList.add(correct ? 'correct' : 'wrong');
    else if (opt.k === q.ans && !correct) btn.classList.add('reveal');
  });

  // Show explanation
  document.getElementById(`expl-${idx}`).classList.add('show');
  updateScoreBar();
}

function updateScoreBar() {
  const total = questions.length;
  const pct = total > 0 ? Math.round((totalCorrect / total) * 100) : 0;
  document.getElementById('scoreVal').textContent = pct + '%';
  document.getElementById('correctVal').textContent = totalCorrect;
  document.getElementById('wrongVal').textContent = totalWrong;
  document.getElementById('skipVal').textContent = total - totalAnswered;
  const fillPct = (totalAnswered / total) * 100;
  document.getElementById('progressFill').style.width = fillPct + '%';
  document.getElementById('progressText').textContent = `${totalAnswered} / ${total} answered`;
}

function showAll() {
  document.querySelectorAll('.q-card').forEach(c => c.style.display = '');
  document.querySelectorAll('.section-label').forEach(l => l.style.display = '');
}

function showUnanswered() {
  document.querySelectorAll('.q-card').forEach((c, i) => {
    c.style.display = userAnswers[i] ? 'none' : '';
  });
  document.querySelectorAll('.section-label').forEach(l => l.style.display = '');
}

function submitQuiz() {
  const total = questions.length;
  const skipped = total - totalAnswered;
  const pct = Math.round((totalCorrect / total) * 100);

  document.getElementById('modalPct').textContent = pct + '%';
  document.getElementById('mCorrect').textContent = totalCorrect;
  document.getElementById('mWrong').textContent = totalWrong;
  document.getElementById('mSkip').textContent = skipped;

  let grade = '';
  if (pct >= 90) grade = '🏆 Excellent! Outstanding Performance';
  else if (pct >= 75) grade = '✅ Very Good — Keep it up!';
  else if (pct >= 60) grade = '👍 Good — Review marked topics';
  else if (pct >= 40) grade = '📚 Average — More revision needed';
  else grade = '⚠️ Needs Improvement — Revise thoroughly';

  document.getElementById('modalGrade').textContent = grade;
  document.getElementById('resultModal').classList.add('show');
}

function closeModal() {
  document.getElementById('resultModal').classList.remove('show');
  showAll();
}

function resetQuiz() {
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  totalAnswered = 0; totalCorrect = 0; totalWrong = 0;
  document.getElementById('resultModal').classList.remove('show');
  buildQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Init
buildQuiz();
</script>
</body>
</html>
