name: Build and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Opt into Node.js 24 runtime to clear the deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # v5 is the latest version for Node 24 compatibility
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # We removed 'cache: npm' to fix the "Lock file not found" error.
          # This is the safest way to get your build passing immediately.

      - name: Install dependencies
        # This will create a fresh environment every time
        run: npm install

      - name: Run Build
        # This runs your build script defined in package.json
        run: npm run build

      # v5 ensures the artifact upload works with the new Node runtime
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v5
        with:
          name: production-files
          path: dist/
