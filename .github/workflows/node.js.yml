name: Build and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Opt into Node.js 24 immediately to clear deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Updated to v5 (Supports Node 24)
      - name: Checkout repository
        uses: actions/checkout@v5

      # Ensure your environment is using Node 24 for your own scripts/builds
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Build
        run: npm run build

      # Updated to v5 (Supports Node 24)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v5
        with:
          name: production-files
          path: dist/
