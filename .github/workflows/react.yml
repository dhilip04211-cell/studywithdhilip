name: React CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Upload Build Artifact
        # This saves your 'dist' or 'build' folder to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: ./dist # Change this to 'build' if you use Create React App
