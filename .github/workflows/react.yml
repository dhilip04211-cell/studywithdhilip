name: React CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        # This will now run in the root folder, not in .github/workflows
        run: npm install

      - name: Run build
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present
