let current = 0;
let score = 0;
let userAnswers = new Array(questions.length).fill(null);

document.getElementById('totalQ').textContent = questions.length;

function renderQuestion() {
  const q = questions[current];
  document.getElementById('qNum').textContent = current + 1;
  document.getElementById('progressBar').style.width = ((current+1)/questions.length*100) + '%';

  const container = document.getElementById('questionContainer');
  let html = `<div class="question-card">
    <div class="q-num">${current+1}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">`;

  q.options.forEach((opt, idx) => {
    let cls = "option";
    if (userAnswers[current] !== null) {
      cls += " disabled";
      if (idx === q.answer) cls += " correct";
      else if (idx === userAnswers[current]) cls += " incorrect";
    }
    html += `<div class="${cls}" onclick="selectOption(${idx})">${String.fromCharCode(65+idx)}) ${opt}</div>`;
  });

  html += `</div>`;
  if (userAnswers[current] !== null) {
    html += `<div class="explain show">✅ சரியான விடை: <b>${String.fromCharCode(65+q.answer)}) ${q.options[q.answer]}</b></div>`;
  }
  html += `</div>`;
  container.innerHTML = html;

  document.getElementById('prevBtn').disabled = (current === 0);
  document.getElementById('nextBtn').textContent = (current === questions.length - 1) ? "முடி" : "அடுத்தது";
  document.getElementById('nextBtn').disabled = (userAnswers[current] === null);
  document.getElementById('score').textContent = score;
}

function selectOption(idx) {
  if (userAnswers[current] !== null) return; // already answered, lock
  userAnswers[current] = idx;
  if (idx === questions[current].answer) score++;
  renderQuestion();
}

document.getElementById('nextBtn').addEventListener('click', () => {
  if (userAnswers[current] === null) return; // cannot skip
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showFinal();
  }
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (current > 0) {
    current--;
    renderQuestion();
  }
});

function showFinal() {
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('finalScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalTotal').textContent = questions.length;
  const pct = ((score/questions.length)*100).toFixed(1);
  document.getElementById('finalPercent').textContent = "சதவீதம்: " + pct + "%";
}

function restartQuiz() {
  current = 0;
  score = 0;
  userAnswers = new Array(questions.length).fill(null);
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('finalScreen').classList.add('hidden');
  renderQuestion();
}

renderQuestion();
</script>
