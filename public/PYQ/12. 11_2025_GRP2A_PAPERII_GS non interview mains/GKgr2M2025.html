<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE/GS2AM/2026 – Group 2A Paper II Quiz</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c8eff;
    --accent2: #a78bfa;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --tamil: #f0c060;
    --gold: #fbbf24;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%); border-bottom: 2px solid var(--border); padding: 20px 24px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  .header h1 { font-size: 1.3rem; color: var(--accent); letter-spacing: 1px; }
  .header p { font-size: 0.8rem; color: var(--text2); margin-top: 4px; }
  .progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; }
  .stats { display: flex; justify-content: center; gap: 24px; margin-top: 10px; }
  .stat { font-size: 0.75rem; color: var(--text2); }
  .stat span { color: var(--accent); font-weight: 700; }

  /* MAIN */
  .container { max-width: 820px; margin: 0 auto; padding: 20px 16px 100px; }

  /* QUESTION CARD */
  .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 24px; overflow: hidden; transition: border-color 0.3s; }
  .question-card.answered { border-color: var(--border); }
  .question-card.correct-card { border-color: var(--correct); }
  .question-card.wrong-card { border-color: var(--wrong); }

  .q-header { background: var(--surface2); padding: 14px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
  .q-num { background: var(--accent); color: #fff; border-radius: 6px; font-size: 0.8rem; font-weight: 700; padding: 3px 10px; min-width: 36px; text-align: center; }
  .q-section { font-size: 0.7rem; color: var(--accent2); }
  .q-status { margin-left: auto; font-size: 1.2rem; }

  .q-body { padding: 18px; }
  .q-english { font-size: 0.97rem; line-height: 1.6; color: var(--text); margin-bottom: 12px; }
  .q-tamil { font-size: 0.92rem; line-height: 1.7; color: var(--tamil); margin-bottom: 14px; font-style: italic; border-left: 3px solid var(--gold); padding-left: 10px; }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; background: var(--surface2); }
  .option:hover:not(.disabled) { border-color: var(--accent); background: rgba(108,142,255,0.08); }
  .option.selected { border-color: var(--accent); background: rgba(108,142,255,0.15); }
  .option.correct { border-color: var(--correct); background: rgba(34,197,94,0.12); }
  .option.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.12); }
  .option.disabled { cursor: default; }
  .opt-label { font-weight: 700; color: var(--accent); min-width: 22px; font-size: 0.85rem; margin-top: 1px; }
  .opt-text { font-size: 0.9rem; line-height: 1.5; }
  .opt-text .tam { display: block; color: var(--tamil); font-size: 0.83rem; margin-top: 3px; }

  /* FEEDBACK */
  .feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: rgba(34,197,94,0.12); color: var(--correct); border: 1px solid rgba(34,197,94,0.3); }
  .feedback.wrong { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }

  /* RESULT PANEL */
  .result-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .result-panel.show { display: flex; }
  .result-box { background: var(--surface); border: 2px solid var(--accent); border-radius: 20px; padding: 40px 32px; max-width: 480px; width: 100%; text-align: center; }
  .result-title { font-size: 2rem; font-weight: 800; color: var(--accent); }
  .result-score { font-size: 4rem; font-weight: 900; margin: 16px 0; }
  .result-score.excellent { color: var(--correct); }
  .result-score.good { color: var(--gold); }
  .result-score.average { color: #fb923c; }
  .result-score.poor { color: var(--wrong); }
  .result-details { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 20px 0; }
  .result-stat { background: var(--surface2); border-radius: 10px; padding: 12px 8px; }
  .result-stat .num { font-size: 1.5rem; font-weight: 800; }
  .result-stat .lbl { font-size: 0.72rem; color: var(--text2); }
  .result-msg { color: var(--text2); font-size: 0.9rem; margin-bottom: 20px; }
  .btn { display: inline-block; padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 700; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5a7de8; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); margin-left: 10px; }

  /* SUBMIT BTN */
  .submit-area { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 14px 20px; display: flex; justify-content: center; align-items: center; gap: 16px; z-index: 100; }
  .submit-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; padding: 13px 40px; border-radius: 10px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(108,142,255,0.4); }
  .submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
  .answered-count { color: var(--text2); font-size: 0.85rem; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .q-english { font-size: 0.9rem; }
    .opt-text { font-size: 0.83rem; }
    .result-score { font-size: 3rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 RE/GS2AM/2026 — Group 2A Paper II</h1>
  <p>பகுதி-அ & பகுதி-ஆ | Part-A & Part-B | Questions 1–100</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="stats">
    <div class="stat">Answered: <span id="answeredCount">0</span>/100</div>
    <div class="stat">Correct: <span id="correctCount" style="color:var(--correct)">0</span></div>
    <div class="stat">Wrong: <span id="wrongCount" style="color:var(--wrong)">0</span></div>
  </div>
</div>

<div class="container" id="quizContainer"></div>

<div class="submit-area">
  <span class="answered-count" id="bottomCount">0 / 100 answered</span>
  <button class="submit-btn" id="submitBtn" onclick="submitQuiz()">Submit Quiz</button>
</div>

<!-- Result Panel -->
<div class="result-panel" id="resultPanel">
  <div class="result-box">
    <div class="result-title">🎯 Results</div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-details">
      <div class="result-stat"><div class="num" id="resCorrect" style="color:var(--correct)">0</div><div class="lbl">✅ Correct</div></div>
      <div class="result-stat"><div class="num" id="resWrong" style="color:var(--wrong)">0</div><div class="lbl">❌ Wrong</div></div>
      <div class="result-stat"><div class="num" id="resSkipped" style="color:var(--text2)">0</div><div class="lbl">⏭ Skipped</div></div>
    </div>
    <p class="result-msg" id="resMsg"></p>
    <button class="btn btn-primary" onclick="retryQuiz()">🔁 Retry</button>
    <button class="btn btn-secondary" onclick="closeResult()">📖 Review</button>
  </div>
</div>

<script>
const questions = [
  {
    n:1,
    en:"Which of the following statement/s is/are true about Papa Umanath of Tamil Nadu?\n(1) She was the first woman in South India to have been arrested by the British for Salt Sathyagraha.\n(2) She organised a Peasant movement in Thuvariman Village.\n(3) She became part of the Ponmalai Women's Association.\n(4) She joined the Congress Party in 1945.",
    ta:"கீழ்க்காண்பவற்றுள் தமிழ்நாட்டில் பாப்பா உமாநாத் பற்றிய உண்மையான கூற்றுகள் யாவை?\n(1) உப்புச் சத்தியாகிரகத்திற்காக ஆங்கிலேயரால் கைது செய்யப்பட்ட முதல் தென்னிந்தியப் பெண்மணி\n(2) துவரிமான் கிராமத்தில் ஒரு குடியானவர் இயக்கத்தினை நிறுவினார்.\n(3) பொன்மலை பெண்கள் கூட்டமைப்பில் ஒரு அங்கமானார்.\n(4) 1945-ல் காங்கிரஸ் கட்சியில் இணைந்தார்.",
    opts:["(A) (1) and (2) are true / (1) மற்றும் (2) சரியானவை","(B) (2) and (4) are true / (2) மற்றும் (4) சரியானவை","(C) (1) and (4) are true / (1) மற்றும் (4) சரியானவை","(D) (2) and (3) are true / (2) மற்றும் (3) சரியானவை","(E) Answer not known / விடை தெரியவில்லை"],
    ans:3
  },
  {
    n:2,
    en:"Which is/are the following facts about Thomas Munroe correct?\n(i) He introduced Ryotwari system.\n(ii) He donated a big vessel to Tirupathi Tirumala temple.\n(iii) He replaced pagoda with rupee.",
    ta:"பின்வரும் கூற்றுகளில் தாமஸ் மன்றோ குறித்து எது/எவை சரியானவை?\n(i) இரயத்துவாரி முறையை அறிமுகப்படுத்தினார்.\n(ii) திருமலை திருப்பதி கோயிலுக்குப் பெரிய கொப்பரை ஒன்றை அன்பளிப்பாக வழங்கினார்.\n(iii) பகோடா நாணயங்களுக்குப் பதிலாக ரூபாய் நாணயங்களை இடம்பெறச் செய்தார்.",
    opts:["(A) (i) only / (i) மட்டும்","(B) (ii) and (iii) only / (ii) மற்றும் (iii) மட்டும்","(C) (i) and (ii) only / (i) மற்றும் (ii) மட்டும்","(D) (i) and (iii) only / (i) மற்றும் (iii) மட்டும்","(E) Answer not known / விடை தெரியவில்லை"],
    ans:2

  {
    n:3,
    en:"\"Speaking bitterly when sweet words prevail, is eating the sour for ripe fruits\" — in this couplet, which of the following human values is stressed for human good relations?",
    ta:"\"இனிய உளவாக இன்னாத கூறல் கனியிருப்பக் காய்கவர்ந்தற்று\" என்ற குறட்பாவில் மனித உறவுகள் இனிமையாகத் திகழ வலியுறுத்தப்படும் பண்பு எது?",
    opts:["(A) Not to use harsh words / கடுமையான சொற்களைப் பயன்படுத்தாமை","(B) Not to speak meaningless words / பயனற்ற சொற்களைக் கூறாமை","(C) Not to speak untruthful words / உண்மையற்ற சொற்களைப் பேசாமை","(D) Not to use unknowledgeable words / அறிவின் வழி வாராச் சொற்களைச் சொல்லாமை","(E) Answer not known / விடை தெரியவில்லை"],
    ans:0
  },
  {
    n:4,
    en:"According to Valluvar to whom poverty will be pondered?",
    ta:"யாருடைய வறுமை நினைக்கப்படும் என்று வள்ளுவர் கூறுகிறார்?",
    opts:["(A) Righteous / நேர்மையானவர்","(B) Thieves / திருடர்","(C) Baseness / கயவர்","(D) Evil friends / தீ நட்பு","(E) Answer not known / விடை தெரியவில்லை"],
    ans:1
  },
  {
    n:5,
    en:"Choose the correct matches from the given matches:\n(1) Chera King – Vanji–Thondi\n(2) Chola King – Madurai–Korkai\n(3) Pandiya king – Uraiyur–Poombugar\n(4) King Ashoka – Samba Inscription",
    ta:"சரியாகப் பொருந்தியுள்ளவற்றைத் தேர்வு செய்க.\n(1) சேர அரசர் – வஞ்சி–தொண்டி\n(2) சோழ அரசர் – மதுரை–கொற்கை\n(3) பாண்டிய அரசர் – உறையூர்–பூம்புகார்\n(4) அசோக மன்னன் – சம்பா கல்வெட்டு",

    ta:"கீழ்க்கண்ட கூற்றுகளை ஆராய்ந்து சரியான கூற்றுகளை தேர்ந்தெடுக்க. பேரறிஞர் அண்ணா ஆட்சியில் தமிழ் மொழிக்கு முன்னுரிமை அளிக்கப்பட்டது.\n(i) 'சத்யமேவ ஜயதே' என்ற சொற்கள் அரசு இலச்சினையில் இருந்து நீக்கப்பட்டு, 'வாய்மையே வெல்லும்' என்னும் தமிழ் சொற்கள் சேர்க்கப்பட்டன.\n(ii) சேயின்ட் ஜார்ஜ் கோட்டையில் முதன் முறையாக 'தமிழக அரசு தலைமைச் செயலகம்' என்ற பெயர்ப் பலகை திறக்கப்பட்டது.\n(iii) தமிழக அரசுப் பேருந்துகளில் திருக்குறள் வசனங்கள் எழுதி வைக்க நடவடிக்கை எடுக்கப்பட்டது.",

// State
let userAnswers = new Array(100).fill(-1);
let submitted = false;

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `q${idx}`;
    const secLabel = q.n <= 100 ? (q.n <= 60 ? 'Part-A' : 'Part-B') : '';
    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${q.n}</span>
        <span class="q-section">${secLabel}</span>
        <span class="q-status" id="status-${idx}">⬜</span>
      </div>
      <div class="q-body">
        <div class="q-english">${q.en.replace(/\n/g,'<br>')}</div>
        <div class="q-tamil">${q.ta.replace(/\n/g,'<br>')}</div>
        <div class="options" id="opts-${idx}">
          ${q.opts.map((opt,oi)=>`
            <div class="option" id="opt-${idx}-${oi}" onclick="selectOption(${idx},${oi})">
              <span class="opt-label">${String.fromCharCode(65+oi)}</span>
              <span class="opt-text">${opt}</span>
            </div>
          `).join('')}
        </div>
        <div class="feedback" id="fb-${idx}"></div>
      </div>`;
    container.appendChild(card);
  });
  updateStats();
}

function selectOption(qIdx, optIdx) {
  if(submitted) return;
  userAnswers[qIdx] = optIdx;
  const opts = document.querySelectorAll(`#opts-${qIdx} .option`);
  opts.forEach((o,i) => {
    o.classList.remove('selected');
    if(i === optIdx) o.classList.add('selected');
  });
  document.getElementById(`status-${qIdx}`).textContent = '✏️';
  updateStats();
}

function updateStats() {
  const answered = userAnswers.filter(a => a !== -1).length;
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('bottomCount').textContent = `${answered} / 100 answered`;
  document.getElementById('progressFill').style.width = `${answered}%`;
  if(!submitted) {
    let c=0,w=0;
    userAnswers.forEach((a,i) => { if(a!==-1){if(a===questions[i].ans)c++;else w++;} });
    document.getElementById('correctCount').textContent = c;
    document.getElementById('wrongCount').textContent = w;
  }
}

function submitQuiz() {
  if(submitted) return;
  submitted = true;
  let correct=0, wrong=0, skipped=0;
  questions.forEach((q,i) => {
    const ua = userAnswers[i];
    const card = document.getElementById(`q${i}`);
    const opts = document.querySelectorAll(`#opts-${i} .option`);
    const fb = document.getElementById(`fb-${i}`);
    opts.forEach(o => o.classList.add('disabled'));
    if(ua === -1){
      skipped++;
      document.getElementById(`status-${i}`).textContent = '⏭';
      opts[q.ans].classList.add('correct');
      fb.className = 'feedback show wrong';
      fb.innerHTML = `⏭ Skipped! Correct: <strong>${String.fromCharCode(65+q.ans)}</strong>`;
    } else if(ua === q.ans){
      correct++;
      card.classList.add('correct-card');
      opts[ua].classList.add('correct');
      document.getElementById(`status-${i}`).textContent = '✅';
      fb.className = 'feedback show correct';
      fb.innerHTML = `✅ Correct! / சரியான விடை!`;
    } else {
      wrong++;
      card.classList.add('wrong-card');
      opts[ua].classList.add('wrong');
      opts[q.ans].classList.add('correct');
      document.getElementById(`status-${i}`).textContent = '❌';
      fb.className = 'feedback show wrong';
      fb.innerHTML = `❌ Wrong! Correct answer: <strong>${String.fromCharCode(65+q.ans)}</strong> — ${q.opts[q.ans]}`;
    }
  });
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  const pct = Math.round((correct/100)*100);
  document.getElementById('resultScore').textContent = `${pct}%`;
  const cls = pct>=75?'excellent':pct>=50?'good':pct>=35?'average':'poor';
  document.getElementById('resultScore').className = `result-score ${cls}`;
  document.getElementById('resCorrect').textContent = correct;
  document.getElementById('resWrong').textContent = wrong;
  document.getElementById('resSkipped').textContent = skipped;
  const msgs = pct>=75?'🎉 Excellent! You are well-prepared! | நீங்கள் நன்றாக தயாரிப்பு செய்துள்ளீர்கள்!':
    pct>=50?'👍 Good effort! Keep practicing! | நல்ல முயற்சி! தொடர்ந்து பயிற்சி செய்யுங்கள்!':
    pct>=35?'📚 Keep studying! You can do better! | தொடர்ந்து படியுங்கள்!':
    '💪 More practice needed. Don\'t give up! | மேலும் பயிற்சி தேவை!';
  document.getElementById('resMsg').innerHTML = msgs;
  document.getElementById('resultPanel').classList.add('show');
  document.getElementById('submitBtn').disabled = true;
}

function retryQuiz() {
  submitted = false;
  userAnswers = new Array(100).fill(-1);
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('submitBtn').disabled = false;
  renderQuiz();
  window.scrollTo(0,0);
}

function closeResult() {
  document.getElementById('resultPanel').classList.remove('show');
}

renderQuiz();
</script>
</body>
</html>
