<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS & Aptitude Quiz – Code 503 | Q.101–200</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tiro+Tamil:ital@0;1&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1826;
    --card: #211f30;
    --border: #2e2b42;
    --accent: #ff6b35;
    --accent2: #ffd700;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e8e6f0;
    --muted: #8b88a8;
    --progress-bg: #2e2b42;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(255,107,53,0.06) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(255,215,0,0.04) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,107,53,0.08) 0%, transparent 100%);
  }
  header .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.3rem 0.9rem;
    border-radius: 2rem;
    margin-bottom: 0.8rem;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--text);
    line-height: 1.15;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.4rem;
  }

  /* PROGRESS */
  #progress-bar-wrap {
    width: 100%;
    height: 4px;
    background: var(--progress-bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #progress-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.4s ease;
  }

  /* STATS */
  #stats-bar {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    padding: 0.8rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 4px;
    z-index: 99;
  }
  .stat {
    font-size: 0.82rem;
    font-weight: 500;
  }
  .stat span { font-weight: 700; }
  .stat.correct span { color: var(--correct); }
  .stat.wrong span { color: var(--wrong); }
  .stat.total span { color: var(--accent2); }

  /* CONTAINER */
  .quiz-container {
    max-width: 820px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 1.6rem;
    margin-bottom: 1.4rem;
    transition: border-color 0.2s;
  }
  .q-card:hover { border-color: rgba(255,107,53,0.3); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }
  .q-num {
    background: var(--accent);
    color: #fff;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 0.18rem;
  }
  .q-text {
    font-size: 0.96rem;
    line-height: 1.55;
    color: var(--text);
  }
  .q-text .en { display: block; font-weight: 500; }
  .q-text .ta {
    display: block;
    font-family: 'Tiro Tamil', serif;
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  /* OPTIONS */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.55rem;
    margin-top: 0.6rem;
  }
  @media (max-width: 560px) { .options { grid-template-columns: 1fr; } }

  .opt-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    text-align: left;
    cursor: pointer;
    font-size: 0.84rem;
    line-height: 1.45;
    color: var(--text);
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    font-family: 'DM Sans', sans-serif;
  }
  .opt-btn:hover:not(:disabled) {
    background: rgba(255,107,53,0.1);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .opt-btn .opt-label {
    font-weight: 700;
    color: var(--accent);
    margin-right: 0.3rem;
  }
  .opt-btn .ta-part {
    font-family: 'Tiro Tamil', serif;
    color: var(--muted);
    font-size: 0.8rem;
    display: block;
    margin-top: 0.1rem;
  }

  /* Answer states */
  .opt-btn.correct {
    background: rgba(34,197,94,0.15);
    border-color: var(--correct);
    color: var(--correct);
  }
  .opt-btn.wrong {
    background: rgba(239,68,68,0.15);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .opt-btn:disabled { cursor: default; transform: none; }

  /* Feedback */
  .feedback {
    margin-top: 0.6rem;
    font-size: 0.8rem;
    display: none;
    align-items: center;
    gap: 0.4rem;
  }
  .feedback.show { display: flex; }
  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }

  /* RESULT PANEL */
  #result-panel {
    display: none;
    max-width: 620px;
    margin: 2rem auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
  }
  #result-panel h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    margin-bottom: 0.4rem;
  }
  .score-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 4px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 1.5rem auto;
    box-shadow: 0 0 30px rgba(255,107,53,0.2);
  }
  .score-circle .pct { font-size: 2.2rem; font-weight: 700; color: var(--accent); }
  .score-circle .lbl { font-size: 0.72rem; color: var(--muted); }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    margin: 1.5rem 0;
  }
  .result-item { background: var(--surface); border-radius: 10px; padding: 0.9rem; }
  .result-item .num { font-size: 1.8rem; font-weight: 700; }
  .result-item .desc { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
  .result-item.c .num { color: var(--correct); }
  .result-item.w .num { color: var(--wrong); }
  .result-item.s .num { color: var(--accent2); }
  .grade { font-size: 1.1rem; margin: 0.5rem 0; font-weight: 600; }

  .retry-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.8rem 2.2rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1rem;
    transition: opacity 0.2s;
  }
  .retry-btn:hover { opacity: 0.85; }

  /* Section divider */
  .section-label {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 2rem 0 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Submit button */
  #submit-btn {
    display: block;
    margin: 2rem auto 0;
    background: linear-gradient(135deg, var(--accent), #e85d04);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 1rem 3rem;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.15s, opacity 0.2s;
    box-shadow: 0 4px 20px rgba(255,107,53,0.3);
  }
  #submit-btn:hover { transform: translateY(-2px); opacity: 0.92; }
</style>
</head>

// State
let correct = 0, wrong = 0, attempted = 0;

function updateStats() {
  document.getElementById('s-att').textContent = attempted;
  document.getElementById('s-cor').textContent = correct;
  document.getElementById('s-wrg').textContent = wrong;
  document.getElementById('s-scr').textContent = correct + ' / ' + questions.length;
  const pct = Math.round((attempted / questions.length) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
}

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';

  // Section dividers
  const sections = [
    {start:101, label:'Part-B: General Studies (Q.101–175) · பொது அறிவு'},
    {start:176, label:'Part-B: Aptitude & Mental Ability (Q.176–200) · திறன் அறிவு'},
  ];

  questions.forEach((q, idx) => {
    const num = q.n;
    if (num === 176) {
      const div = document.createElement('div');
      div.className = 'section-label';
      div.textContent = 'Part-B: Aptitude & Mental Ability (Q.176–200) · திறன் அறிவு';
      container.appendChild(div);
    } else if (idx === 0) {
      const div = document.createElement('div');
      div.className = 'section-label';
      div.textContent = 'Part-B: General Studies (Q.101–175) · பொது அறிவு';
      container.appendChild(div);
    }

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'card-' + num;

    const hdr = document.createElement('div');
    hdr.className = 'q-header';
    hdr.innerHTML = `<span class="q-num">Q.${num}</span>
      <div class="q-text">
        <span class="en">${q.en}</span>
        <span class="ta">${q.ta}</span>
      </div>`;
    card.appendChild(hdr);

    const opts = document.createElement('div');
    opts.className = 'options';
    q.opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.dataset.q = num;
      btn.dataset.opt = opt.l;
      btn.innerHTML = `<span class="opt-label">${opt.l}.</span>${opt.en}<span class="ta-part">${opt.ta}</span>`;
      btn.addEventListener('click', handleAnswer);
      opts.appendChild(btn);
    });
    card.appendChild(opts);

    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.id = 'fb-' + num;
    card.appendChild(fb);

    container.appendChild(card);
  });

  const subBtn = document.createElement('button');
  subBtn.id = 'submit-btn';
  subBtn.textContent = '📊 View Final Results';
  subBtn.addEventListener('click', showResults);
  container.appendChild(subBtn);
}

function handleAnswer(e) {
  const btn = e.currentTarget;
  const qNum = parseInt(btn.dataset.q);
  const chosen = btn.dataset.opt;
  const q = questions.find(x => x.n === qNum);
  const card = document.getElementById('card-' + qNum);
  const fb = document.getElementById('fb-' + qNum);

  // Disable all buttons in this card
  card.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.opt === q.ans) b.classList.add('correct');
    if (b.dataset.opt === chosen && chosen !== q.ans) b.classList.add('wrong');
  });

  attempted++;
  if (chosen === q.ans) {
    correct++;
    fb.className = 'feedback correct show';
    fb.innerHTML = '✅ Correct! · சரியான விடை';
  } else {
    wrong++;
    fb.className = 'feedback wrong show';
    fb.innerHTML = `❌ Wrong · தவறு – Correct: <strong>${q.ans}</strong>`;
  }
  updateStats();
}

function showResults() {
  const pct = Math.round((correct / questions.length) * 100);
  let grade = '', color = '';
  if (pct >= 80) { grade = '🏆 Excellent / சிறப்பு'; color = '#ffd700'; }
  else if (pct >= 60) { grade = '👍 Good / நல்லது'; color = '#22c55e'; }
  else if (pct >= 40) { grade = '📘 Average / சராசரி'; color = '#3b82f6'; }
  else { grade = '📖 Needs Improvement / மேலும் படிக்கவும்'; color = '#ef4444'; }

  const panel = document.getElementById('result-panel');
  panel.style.display = 'block';
  panel.innerHTML = `
    <h2>Quiz Complete! 🎉</h2>
    <p style="color:var(--muted);margin-top:0.3rem">Questions 101–200 · Combined Technical Services Exam</p>
    <div class="score-circle">
      <span class="pct">${pct}%</span>
      <span class="lbl">Score</span>
    </div>
    <div class="grade" style="color:${color}">${grade}</div>
    <div class="result-grid">
      <div class="result-item c"><div class="num">${correct}</div><div class="desc">Correct · சரியானவை</div></div>
      <div class="result-item w"><div class="num">${wrong}</div><div class="desc">Wrong · தவறானவை</div></div>
      <div class="result-item s"><div class="num">${questions.length - attempted}</div><div class="desc">Skipped · தவிர்த்தவை</div></div>
    </div>
    <p style="color:var(--muted);font-size:0.85rem">Score: ${correct} out of ${questions.length}</p>
    <button class="retry-btn" onclick="location.reload()">🔄 Retry Quiz</button>
  `;
  panel.scrollIntoView({ behavior: 'smooth' });
}

buildQuiz();
updateStats();
</script>
