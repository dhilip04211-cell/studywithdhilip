<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTSDITET&amp;GS/2025 – Bilingual Quiz (Q101–Q200)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --primary: #1a56db;
    --primary-dark: #1e429f;
    --success: #057a55;
    --danger: #c81e1e;
    --warning: #d97706;
    --bg: #f0f4ff;
    --card: #ffffff;
    --border: #d1d5db;
    --text: #111827;
    --muted: #6b7280;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Noto Sans Tamil', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a56db 0%, #1e429f 100%);
    color: white;
    padding: 24px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(26,86,219,0.25);
  }
  header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.5px; }
  header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.25);
    border-radius: 99px;
    height: 8px;
    margin-top: 12px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #fbbf24;
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
    font-size: 0.78rem;
    flex-wrap: wrap;
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-correct  { background: #34d399; }
  .dot-wrong    { background: #f87171; }
  .dot-pending  { background: #fbbf24; }

  main {
    max-width: 860px;
    margin: 30px auto;
    padding: 0 16px 60px;
  }

  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 28px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s;
  }
  .question-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

  .q-header {
    background: #f8faff;
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .q-num {
    background: var(--primary);
    color: white;
    border-radius: 8px;
    padding: 3px 11px;
    font-size: 0.8rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .q-tag {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-history   { background: #fef3c7; color: #92400e; }
  .tag-polity    { background: #dbeafe; color: #1e40af; }
  .tag-economy   { background: #d1fae5; color: #065f46; }
  .tag-science   { background: #ede9fe; color: #5b21b6; }
  .tag-maths     { background: #fce7f3; color: #9d174d; }
  .tag-geography { background: #ecfdf5; color: #064e3b; }
  .tag-tamil     { background: #fff7ed; color: #92400e; }
  .tag-general   { background: #f3f4f6; color: #374151; }
  .tag-reasoning { background: #f0fdf4; color: #14532d; }

  .q-status-dot {
    margin-left: auto;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #e5e7eb;
    transition: background 0.3s;
  }

  .q-body { padding: 20px; }

  .q-text-en {
    font-size: 0.97rem;
    font-weight: 500;
    color: #1f2937;
    margin-bottom: 10px;
    line-height: 1.7;
  }
  .q-text-ta {
    font-size: 0.93rem;
    color: #374151;
    margin-bottom: 18px;
    padding: 10px 14px;
    background: #fefce8;
    border-left: 3px solid #fbbf24;
    border-radius: 6px;
    line-height: 1.8;
    font-family: 'Noto Sans Tamil', sans-serif;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: #f9fafb;
    border: 2px solid #e5e7eb;
    border-radius: 9px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    width: 100%;
    font-size: 0.92rem;
    color: var(--text);
    font-family: inherit;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: #eff6ff;
  }
  .option-btn:disabled { cursor: default; }

  .opt-label {
    min-width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #d1d5db;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 0.78rem;
    flex-shrink: 0;
    transition: all 0.18s;
    margin-top: 1px;
  }

  .opt-text { flex: 1; line-height: 1.55; }
  .opt-text .en { display: block; }
  .opt-text .ta { display: block; font-family: 'Noto Sans Tamil', sans-serif; color: #4b5563; font-size: 0.87rem; margin-top: 3px; }

  /* States */
  .option-btn.correct {
    border-color: var(--success) !important;
    background: #f0fdf4 !important;
  }
  .option-btn.correct .opt-label {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }
  .option-btn.wrong {
    border-color: var(--danger) !important;
    background: #fff5f5 !important;
  }
  .option-btn.wrong .opt-label {
    background: var(--danger);
    border-color: var(--danger);
    color: white;
  }
  .option-btn.show-correct {
    border-color: var(--success) !important;
    background: #f0fdf4 !important;
    opacity: 0.85;
  }
  .option-btn.show-correct .opt-label {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }

  .feedback {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; display: flex; align-items: center; gap: 8px; }
  .feedback.wrong   { background: #fee2e2; color: #991b1b; display: flex; align-items: center; gap: 8px; }

  /* Result Page */
  #result-page {
    display: none;
    max-width: 680px;
    margin: 40px auto;
    padding: 0 16px 60px;
  }
  .result-card {
    background: white;
    border-radius: 20px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }
  .result-emoji { font-size: 4rem; margin-bottom: 12px; }
  .result-title { font-size: 1.6rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
  .result-score {
    font-size: 3.5rem;
    font-weight: 800;
    color: var(--primary-dark);
    line-height: 1;
    margin: 16px 0;
  }
  .result-sub { font-size: 0.95rem; color: var(--muted); margin-bottom: 28px; }
  .result-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 14px;
    margin: 24px 0;
  }
  .result-box {
    border-radius: 12px;
    padding: 16px 10px;
    font-weight: 700;
  }
  .box-correct  { background: #d1fae5; color: #065f46; }
  .box-wrong    { background: #fee2e2; color: #991b1b; }
  .box-unanswered { background: #fef3c7; color: #92400e; }
  .result-box .num { font-size: 2rem; display: block; }
  .result-box .lbl { font-size: 0.78rem; font-weight: 500; margin-top: 4px; display: block; }

  .grade-bar-wrap {
    background: #e5e7eb;
    border-radius: 99px;
    height: 18px;
    overflow: hidden;
    margin: 20px 0 8px;
  }
  .grade-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 1s ease;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); margin-right: 10px; }
  .btn-outline:hover { background: #eff6ff; }

  .scroll-top {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 50%;
    width: 46px; height: 46px;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(26,86,219,0.3);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: transform 0.2s;
  }
  .scroll-top:hover { transform: scale(1.1); }

  .submit-wrap {
    text-align: center;
    padding: 20px 0 10px;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 1rem; }
    .q-text-en { font-size: 0.9rem; }
    .option-btn { font-size: 0.85rem; padding: 10px 12px; }
    .result-grid { grid-template-columns: repeat(3,1fr); gap: 10px; }
    .result-score { font-size: 2.8rem; }
  }
</style>
</head>
<body>

<header>
  <h1>📚 CTSDITET&amp;GS/2025 — Bilingual Quiz (Q101–Q200)</h1>
  <p>இருமொழி வினாடி வினா | General Studies &amp; Aptitude | 100 Questions</p>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
  <div class="stats-bar">
    <span class="stat"><span class="stat-dot dot-correct"></span><span id="statCorrect">0</span> Correct</span>
    <span class="stat"><span class="stat-dot dot-wrong"></span><span id="statWrong">0</span> Wrong</span>
    <span class="stat"><span class="stat-dot dot-pending"></span><span id="statPending">100</span> Pending</span>
  </div>
</header>

<main id="quiz-page">
  <div id="questions-container"></div>
  <div class="submit-wrap">
    <button class="btn btn-primary" onclick="submitQuiz()">🏁 Submit Quiz &amp; See Results | முடிவுகளைப் பார்க்க</button>
  </div>
</main>

<div id="result-page">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title">Quiz Completed! வினாடி வினா முடிந்தது!</div>
    <div class="result-score" id="resultScore">0/100</div>
    <div class="result-sub" id="resultPercent">Score: 0%</div>
    <div class="grade-bar-wrap">
      <div class="grade-bar-fill" id="gradeBar" style="width:0%"></div>
    </div>
    <div class="result-grid">
      <div class="result-box box-correct">
        <span class="num" id="rCorrect">0</span>
        <span class="lbl">✅ Correct<br>சரியான விடைகள்</span>
      </div>
      <div class="result-box box-wrong">
        <span class="num" id="rWrong">0</span>
        <span class="lbl">❌ Wrong<br>தவறான விடைகள்</span>
      </div>
      <div class="result-box box-unanswered">
        <span class="num" id="rUnanswered">0</span>
        <span class="lbl">⏭ Skipped<br>தவிர்க்கப்பட்டவை</span>
      </div>
    </div>
    <p id="gradeMsg" style="font-size:1rem;font-weight:600;margin-bottom:20px;"></p>
    <button class="btn btn-outline" onclick="reviewAnswers()">🔍 Review Answers</button>
    <button class="btn btn-primary" onclick="restartQuiz()">🔄 Restart Quiz</button>
  </div>
</div>

<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

// ─── State ───────────────────────────────────────────
let answered = new Array(questions.length).fill(null); // null | correct | wrong
let correct = 0, wrong = 0;

// ─── Build Questions ─────────────────────────────────
function buildQuiz() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'qcard-' + idx;

    const tagClass = {
      history:'tag-history', polity:'tag-polity', economy:'tag-economy',
      science:'tag-science', maths:'tag-maths', geography:'tag-geography',
      tamil:'tag-tamil', general:'tag-general', reasoning:'tag-reasoning'
    }[q.tag] || 'tag-general';

    const tagLabel = {
      history:'History', polity:'Polity', economy:'Economy',
      science:'Science', maths:'Maths', geography:'Geography',
      tamil:'Tamil', general:'General Studies', reasoning:'Reasoning'
    }[q.tag] || 'GS';

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q ${q.n}</span>
        <span class="q-tag ${tagClass}">${tagLabel}</span>
        <span class="q-status-dot" id="dot-${idx}"></span>
      </div>
      <div class="q-body">
        <div class="q-text-en">${q.en}</div>
        <div class="q-text-ta">${q.ta}</div>
        <div class="options" id="opts-${idx}">
          ${q.opts.map((o,i) => `
            <button class="option-btn" id="opt-${idx}-${i}" onclick="selectAnswer(${idx},${i})">
              <span class="opt-label">${['A','B','C','D'][i]}</span>
              <span class="opt-text">
                <span class="en">${o.en}</span>
                ${o.ta ? `<span class="ta">${o.ta}</span>` : ''}
              </span>
            </button>
          `).join('')}
        </div>
        <div class="feedback" id="fb-${idx}"></div>
      </div>
    `;
    container.appendChild(card);
  });
}

function selectAnswer(qIdx, optIdx) {
  if (answered[qIdx] !== null) return;

  const q = questions[qIdx];
  const isCorrect = optIdx === q.ans;

  answered[qIdx] = isCorrect ? 'correct' : 'wrong';
  if (isCorrect) correct++; else wrong++;

  // Style all buttons
  q.opts.forEach((_, i) => {
    const btn = document.getElementById(`opt-${qIdx}-${i}`);
    btn.disabled = true;
    if (i === q.ans) {
      btn.classList.add(answered[qIdx] === 'correct' && i === optIdx ? 'correct' : 'show-correct');
    }
    if (i === optIdx && !isCorrect) {
      btn.classList.add('wrong');
    }
  });
  if (isCorrect) {
    document.getElementById(`opt-${qIdx}-${optIdx}`).classList.replace('show-correct','correct');
  }

  // Feedback
  const fb = document.getElementById(`fb-${qIdx}`);
  if (isCorrect) {
    fb.className = 'feedback correct';
    fb.innerHTML = '✅ Correct! சரியான விடை!';
  } else {
    fb.className = 'feedback wrong';
    fb.innerHTML = `❌ Wrong! Correct answer: <strong>${['A','B','C','D'][q.ans]}. ${q.opts[q.ans].en}</strong>`;
  }

  // Status dot
  const dot = document.getElementById(`dot-${qIdx}`);
  dot.style.background = isCorrect ? '#10b981' : '#ef4444';

  updateStats();
}

function updateStats() {
  const pending = questions.length - correct - wrong;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statPending').textContent = pending;
  const pct = ((correct + wrong) / questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function submitQuiz() {
  const unanswered = questions.length - correct - wrong;
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rUnanswered').textContent = unanswered;
  document.getElementById('resultScore').textContent = `${correct}/100`;
  document.getElementById('resultPercent').textContent = `Score: ${pct}%`;

  // Grade color
  let color = '#ef4444';
  if (pct >= 80) color = '#10b981';
  else if (pct >= 60) color = '#3b82f6';
  else if (pct >= 40) color = '#f59e0b';
  document.getElementById('gradeBar').style.background = color;
  setTimeout(() => {
    document.getElementById('gradeBar').style.width = pct + '%';
  }, 100);

  // Emoji & msg
  let emoji='😔', msg='Keep practicing! மீண்டும் முயற்சி செய்யுங்கள்!';
  if (pct >= 90) { emoji='🏆'; msg='Outstanding! அசாதாரண செயல்திறன்!'; }
  else if (pct >= 75) { emoji='🎉'; msg='Excellent! சிறப்பான முடிவு!'; }
  else if (pct >= 60) { emoji='👍'; msg='Good job! நல்ல முயற்சி!'; }
  else if (pct >= 40) { emoji='📚'; msg='Keep studying! தொடர்ந்து படியுங்கள்!'; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('gradeMsg').textContent = msg;

  document.getElementById('quiz-page').style.display = 'none';
  document.getElementById('result-page').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}

function reviewAnswers() {
  document.getElementById('result-page').style.display = 'none';
  document.getElementById('quiz-page').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}

function restartQuiz() {
  answered = new Array(questions.length).fill(null);
  correct = 0; wrong = 0;
  document.getElementById('result-page').style.display = 'none';
  document.getElementById('quiz-page').style.display = 'block';
  buildQuiz();
  updateStats();
  window.scrollTo({top:0, behavior:'smooth'});
}

// Scroll to top button
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTopBtn');
  btn.style.display = window.scrollY > 400 ? 'flex' : 'none';
});

// Init
buildQuiz();
</script>
