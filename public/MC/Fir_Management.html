
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FIR Management System — Jayankondam Sub-Division</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;font-size:13px}
:root{
  --gold:#C9A84C;--gold-l:#F0D07A;--gold-d:#8B6914;
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --bdr:#30363d;--txt:#e6edf3;--txt2:#8b949e;--txt3:#6e7681;
  --grn:#3fb950;--red:#f85149;--blu:#58a6ff;--pur:#bc8cff;
  --r:8px;--rl:12px;
}
.app{display:flex;flex-direction:column;min-height:100vh}

/* ── header ── */
.hdr{background:var(--bg2);border-bottom:2px solid var(--gold-d);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200}
.hdr-logo{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.hdr-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.auth-area{margin-left:auto;display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0}
.dot.on{background:var(--grn)}

/* ── tabs ── */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr);padding:0 16px;overflow-x:auto;gap:2px}
.tab{padding:9px 16px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--txt2);white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--txt)}
.tab.act{color:var(--gold);border-bottom-color:var(--gold)}
.pane{display:none;padding:16px}
.pane.act{display:block}

/* ── card ── */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);padding:16px;margin-bottom:14px}
.ctitle{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px}

/* ── form ── */
.fg{display:flex;flex-direction:column;gap:3px}
label.lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
input,select{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);padding:7px 10px;font-size:12px;outline:none;width:100%;transition:border-color .15s;font-family:inherit}
input:focus,select:focus{border-color:var(--gold)}
select option{background:var(--bg3)}
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:10px}

/* ── buttons ── */
.btn{padding:7px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-g{background:var(--gold);color:#000}
.btn-g:hover{background:var(--gold-l)}
.btn-g:disabled{opacity:.4;cursor:not-allowed}
.btn-o{background:transparent;border:1px solid var(--bdr);color:var(--txt2)}
.btn-o:hover{border-color:var(--gold);color:var(--gold)}
.btn-r{background:transparent;border:1px solid var(--red);color:var(--red)}
.btn-r:hover{background:var(--red);color:#fff}
.btn-sm{padding:3px 9px;font-size:11px}

/* ── year ctrl ── */
.yr-ctrl{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--gold-d);border-radius:6px;padding:6px 10px}
.yr-val{font-size:13px;font-weight:700;color:var(--gold);min-width:36px;text-align:center}
.rst{font-size:10px;color:var(--txt3);cursor:pointer;text-decoration:underline;margin-left:4px}
.rst:hover{color:var(--gold)}

/* ── messages ── */
.msg-ok{background:rgba(63,185,80,.1);border:1px solid var(--grn);color:var(--grn);padding:7px 10px;border-radius:6px;font-size:11px;margin-top:8px}
.msg-err{background:rgba(248,81,73,.1);border:1px solid var(--red);color:var(--red);padding:7px 10px;border-radius:6px;font-size:11px;margin-top:8px}
.msg-info{background:rgba(88,166,255,.1);border:1px solid var(--blu);color:var(--blu);padding:7px 10px;border-radius:6px;font-size:11px;margin-top:8px}
.loading{display:flex;align-items:center;gap:8px;color:var(--txt2);font-size:12px;padding:12px 0}
.spin{width:14px;height:14px;border:2px solid var(--bdr);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── tables ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--bg3);color:var(--gold);padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid rgba(48,54,61,.5);color:var(--txt);vertical-align:top}
tr:hover td{background:rgba(201,168,76,.04)}

/* ── badges ── */
.bdg{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;display:inline-block}
.bdg-g{background:rgba(63,185,80,.15);color:var(--grn)}
.bdg-a{background:rgba(201,168,76,.15);color:var(--gold)}
.bdg-b{background:rgba(88,166,255,.15);color:var(--blu)}
.bdg-r{background:rgba(248,81,73,.15);color:var(--red)}
.bdg-p{background:rgba(188,140,255,.15);color:var(--pur)}

/* ── stat grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:12px}
.stat-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.stat-val{font-size:20px;font-weight:700;color:var(--gold)}
.stat-sub{font-size:10px;color:var(--txt3);margin-top:2px}

/* ── FIR Viewer specific ── */

/* search box */
.v-search-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rl);padding:20px;margin-bottom:14px}
.v-search-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.v-inputs{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.v-inputs .fg{min-width:110px;max-width:150px}
.v-preview{font-size:11px;color:var(--txt3);margin-top:8px;min-height:16px}
.v-preview b{color:var(--gold)}

/* station pills row */
.v-station-row{margin-bottom:12px}
.v-station-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.v-station-pills{display:flex;flex-wrap:wrap;gap:6px}
.st-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:var(--bg3);color:var(--txt2);transition:all .18s;user-select:none}
.st-pill:hover{border-color:var(--gold-d);color:var(--txt)}
.st-pill.active{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold)}
.st-pill .st-count{background:rgba(201,168,76,.25);color:var(--gold);border-radius:8px;padding:1px 7px;font-size:10px;font-weight:700}
.st-pill.active .st-count{background:var(--gold);color:#000}

/* station detail panel */
.v-station-panel{background:var(--bg3);border:1px solid var(--gold-d);border-radius:var(--rl);padding:14px;margin-bottom:10px;animation:slideIn .15s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

/* sheet section inside panel */
.v-sheet-sec{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--bdr)}
.v-sheet-sec:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.v-sheet-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.v-sheet-name{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px}

/* case number pills (≤5) */
.v-case-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.cn-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--bdr);background:var(--bg2);color:var(--txt2);transition:all .15s;user-select:none}
.cn-pill:hover{border-color:var(--blu);color:var(--blu)}
.cn-pill.active{border-color:var(--gold);background:rgba(201,168,76,.08);color:var(--gold)}
.cn-pill .cn-src{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600}
.cn-pill .cn-src.pend{background:rgba(88,166,255,.2);color:var(--blu)}
.cn-pill .cn-src.disp{background:rgba(63,185,80,.2);color:var(--grn)}
.cn-pill .cn-src.nv{background:rgba(201,168,76,.2);color:var(--gold)}
.cn-pill .cn-src.cnum{background:rgba(188,140,255,.2);color:var(--pur)}
.cn-pill .cn-src.fir{background:rgba(248,81,73,.2);color:var(--red)}

/* case number dropdown (>5) */
.v-cn-select{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:6px;color:var(--txt);padding:7px 10px;font-size:12px;outline:none;font-family:inherit;cursor:pointer;transition:border-color .15s;width:100%;max-width:360px}
.v-cn-select:focus{border-color:var(--gold)}

/* case detail card */
.v-case-detail{background:var(--bg);border:1px solid var(--gold-d);border-radius:var(--r);padding:14px;margin-top:10px;animation:fadeUp .15s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.v-det-hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.v-det-cn{font-size:15px;font-weight:700;color:var(--gold)}
.v-det-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.df-lbl{font-size:10px;color:var(--txt3);margin-bottom:2px}
.df-val{font-size:12px;color:var(--txt);word-break:break-word}
.df-val.hi{color:var(--gold);font-weight:600}

/* FIR pending special card */
.v-fir-row{background:rgba(248,81,73,.06);border:1px solid rgba(248,81,73,.25);border-radius:6px;padding:10px;margin-bottom:6px}

/* numpad */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:140px}
.np{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:9px;font-size:13px;cursor:pointer;text-align:center;color:var(--txt);transition:all .15s}
.np:hover{border-color:var(--gold);color:var(--gold)}
.np.w2{grid-column:span 2}

/* step flow */
.step-row{display:flex;align-items:center;gap:6px;margin-bottom:14px}
.step-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--txt3);flex-shrink:0}
.step-dot.act{border-color:var(--gold);color:var(--gold)}
.step-dot.done{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.step-line{flex:1;height:1px;background:var(--bdr)}
.case-sel{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:9px 12px;cursor:pointer;font-size:12px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;transition:all .15s}
.case-sel:hover,.case-sel.sel{border-color:var(--gold);background:rgba(201,168,76,.07)}
.warn-box{background:rgba(248,81,73,.07);border:1px solid rgba(248,81,73,.3);border-radius:6px;padding:10px;font-size:11px;color:var(--red);margin-bottom:10px}

/* abstract */
.abs-tbl{width:100%;border-collapse:collapse;font-size:11px}
.abs-tbl th{background:var(--bg3);color:var(--gold);padding:6px 8px;text-align:left;font-size:10px;border:1px solid var(--bdr)}
.abs-tbl td{padding:6px 8px;border:1px solid var(--bdr);color:var(--txt)}
.abs-tbl tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.tot-row td{background:rgba(201,168,76,.09)!important;color:var(--gold);font-weight:700}
.no-data{text-align:center;padding:24px;color:var(--txt3);font-size:12px}
.srch-row{display:flex;gap:8px;margin-bottom:12px;align-items:flex-end;flex-wrap:wrap}
.srch-row .fg{flex:1;min-width:100px}
.res-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:10px}
.res-hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.fnum{font-size:14px;font-weight:700;color:var(--gold)}
.sub-sec{margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr)}
.sub-ttl{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--txt3);margin-bottom:7px}
.det-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:7px}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div>
    <div class="hdr-logo">⚖ FIR Management System</div>
    <div class="hdr-sub">Jayankondam Sub-Division · Police Records</div>
  </div>
  <div class="auth-area">
    <div class="dot" id="aDot"></div>
    <span id="aLbl" style="font-size:11px;color:var(--txt3)">Not signed in</span>
    <button class="btn btn-o btn-sm" id="aBtn" onclick="doAuth()">Sign In</button>
  </div>
</div>

<div class="tabs">
  <div class="tab act" onclick="goTab('entry',this)">📝 FIR Entry</div>
  <div class="tab" onclick="goTab('viewer',this)">🔍 FIR Viewer</div>
  <div class="tab" onclick="goTab('ftc',this)">📁 FIR → Case Numbered</div>
  <div class="tab" onclick="goTab('abstract',this)">📊 Abstract</div>
</div>

<div id="p-entry"    class="pane act"></div>
<div id="p-viewer"   class="pane"></div>
<div id="p-ftc"      class="pane"></div>
<div id="p-abstract" class="pane"></div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   SHEET IDs
══════════════════════════════════════════════════════ */
const SID={
  fir    :'1sKmU8eXXz5iPG7qNvu-exKQOW_qxu3BbPQngqzVvF0k',
  disposal:'1OWoLwzLVANiAk8T2AthO_wy9hEhyLuFLcXVgJsCyhHY',
  pending :'1PWTUdw85POCan-aaqvZq8Z-ewq3pIuAGosSo-xiCC9I',
  nonval  :'1tUDCMzd_q3TbmiboJl7yYI9S7hFcrMb3K4vhIaP6dVk',
  casenum :'1eeQA75iuqNcsNwXygcx3JLJRamxuRI_1UrpetByr5nA'
};

/* ══════════════════════════════════════════════════════
   STATION MAP
══════════════════════════════════════════════════════ */
const SMAP=[
  {sh:'JKM',  lb:'Jayankondam',       al:['jayankondam','jkm','police station 1','ps jayankondam']},
  {sh:'VKM',  lb:'Vikkiramangalam',   al:['vikkiramangalam','vikramangalam','vkm','venganam','police station venganam']},
  {sh:'T.Palur',lb:'T.Palur',         al:['t.palur','tpalur','palur','keelapalur','police station keelap','t palur']},
  {sh:'PEW',  lb:'PEW Ariyalur',      al:['pew','pew ariyalur','nb cid trichy','pew ariyalur ( pr','nb cid']},
  {sh:'AWPS', lb:'AWPS Jayankondam',  al:['awps','awps jayankondam','all women']},
  {sh:'DCB',  lb:'DCB Ariyalur',      al:['dcb','dcb ariyalur','police station ariyalur','ariyalur dcb']},
];

let tok=null, loaded=false;
let DB={fir:{}, pend:[], disp:[], nv:[], cnum:[]};

/* entry state */
let ES={yr:String(new Date().getFullYear()), st:'JKM', fn:'', uns:'', dt:''};
/* ftc state */
let FTC={step:1, fn:'', yr:String(new Date().getFullYear()), st:'JKM', firRow:null, selCase:null};
/* viewer state */
let VS={fn:'', yr:String(new Date().getFullYear()), results:[], activeStation:null, activeCaseId:null};

/* ══════════════════════════════════════════════════════
   STATION HELPERS
══════════════════════════════════════════════════════ */
function stMatchObj(name, obj){
  if(!name||!obj) return false;
  const n=name.toLowerCase().trim();
  if(obj.sh.toLowerCase()===n||obj.lb.toLowerCase()===n) return true;
  for(const a of obj.al) if(n.includes(a)||a.includes(n)) return true;
  return false;
}

/* ══════════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════════ */
function doAuth(){
  if(tok){tok=null;loaded=false;setAuthUI(false);goTab('entry');return;}
  if(!window.google){
    const sc=document.createElement('script');
    sc.src='https://accounts.google.com/gsi/client';
    sc.onload=()=>startAuth();
    document.head.appendChild(sc);
  } else startAuth();
}
function startAuth(){
  const CLIENT_ID='879226759032-983f068npvn7t0npk72nbq8lp402q98a.apps.googleusercontent.com';
  google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:'https://www.googleapis.com/auth/spreadsheets',
    callback:(r)=>{if(r.access_token){tok=r.access_token;setAuthUI(true);loadAll();}}
  }).requestAccessToken();
}
function setAuthUI(ok){
  document.getElementById('aDot').className='dot'+(ok?' on':'');
  document.getElementById('aLbl').textContent=ok?'Connected':'Not signed in';
  document.getElementById('aBtn').textContent=ok?'Sign Out':'Sign In';
}

/* ══════════════════════════════════════════════════════
   SHEETS API
══════════════════════════════════════════════════════ */
async function apiFetch(url){
  if(!tok) return null;
  const r=await fetch(url,{headers:{Authorization:`Bearer ${tok}`}});
  if(!r.ok) return null;
  return r.json();
}
async function sheetsGet(sid,range){
  const d=await apiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(range)}`);
  return d?.values||[];
}
async function sheetsAppend(sid,range,vals){
  if(!tok) return false;
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED`,{
    method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},
    body:JSON.stringify({values:vals})
  });
  return r.ok;
}
async function sheetsDeleteRow(sid,sheetName,rowIdx){
  if(!tok) return false;
  const m=await apiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}?fields=sheets.properties`);
  const sh=(m?.sheets||[]).find(s=>s.properties.title===sheetName);
  if(!sh) return false;
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}:batchUpdate`,{
    method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},
    body:JSON.stringify({requests:[{deleteDimension:{range:{sheetId:sh.properties.sheetId,dimension:'ROWS',startIndex:rowIdx,endIndex:rowIdx+1}}}]})
  });
  return r.ok;
}

/* ══════════════════════════════════════════════════════
   LOAD ALL DATA
══════════════════════════════════════════════════════ */
async function loadAll(){
  const ap=document.querySelector('.pane.act');
  ap.innerHTML='<div class="loading"><div class="spin"></div>Loading data from Google Sheets…</div>';
  try{
    DB.fir={};
    for(const s of SMAP){
      const rows=await sheetsGet(SID.fir,`${s.sh}!A:D`);
      const data=[];let yg='';
      for(let i=0;i<rows.length;i++){
        const r=rows[i];
        if(!r[0]&&!r[1]&&r[2]&&!r[3]){yg=(r[2]||'').trim();continue;}
        if(r[0]&&r[1]&&r[2]){
          const sl=(r[0]||'').trim(),cr=(r[1]||'').trim(),sec=(r[2]||'').trim(),dr=(r[3]||'').trim();
          if(cr&&sec&&sl&&!isNaN(sl)) data.push({sl,cr,sec,dr,yr:yg,ri:i});
        }
      }
      DB.fir[s.sh]=data;
    }
    const pr=await sheetsGet(SID.pending,'Sheet1!A:L');
    DB.pend=pr.slice(1).map((r,i)=>({sl:r[0]||'',cn:r[1]||'',pt:r[2]||'',adv:r[3]||'',dreg:r[4]||'',nxt:r[5]||'',pur:r[6]||'',sec:r[7]||'',sta:r[8]||'',fn:r[9]||'',nat:r[10]||'',des:r[11]||'',ri:i+1}));
    const dr2=await sheetsGet(SID.disposal,'Sheet1!A:L');
    DB.disp=dr2.slice(1).map((r,i)=>({sl:r[0]||'',cn:r[1]||'',pt:r[2]||'',adv:r[3]||'',dreg:r[4]||'',ddec:r[5]||'',dnat:r[6]||'',sec:r[7]||'',sta:r[8]||'',fn:r[9]||'',nat:r[10]||'',des:r[11]||'',ri:i+1}));
    const nr=await sheetsGet(SID.nonval,'Sheet1!A:G');
    DB.nv=nr.slice(1).map((r,i)=>({sno:r[0]||'',cn:r[1]||'',fn:r[2]||'',rp:r[3]||'',sta:r[4]||'',desc:r[5]||'',rem:r[6]||'',ri:i+1}));
    const cnr=await sheetsGet(SID.casenum,'Sheet1!A:M');

}

/* ══════════════════════════════════════════════════════
   TAB ROUTING
══════════════════════════════════════════════════════ */
function goTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  if(el) el.classList.add('act');
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('act'));
  document.getElementById('p-'+name).classList.add('act');
  if(!tok){renderAuth(name);return;}
  if(!loaded){loadAll();return;}
  renderTab(name);
}
function renderTab(n){
  if(n==='entry')    renderEntry();
  else if(n==='viewer')  renderViewer();
  else if(n==='ftc')     renderFTC();
  else if(n==='abstract')renderAbstract();
}
function renderAuth(t){

function npBs(id,k){const e=document.getElementById(id);if(!e)return;e.value=e.value.slice(0,-1);ES[k]=e.value;}
function npDt(n){const e=document.getElementById('eDt');if(!e||e.value.length>=10)return;e.value+=n;ES.dt=e.value;}
function npDtDot(){const e=document.getElementById('eDt');if(!e||e.value.endsWith('.')||!e.value.length)return;e.value+='.';ES.dt=e.value;}
async function saveEntry(){
  const m=document.getElementById('eMsg');
  if(!ES.fn||!ES.uns||!ES.dt){m.innerHTML='<div class="msg-err">FIR Number, Section U/s, and Date are required.</div>';return;}
  const cr=`${ES.fn}/${ES.yr}`;
  const rows=DB.fir[ES.st]||[];
  const nextSl=rows.length?Math.max(...rows.map(r=>parseInt(r.sl)||0))+1:1;
  m.innerHTML='<div class="loading"><div class="spin"></div>Saving…</div>';
  const ok=await sheetsAppend(SID.fir,`${ES.st}!A:D`,[[nextSl,cr,ES.uns,ES.dt]]);
  if(ok){
    DB.fir[ES.st]=DB.fir[ES.st]||[];
    DB.fir[ES.st].push({sl:String(nextSl),cr,sec:ES.uns,dr:ES.dt,yr:ES.yr,ri:9999});
    m.innerHTML=`<div class="msg-ok">✓ FIR ${cr} saved to ${SMAP.find(s=>s.sh===ES.st)?.lb}.</div>`;
    ES.fn='';ES.uns='';ES.dt='';
    setTimeout(()=>{renderEntry();document.getElementById('eFn')?.focus();},900);
  } else {
    m.innerHTML='<div class="msg-err">Save failed. Check permissions.</div>';
  }
}

/* ══════════════════════════════════════════════════════
   FIR VIEWER TAB
   Flow:
     1. Enter FIR No + Year → Search
     2. Stations that have any match → station pills
     3. Click station → show case-number pills/dropdown per sheet
     4. Click case number → show full detail
══════════════════════════════════════════════════════ */
function renderViewer(){
  const p=document.getElementById('p-viewer');
  p.innerHTML=`
  <div class="v-search-box">
    <div class="v-search-title">🔍 FIR Search</div>
    <div class="v-inputs">
      <div class="fg">
        <label class="lbl">FIR Number</label>
        <input type="tel" id="vFn" inputmode="numeric" value="${VS.fn}"
               placeholder="e.g. 12" style="width:110px"
               oninput="VS.fn=this.value;vPreview()"
               onkeydown="if(event.key==='Enter')vSearch()"/>
      </div>
      <div class="fg">
        <label class="lbl">Year</label>
        <input type="tel" id="vYr" inputmode="numeric" value="${VS.yr}"
               placeholder="2026" style="width:80px"
               oninput="VS.yr=this.value;vPreview()"
               onkeydown="if(event.key==='Enter')vSearch()"/>
      </div>
      <button class="btn btn-g" style="height:34px;align-self:flex-end" onclick="vSearch()">Search</button>
    </div>
    <div class="v-preview" id="vPrev"></div>
  </div>
  <div id="vOut"></div>`;
  vPreview();
  /* re-render previous results if state is intact */
  if(VS.results && VS.results.length) vRenderResults();
}

function vPreview(){
  const fn=(document.getElementById('vFn')?.value||'').trim();
  const yr=(document.getElementById('vYr')?.value||'').trim();
  const el=document.getElementById('vPrev');
  if(!el) return;
  el.innerHTML=(fn&&yr)?`Searching for: <b>${fn}/${yr}</b>`:
               fn?`Searching for: <b>${fn}</b> (all years)`:'';
}

/* ─── main search ─── */
function vSearch(){
  const fn=(document.getElementById('vFn')?.value||VS.fn||'').trim();
  const yr=(document.getElementById('vYr')?.value||VS.yr||'').trim();
  VS.fn=fn; VS.yr=yr;
  VS.activeStation=null; VS.activeCaseId=null;

  const out=document.getElementById('vOut');
  if(!fn){out.innerHTML='<div class="msg-info">Enter a FIR number to search.</div>';return;}

  const fullFIR=yr?`${fn}/${yr}`:fn;

  /* FIR number match */
  function firMatch(val){
    if(!val) return false;
    const v=val.trim();
    if(v===fullFIR) return true;
    const np=v.split('/')[0].trim();
    if(np===fn && !yr) return true;
    if(np===fn && yr && (v.includes('/'+yr)||v.endsWith(yr))) return true;
    return false;
  }

  /* build results per station */
  VS.results=[];
  for(const s of SMAP){
    const firRows =(DB.fir[s.sh]||[]).filter(r=>firMatch(r.cr));
    const pendRows=DB.pend.filter(c=>firMatch(c.fn)&&stMatchObj(c.sta,s));
    const dispRows=DB.disp.filter(c=>firMatch(c.fn)&&stMatchObj(c.sta,s));
    const nvRows  =DB.nv.filter(c=>firMatch(c.fn)&&stMatchObj(c.sta,s));
    const cnRows  =DB.cnum.filter(c=>firMatch(c.fn)&&stMatchObj(c.sta,s));
    const total=firRows.length+pendRows.length+dispRows.length+nvRows.length+cnRows.length;
    if(total) VS.results.push({s,firRows,pendRows,dispRows,nvRows,cnRows,total});
  }

  vRenderResults();
}

/* ─── render station pills + panel ─── */
function vRenderResults(){
  const out=document.getElementById('vOut');
  if(!out) return;
  const fn=VS.fn, yr=VS.yr;
  const fullFIR=yr?`${fn}/${yr}`:fn;

  if(!VS.results||!VS.results.length){
    out.innerHTML=`<div class="no-data">No records found for <b>${fullFIR}</b> across all stations.</div>`;
    return;
  }

  /* ── station pills ── */
  let html=`<div class="v-station-row">
    <div class="v-station-label">Found in ${VS.results.length} station${VS.results.length>1?'s':''} — select a station</div>
    <div class="v-station-pills">
      ${VS.results.map((sr,i)=>`
        <div class="st-pill ${VS.activeStation===i?'active':''}" onclick="vSelectStation(${i})">
          ${sr.s.lb}
          <span class="st-count">${sr.total}</span>
        </div>`).join('')}
    </div>
  </div>`;

  /* ── station panel (if one selected) ── */
  if(VS.activeStation!==null){
    const sr=VS.results[VS.activeStation];
    html+=vBuildPanel(sr, fullFIR);
  }

  out.innerHTML=html;
}

function vSelectStation(i){
  VS.activeStation=i;
  VS.activeCaseId=null;
  vRenderResults();
}

/* ─── panel for one station ─── */
function vBuildPanel(sr, fullFIR){
  const {s,firRows,pendRows,dispRows,nvRows,cnRows}=sr;
  let h=`<div class="v-station-panel">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">

      ${firRows.length?'<span class="bdg bdg-r">📋 FIR Pending</span>':''}
      ${pendRows.length?`<span class="bdg bdg-b">⚖ ${pendRows.length} Pending</span>`:''}
      ${dispRows.length?`<span class="bdg bdg-g">✓ ${dispRows.length} Disposed</span>`:''}
      ${nvRows.length?`<span class="bdg bdg-a">🏷 NV Property</span>`:''}
      ${cnRows.length?`<span class="bdg bdg-p">📁 Case Numbered</span>`:''}
    </div>`;

  /* 1 ── FIR Pending — show details directly (no case number needed) */
  if(firRows.length){
    h+=`<div class="v-sheet-sec">
      <div class="v-sheet-hdr">
        <span class="v-sheet-name">📋 FIR Pending Register</span>
      </div>
      ${firRows.map(r=>`<div class="v-fir-row">

          <div><div class="df-lbl">Year Group</div><div class="df-val">${r.yr||'—'}</div></div>
        </div>
      </div>`).join('')}
    </div>`;
  }

  /* 2 ── Case Pending */
  if(pendRows.length){
    h+=vBuildCaseSection(pendRows,'pend','⚖ Case Pending','bdg-b','pend');
  }

  /* 3 ── Disposed */
  if(dispRows.length){
    h+=vBuildCaseSection(dispRows,'disp','✅ Disposed Cases','bdg-g','disp');
  }

  /* 4 ── Non-Valuable Property */
  if(nvRows.length){
    h+=vBuildCaseSection(nvRows,'nv','🏷 Non-Valuable Property','bdg-a','nv');
  }

  /* 5 ── Case Numbered */
  if(cnRows.length){

  }

  h+=`</div>`; /* close panel */
  return h;

/* ─── case section: pills (≤5) or dropdown (>5) + detail ─── */
function vBuildCaseSection(rows, prefix, title, bdgClass, srcKey){
  /* unique key per case row */
  const makeId=(r,src)=>`${src}::${r.ri}`;

  /* extract display name for each row */
  function dispName(r){
    if(r.cn && r.cn.trim()) return r.cn.trim();
    if(r.rp && r.rp.trim()) return 'RP: '+r.rp.trim(); /* non-valuable */
    return '#'+r.ri;
  }

  const ids=rows.map(r=>makeId(r,srcKey));

  let h=`<div class="v-sheet-sec">
    <div class="v-sheet-hdr">
      <span class="v-sheet-name">${title}</span>
      <span class="bdg ${bdgClass}">${rows.length}</span>
    </div>`;

  /* ── pills if ≤5, else dropdown ── */
  if(rows.length<=5){
    h+=`<div class="v-case-pills">`;
    rows.forEach((r,i)=>{
      const id=ids[i];
      const active=VS.activeCaseId===id;
      h+=`<div class="cn-pill ${active?'active':''}" onclick="vSelectCase('${id}')">
        ${dispName(r)}
        <span class="cn-src ${srcKey}">${srcKey==='pend'?'P':srcKey==='disp'?'D':srcKey==='nv'?'NV':'CN'}</span>
      </div>`;
    });
    h+=`</div>`;
  } else {
    /* dropdown */
    const selVal=ids.includes(VS.activeCaseId)?VS.activeCaseId:'';
    h+=`<select class="v-cn-select" onchange="vSelectCase(this.value)">
      <option value="">— Select case number (${rows.length} cases) —</option>
      ${rows.map((r,i)=>`<option value="${ids[i]}" ${VS.activeCaseId===ids[i]?'selected':''}>
        ${dispName(r)}${r.pt?' · '+r.pt.substring(0,40):''}
      </option>`).join('')}
    </select>`;
  }

  /* ── detail for active case in this section ── */
  const activeRow=rows.find((r,i)=>ids[i]===VS.activeCaseId);
  if(activeRow){
    h+=vBuildDetail(activeRow, srcKey);
  }

  h+=`</div>`;
  return h;
}

  VS.activeCaseId=(VS.activeCaseId===id)?null:id; /* toggle */

      <div><div class="df-lbl">Date of Registration</div><div class="df-val">${r.dreg||'—'}</div></div>
      <div><div class="df-lbl">Next Date</div><div class="df-val" style="color:var(--blu)">${r.nxt||'—'}</div></div>
      <div><div class="df-lbl">Case Type</div><div class="df-val">${r.type||'—'}</div></div>
      <div><div class="df-lbl">Section U/s (FIR)</div><div class="df-val">${r.sec||'—'}</div></div>
      <div><div class="df-lbl">Section (Case)</div><div class="df-val">${r.sec2||'—'}</div></div>
      <div><div class="df-lbl">Nature</div><div class="df-val">${r.nat||'—'}</div></div>
      <div><div class="df-lbl">Designation</div><div class="df-val">${r.des||'—'}</div></div>
    </div>`;
  }

  h+=`</div>`;
  return h;
}

/* ══════════════════════════════════════════════════════
   FIR → CASE NUMBERED TAB
══════════════════════════════════════════════════════ */
function renderFTC(){
  const p=document.getElementById('p-ftc');
  const s=FTC;
  const stOpts=SMAP.map(st=>`<option value="${st.sh}" ${st.sh===s.st?'selected':''}>${st.lb}</option>`).join('');
  const steps=`<div class="step-row">
    ${[1,2,3].map((n,i)=>`<div class="step-dot ${s.step>n?'done':s.step===n?'act':''}">${s.step>n?'✓':n}</div>${i<2?'<div class="step-line"></div>':''}`).join('')}
  </div>`;
  let body='';
  if(s.step===1){
    body=`<div style="font-size:11px;color:var(--txt3);margin-bottom:12px">Step 1 — Enter FIR details</div>
      <div class="frow">
        <div class="fg"><label class="lbl">FIR Number</label><input type="tel" id="tFn" inputmode="numeric" value="${s.fn}" oninput="FTC.fn=this.value" placeholder="e.g. 561"/></div>
        <div class="fg"><label class="lbl">Year</label><input type="tel" id="tYr" inputmode="numeric" value="${s.yr}" oninput="FTC.yr=this.value" placeholder="${new Date().getFullYear()}"/></div>
        <div class="fg"><label class="lbl">Police Station</label><select id="tSt" onchange="FTC.st=this.value">${stOpts}</select></div>
      </div>
      <button class="btn btn-g" onclick="ftcSearch()">🔍 Search FIR</button>
      <div id="ftcMsg"></div>`;
  } else if(s.step===2){
    const stObj=SMAP.find(x=>x.sh===s.st);
    const allC=[
      ...DB.pend.filter(c=>{const cf=(c.fn||'').split('/')[0].trim();return cf===s.fn&&stMatchObj(c.sta,stObj);}).map(c=>({...c,type:'pending'})),
      ...DB.disp.filter(c=>{const cf=(c.fn||'').split('/')[0].trim();return cf===s.fn&&stMatchObj(c.sta,stObj);}).map(c=>({...c,type:'disposal'}))
    ];
    body=`<div style="font-size:11px;color:var(--txt3);margin-bottom:12px">Step 2 — Select the linked case</div>
      ${s.firRow?`<div class="msg-info" style="margin-bottom:10px">✓ FIR ${s.firRow.cr} — ${s.firRow.sec} | Received: ${s.firRow.dr}</div>`:''}
      <div style="font-size:11px;color:var(--txt2);margin-bottom:6px">Matched cases (${allC.length})</div>
      ${allC.length===0?'<div class="no-data">No cases found for this FIR.</div>':
        allC.map(c=>`<div class="case-sel ${s.selCase?.cn===c.cn?'sel':''}" onclick='FTC.selCase=${JSON.stringify(c).replace(/'/g,"&#39;")};renderFTC()'>
          <div>
            <div style="font-weight:700;font-size:12px">${c.cn}</div>
            <div style="color:var(--txt2);font-size:11px;margin-top:2px">${c.pt}</div>
            <div style="color:var(--txt3);font-size:10px">${c.dreg||''}</div>
          </div>
          <span class="bdg ${c.type==='pending'?'bdg-b':'bdg-g'}">${c.type==='pending'?'Pending':'Disposed'}</span>
        </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-o" onclick="FTC.step=1;FTC.selCase=null;renderFTC()">← Back</button>
        <button class="btn btn-g" onclick="ftcStep3()" ${!s.selCase?'disabled style="opacity:.4"':''}>Next →</button>
      </div>`;
  } else if(s.step===3){
    const sc=s.selCase||{};
    const stLb=SMAP.find(x=>x.sh===s.st)?.lb||s.st;
    body=`<div style="font-size:11px;color:var(--txt3);margin-bottom:12px">Step 3 — Confirm</div>
      <div class="res-card" style="margin-bottom:10px">
        <div class="res-hdr">
          <span class="fnum">FIR: ${s.fn}/${s.yr}</span>
          <span class="bdg bdg-a">${stLb}</span>
          <span style="color:var(--txt2)">→</span>
          <span class="bdg bdg-p">${sc.cn||'N/A'}</span>
        </div>
        <div class="det-grid">
          <div><div class="df-lbl">Section U/s</div><div class="df-val">${s.firRow?.sec||'—'}</div></div>
          <div><div class="df-lbl">Date Received</div><div class="df-val">${s.firRow?.dr||'—'}</div></div>
          <div><div class="df-lbl">Case Number</div><div class="df-val" style="color:var(--pur)">${sc.cn||'—'}</div></div>
          <div><div class="df-lbl">Parties</div><div class="df-val">${sc.pt||'—'}</div></div>
          <div><div class="df-lbl">Advocate</div><div class="df-val">${sc.adv||'—'}</div></div>
          <div><div class="df-lbl">Date of Reg</div><div class="df-val">${sc.dreg||'—'}</div></div>
        </div>
      </div>
      <div class="warn-box">⚠ This will delete FIR ${s.fn}/${s.yr} from "${s.st}" tab and save to Case Numbered sheet.</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-o" onclick="FTC.step=2;renderFTC()">← Back</button>
        <button class="btn btn-r" onclick="ftcExecute()">🗂 Move to Case Numbered</button>
      </div>
      <div id="ftcFinalMsg"></div>`;
  }
  p.innerHTML=`<div class="card"><div class="ctitle">📁 FIR → Case Numbered</div>${steps}${body}</div>`;
}
function ftcSearch(){
  const msg=document.getElementById('ftcMsg');
  if(!FTC.fn){msg.innerHTML='<div class="msg-err">Enter FIR Number.</div>';return;}
  const rows=(DB.fir[FTC.st]||[]).filter(r=>r.cr.split('/')[0].trim()===FTC.fn);
  if(!rows.length){msg.innerHTML=`<div class="msg-err">FIR ${FTC.fn}/${FTC.yr} not found in ${SMAP.find(s=>s.sh===FTC.st)?.lb}.</div>`;return;}
  FTC.firRow=rows[0];FTC.step=2;renderFTC();
}
function ftcStep3(){if(!FTC.selCase)return;FTC.step=3;renderFTC();}
async function ftcExecute(){
  const msg=document.getElementById('ftcFinalMsg');
  msg.innerHTML='<div class="loading"><div class="spin"></div>Processing…</div>';
  const sc=FTC.selCase;
  const stLb=SMAP.find(x=>x.sh===FTC.st)?.lb||FTC.st;
  const row=[`${FTC.fn}/${FTC.yr}`,stLb,FTC.firRow?.sec||'',FTC.firRow?.dr||'',sc.cn||'',sc.pt||'',sc.adv||'',sc.dreg||'',sc.nxt||sc.ddec||'',sc.type||'',sc.sec||'',sc.nat||'',sc.des||''];
  const saved=await sheetsAppend(SID.casenum,'Sheet1!A:M',[row]);
  if(!saved){msg.innerHTML='<div class="msg-err">Failed to save.</div>';return;}
  if(FTC.firRow?.ri!==undefined&&FTC.firRow.ri!==9999) await sheetsDeleteRow(SID.fir,FTC.st,FTC.firRow.ri);
  const idx=(DB.fir[FTC.st]||[]).findIndex(r=>r.cr===FTC.firRow?.cr);
  if(idx>=0) DB.fir[FTC.st].splice(idx,1);
  DB.cnum.push({fn:`${FTC.fn}/${FTC.yr}`,sta:stLb,...sc});
  msg.innerHTML=`<div class="msg-ok">✓ FIR ${FTC.fn}/${FTC.yr} moved to Case Numbered.</div>`;
  setTimeout(()=>{FTC={step:1,fn:'',yr:String(new Date().getFullYear()),st:'JKM',firRow:null,selCase:null};renderFTC();},1400);
}

/* ══════════════════════════════════════════════════════
   ABSTRACT TAB
══════════════════════════════════════════════════════ */
function renderAbstract(){
  const p=document.getElementById('p-abstract');
  const allFirs=[];
  const stTot=SMAP.map(s=>{const rows=DB.fir[s.sh]||[];allFirs.push(...rows.map(r=>({...r,stLb:s.lb})));return{lb:s.lb,cnt:rows.length};});
  const grand=stTot.reduce((a,b)=>a+b.cnt,0);
  const bySec={};
  for(const r of allFirs){const k=r.sec||'Unknown';bySec[k]=(bySec[k]||0)+1;}
  const secSort=Object.entries(bySec).sort((a,b)=>b[1]-a[1]);
  const byYr={};
  for(const r of allFirs){const k=r.yr||r.cr.split('/').pop()||'?';byYr[k]=(byYr[k]||0)+1;}
  const yrSort=Object.entries(byYr).sort((a,b)=>a[0].localeCompare(b[0]));
  const byMon={};
  for(const r of allFirs){if(r.dr){const pts=r.dr.split('.');if(pts.length>=3){const k=`${pts[2]}-${pts[1].padStart(2,'0')}`;byMon[k]=(byMon[k]||0)+1;}}}
  const monNames=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monSort=Object.entries(byMon).sort((a,b)=>a[0].localeCompare(b[0]));
  const byDay={};
  for(const r of allFirs){if(r.dr){const k=r.dr;byDay[k]=(byDay[k]||0)+1;}}
  const daySort=Object.entries(byDay).sort((a,b)=>a[0].localeCompare(b[0])).slice(0,20);
  p.innerHTML=`
  <div class="stat-grid">
    <div class="stat"><div class="stat-lbl">Total Pending FIRs</div><div class="stat-val">${grand}</div><div class="stat-sub">All stations</div></div>
    ${stTot.map(s=>`<div class="stat"><div class="stat-lbl">${s.lb}</div><div class="stat-val">${s.cnt}</div><div class="stat-sub">pending</div></div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px">
    <div class="card"><div class="ctitle">📍 Station-wise</div>
      <table class="abs-tbl"><tr><th>Station</th><th>FIRs</th></tr>
      ${stTot.map(s=>`<tr><td>${s.lb}</td><td><b>${s.cnt}</b></td></tr>`).join('')}
      <tr class="tot-row"><td>Total</td><td><b>${grand}</b></td></tr></table>
    </div>
    <div class="card"><div class="ctitle">📅 Year-wise</div>
      <div class="tbl-wrap"><table class="abs-tbl"><tr><th>Year</th><th>Count</th></tr>
      ${yrSort.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
      <tr class="tot-row"><td>Total</td><td><b>${allFirs.length}</b></td></tr></table></div>
    </div>
    <div class="card"><div class="ctitle">📆 Month-wise</div>
      <div class="tbl-wrap"><table class="abs-tbl"><tr><th>Month</th><th>Count</th></tr>
      ${monSort.map(([k,v])=>{const[yr,mn]=k.split('-');return`<tr><td>${monNames[parseInt(mn)]||mn} ${yr}</td><td>${v}</td></tr>`;}).join('')}
      <tr class="tot-row"><td>Total</td><td><b>${monSort.reduce((a,b)=>a+b[1],0)}</b></td></tr></table></div>
    </div>
    <div class="card"><div class="ctitle">⚖ Section U/s (Top ${Math.min(secSort.length,30)})</div>
      <div class="tbl-wrap"><table class="abs-tbl"><tr><th>Section</th><th>Count</th></tr>
      ${secSort.slice(0,30).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
      <tr class="tot-row"><td>Total</td><td><b>${allFirs.length}</b></td></tr></table></div>
    </div>
    <div class="card"><div class="ctitle">📋 Date-wise (Recent)</div>
      <div class="tbl-wrap"><table class="abs-tbl"><tr><th>Date</th><th>Count</th></tr>
      ${daySort.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table></div>
    </div>
  </div>`;
}
</script>
</body>
</html>
