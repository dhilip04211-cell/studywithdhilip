<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tamil Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Noto+Serif+Tamil:wght@400;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:    #C9A84C;
      --gold-lt: #F0D07A;
      --ink:     #06080f;
      --cream:   #e8dfc8;
      --muted:   rgba(232,223,200,0.32);
      --border:  rgba(201,168,76,0.13);
      --card-bg: rgba(255,255,255,0.03);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--ink);
      font-family: 'Outfit', sans-serif;
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* canvas */
    #bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* mesh */
    .mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 45% at 10% 10%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 55% at 90% 85%, rgba(130,60,180,0.06) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 50% 50%, #0b0d18 0%, #06080f 100%);
    }

    /* page */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 50px 24px 80px;
    }

    /* back */
    .back {
      align-self: flex-start;
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); opacity: 0.65;
      text-decoration: none;
      margin-bottom: 48px;
      transition: opacity 0.2s, gap 0.2s;
      animation: riseIn 0.5s ease both;
    }
    .back:hover { opacity: 1; gap: 12px; }
    .back svg { transition: transform 0.2s; }
    .back:hover svg { transform: translateX(-3px); }

    /* header */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: riseIn 0.7s 0.05s ease both;
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 5px; text-transform: uppercase;
      color: var(--gold); opacity: 0.7;
      margin-bottom: 18px;
    }
    .eyebrow span {
      display: inline-block; width: 28px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .eyebrow span:last-child { background: linear-gradient(90deg, var(--gold), transparent); }

    .tamil-title {
      font-family: 'Noto Serif Tamil', serif;
      font-size: clamp(38px, 6vw, 68px);
      font-weight: 700;
      color: var(--cream);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .en-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--gold);
      opacity: 0.65;
      letter-spacing: 3px;
    }

    /* ornament */
    .ornament {
      display: flex; align-items: center; gap: 10px; justify-content: center;
      margin-bottom: 44px;
      animation: riseIn 0.6s 0.1s ease both;
    }
    .orn-line { width: 44px; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4)); }
    .orn-line:last-child { background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent); }
    .orn-dot { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); opacity: 0.45; }
    .orn-sm  { width: 3px; height: 3px; background: var(--gold); transform: rotate(45deg); opacity: 0.2; }

    /* grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      width: min(820px, 100%);
    }

    /* card */
    .note-card {
      position: relative;
      display: flex; flex-direction: column;
      padding: 26px 22px 22px;
      border-radius: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--cream);
      overflow: hidden;
      backdrop-filter: blur(8px);
      transition:
        transform 0.3s cubic-bezier(.22,.68,0,1.2),
        border-color 0.3s,
        box-shadow 0.3s;
      animation: riseIn 0.55s ease both;
    }
    .note-card:hover {
      transform: translateY(-7px) scale(1.02);
      border-color: rgba(201,168,76,0.32);
      box-shadow: 0 28px 55px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.07);
    }
    .note-card:hover .glow  { opacity: 1; }
    .note-card:hover .shine { opacity: 0.75; }
    .note-card:hover .arrow { transform: translateX(5px); opacity: 1; }

    .glow {
      position: absolute; inset: 0; border-radius: 16px;
      opacity: 0; pointer-events: none; transition: opacity 0.4s;
    }
    .shine {
      position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      opacity: 0.45; transition: opacity 0.3s;
    }

    .card-num {
      position: absolute; top: 14px; right: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 2px;
      color: rgba(201,168,76,0.18);
    }

    .card-icon { font-size: 26px; margin-bottom: 16px; }

    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }

    .card-title {
      font-family: 'Noto Serif Tamil', serif;
      font-size: 17px; font-weight: 700;
      line-height: 1.35;
      flex: 1;
    }

    .arrow {
      margin-top: 18px; opacity: 0.38;
      transition: transform 0.25s, opacity 0.25s;
    }

    footer {
      margin-top: 64px;
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 3px;
      color: rgba(201,168,76,0.16);
      text-transform: uppercase;
      text-align: center;
      animation: riseIn 0.7s 0.55s ease both;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 500px) {
      .page { padding: 36px 16px 60px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="mesh"></div>

<div class="page">

  <a href="Tamil.html" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Back to Tamil Hub
  </a>

  <header>
    <div class="eyebrow"><span></span>Study Material<span></span></div>
    <h1 class="tamil-title">பாடக் குறிப்புகள்</h1>
    <p class="en-sub">Tamil Notes</p>
  </header>

  <div class="ornament">
    <div class="orn-line"></div>
    <div class="orn-sm"></div>
    <div class="orn-dot"></div>
    <div class="orn-sm"></div>
    <div class="orn-line"></div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>© 2025 &nbsp;·&nbsp; StudyWithDhilip &nbsp;·&nbsp; Tamil Excellence</footer>
</div>

<script>
  /* ── Particle canvas ── */
  (() => {
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
    resize(); window.addEventListener('resize', resize);
    const dots = Array.from({ length: 45 }, () => ({
      x: Math.random() * innerWidth, y: Math.random() * innerHeight,
      r: Math.random() * 1.2 + 0.3,
      dx: (Math.random() - 0.5) * 0.2, dy: (Math.random() - 0.5) * 0.2,
      o: Math.random() * 0.3 + 0.08,
    }));
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      dots.forEach(d => {
        d.x += d.dx; d.y += d.dy;
        if (d.x < 0 || d.x > canvas.width)  d.dx *= -1;
        if (d.y < 0 || d.y > canvas.height) d.dy *= -1;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201,168,76,${d.o})`; ctx.fill();
      });
      for (let i = 0; i < dots.length; i++)
        for (let j = i + 1; j < dots.length; j++) {
          const dist = Math.hypot(dots[i].x - dots[j].x, dots[i].y - dots[j].y);
          if (dist < 110) {
            ctx.beginPath(); ctx.moveTo(dots[i].x, dots[i].y); ctx.lineTo(dots[j].x, dots[j].y);
            ctx.strokeStyle = `rgba(201,168,76,${0.055*(1-dist/110)})`; ctx.lineWidth = 0.5; ctx.stroke();
          }
        }
      requestAnimationFrame(draw);
    };
    draw();
  })();

  /* ── Notes data ── */
  const notes = [
    { num:'01', icon:'✂️', label:'Grammar',  title:'பிரித்து எழுதுக',                         href:'Notes/Pirithu Ezhuthuga.html',             color:'#C9A84C', accent:'#F0D07A' },
    { num:'02', icon:'📄', label:'Part 1',   title:'பிரித்து எழுதுக — Part 1',                href:'Notes/pirithu ezhuthuga part1.html',        color:'#5B9BD5', accent:'#A8CFEE' },
    { num:'03', icon:'🔗', label:'Grammar',  title:'சேர்த்து எழுதுக',                         href:'Notes/Serthu Ezhuthuga.html',              color:'#4CAF89', accent:'#80D4B1' },
    { num:'04', icon:'📝', label:'Errors',   title:'சந்தி பிழை மற்றும் குறில் நெடில் வேறுபாடு', href:'/studywithdhilip/#/santhi-pizai',         color:'#E05C4A', accent:'#F0907A' },
    { num:'05', icon:'🔤', label:'Phonics',  title:'மயங்கோலி',                                href:'/studywithdhilip/#/mayan-koli',             color:'#9B7FD4', accent:'#C4AAEE' },
  ];

  const grid = document.getElementById('grid');
  notes.forEach((n, i) => {
    const a = document.createElement('a');
    a.href = n.href;
    a.className = 'note-card';
    a.style.animationDelay = `${i * 0.07 + 0.18}s`;
    a.innerHTML = `
      <div class="glow" style="background:radial-gradient(circle at 50% 0%,${n.color}1e 0%,transparent 70%)"></div>
      <div class="shine" style="background:linear-gradient(90deg,transparent,${n.color},transparent)"></div>
      <span class="card-num">${n.num}</span>
      <div class="card-icon">${n.icon}</div>
      <p class="card-label">${n.label}</p>
      <h2 class="card-title" style="color:${n.accent}">${n.title}</h2>
      <div class="arrow" style="color:${n.color}">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </div>
    `;
    grid.appendChild(a);
  });
</script>
</body>
</html>
