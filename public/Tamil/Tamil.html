<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Learning Hub</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { margin-bottom: 2rem; font-size: 2.5rem; }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: bold;
        }
        .notes-btn { background: #fff; color: #764ba2; }
        .quiz-btn  { background: #ff9a9e; color: white; }
        .dict-btn  { background: #a8edea; color: #764ba2; }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>தமிழ் கல்வி (Tamil Education)</h1>
        <div class="btn-group">
            <a href="Notes.html"       class="btn notes-btn">Notes</a>
            <a href="Quiz.html"        class="btn quiz-btn">Quiz</a>
            <!-- 
                /#/dictionary uses HashRouter so it works with your React app
                at the root index.html. Adjust the path if your app is in a subfolder.
            -->
            <a href="../../index.html#/dictionary" class="btn dict-btn">Dictionary</a>
        </div>
    </div>
</body>
</html>
