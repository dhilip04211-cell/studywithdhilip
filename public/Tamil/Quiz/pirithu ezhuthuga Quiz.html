<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>பிரித்து எழுதுதல் — Quiz Practice | போட்டி தேர்வு</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@300;400;600;700;900&family=Noto+Serif+Tamil:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #FF6B35;
    --deep-saffron: #E85D04;
    --gold: #F4A261;
    --cream: #FFF8F0;
    --dark: #1A0A00;
    --mid: #3D1F00;
    --text: #2D1200;
    --green: #27AE60;
    --red: #E74C3C;
    --blue: #2E86C1;
    --border: #E8C99A;
    --card-bg: #FFFBF5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans Tamil', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .hero {
    background: linear-gradient(135deg, #1A0A00, #3D1F00, #6B2D00);
    padding: 2.5rem 2rem;
    text-align: center;
  }
  .hero-badge {
    display: inline-block;
    background: var(--saffron);
    color: white;
    padding: 0.3rem 1.2rem;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 1rem;
  }
  .hero h1 {
    font-family: 'Noto Serif Tamil', serif;
    color: var(--gold);
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .hero p { color: #FFC5A0; font-size: 0.95rem; }

  /* SCOREBOARD */
  .scoreboard {
    background: var(--dark);
    padding: 1rem 2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
    border-bottom: 2px solid var(--saffron);
    position: sticky; top: 0; z-index: 100;
  }
  .score-item { text-align: center; }
  .score-item .label { font-size: 0.7rem; color: #8B7355; text-transform: uppercase; letter-spacing: 1px; }
  .score-item .value { font-size: 1.5rem; font-weight: 900; }
  .score-item .value.correct { color: var(--green); }
  .score-item .value.wrong { color: var(--red); }
  .score-item .value.total { color: var(--gold); }
  .score-item .value.percentage { color: var(--saffron); }

  /* PROGRESS */
  .progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.1);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--saffron), var(--gold));
    transition: width 0.4s ease;
  }

  /* CONTAINER */
  .container { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* CATEGORY FILTER */
  .category-bar {
    display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem;
  }
  .cat-btn {
    padding: 0.4rem 1rem;
    border-radius: 50px;
    border: 2px solid var(--border);
    background: white;
    color: var(--mid);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans Tamil', sans-serif;
    transition: all 0.2s;
  }
  .cat-btn:hover, .cat-btn.active {
    background: var(--saffron);
    border-color: var(--saffron);
    color: white;
  }

  /* QUIZ CARD */
  .quiz-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(255,107,53,0.1);
    margin-bottom: 2rem;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    background: linear-gradient(135deg, var(--dark), var(--mid));
    padding: 1rem 1.5rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  .q-number { color: var(--gold); font-size: 0.85rem; font-weight: 700; }
  .q-category {
    background: rgba(255,107,53,0.3);
    color: #FFC5A0;
    padding: 0.2rem 0.8rem;
    border-radius: 20px;
    font-size: 0.75rem;
  }
  .q-difficulty {
    font-size: 0.75rem;
  }
  .diff-easy { color: #27AE60; }
  .diff-med { color: #F39C12; }
  .diff-hard { color: #E74C3C; }

  .card-body { padding: 1.5rem; }

  .question-text {
    font-family: 'Noto Serif Tamil', serif;
    font-size: 1.15rem;
    color: var(--dark);
    margin-bottom: 1.5rem;
    line-height: 1.8;
  }
  .question-text .word-highlight {
    background: #FFF3CD;
    border: 1px solid #F39C12;
    padding: 0.1rem 0.5rem;
    border-radius: 5px;
    font-weight: 700;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 0.8rem; }
  .option-btn {
    padding: 1rem 1.2rem;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: white;
    text-align: left;
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 0.8rem;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--saffron);
    background: #FFF3E0;
    transform: translateX(4px);
  }
  .option-btn .opt-label {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--border);
    color: var(--mid);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.8rem; flex-shrink: 0;
  }
  .option-btn.correct {
    border-color: var(--green);
    background: #E9F7EF;
    color: #1D6A3C;
  }
  .option-btn.correct .opt-label { background: var(--green); color: white; }
  .option-btn.wrong {
    border-color: var(--red);
    background: #FDEDEC;
    color: #922B21;
  }
  .option-btn.wrong .opt-label { background: var(--red); color: white; }
  .option-btn:disabled { cursor: default; }

  /* EXPLANATION */
  .explanation {
    display: none;
    margin-top: 1.2rem;
    padding: 1rem 1.2rem;
    background: linear-gradient(135deg, #EBF5FB, #D6EAF8);
    border-left: 4px solid #2E86C1;
    border-radius: 0 10px 10px 0;
    font-size: 0.9rem;
    line-height: 1.7;
  }
  .explanation.show { display: block; animation: slideDown 0.3s ease; }
  @keyframes slideDown {
    from { opacity: 0; max-height: 0; }
    to { opacity: 1; max-height: 300px; }
  }
  .explanation .exp-title { color: #1B4F72; font-weight: 700; margin-bottom: 0.4rem; }
  .explanation .rule-ref {
    display: inline-block;
    background: #2E86C1; color: white;
    padding: 0.15rem 0.6rem; border-radius: 4px;
    font-size: 0.75rem; margin-top: 0.4rem;
  }

  /* RESULT BADGE */
  .result-badge {
    display: none;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.95rem;
    margin-top: 1rem;
    text-align: center;
  }
  .result-badge.show { display: block; animation: bounce 0.5s; }
  @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
  .result-badge.correct { background: #E9F7EF; color: #1D6A3C; border: 2px solid var(--green); }
  .result-badge.wrong { background: #FDEDEC; color: #922B21; border: 2px solid var(--red); }

  /* NEXT BUTTON */
  .next-btn {
    display: none;
    width: 100%;
    padding: 1rem;
    margin-top: 1rem;
    background: linear-gradient(135deg, var(--saffron), var(--deep-saffron));
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }
  .next-btn.show { display: block; animation: fadeIn 0.3s ease; }

  /* COMPLETE SCREEN */
  .complete-screen {
    display: none;
    text-align: center;
    padding: 3rem 2rem;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(255,107,53,0.15);
  }
  .complete-screen.show { display: block; animation: fadeIn 0.5s ease; }
  .complete-icon { font-size: 5rem; margin-bottom: 1rem; }
  .complete-screen h2 {
    font-family: 'Noto Serif Tamil', serif;
    font-size: 2rem; color: var(--dark);
    margin-bottom: 0.5rem;
  }
  .complete-score { font-size: 4rem; font-weight: 900; color: var(--saffron); }
  .complete-msg { color: #8B7355; margin: 1rem 0 2rem; font-size: 1rem; }
  .restart-btn {
    background: linear-gradient(135deg, var(--saffron), var(--deep-saffron));
    color: white;
    border: none;
    padding: 1rem 2.5rem;
    border-radius: 50px;
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    margin: 0.5rem;
    transition: all 0.2s;
  }
  .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,107,53,0.4); }
  .restart-btn.secondary {
    background: white;
    color: var(--saffron);
    border: 2px solid var(--saffron);
  }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin: 1.5rem 0;
  }
  .stat-box {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .stat-box .sb-val { font-size: 2rem; font-weight: 900; }
  .stat-box .sb-label { font-size: 0.75rem; color: #8B7355; }
  .sb-green { color: var(--green); }
  .sb-red { color: var(--red); }
  .sb-blue { color: var(--blue); }

  /* TIMER */
  .timer-badge {
    background: rgba(255,107,53,0.15);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--saffron);
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .scoreboard { gap: 1rem; }
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .score-item .value { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">🎯 QUIZ PRACTICE</div>
  <h1>பிரித்து எழுதுதல் — புணர்ச்சி</h1>
  <p>TNPSC · TET · Police Exam · SI Exam Special Practice</p>
</div>

<div class="scoreboard">
  <div class="score-item">
    <div class="label">சரி</div>
    <div class="value correct" id="scoreCorrect">0</div>
  </div>
  <div class="score-item">
    <div class="label">தவறு</div>
    <div class="value wrong" id="scoreWrong">0</div>
  </div>
  <div class="score-item">
    <div class="label">மொத்தம்</div>
    <div class="value total" id="scoreTotal">0</div>
  </div>
  <div class="score-item">
    <div class="label">சதவீதம்</div>
    <div class="value percentage" id="scorePercent">0%</div>
  </div>
</div>
<div class="progress-bar">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="container">

  <div class="category-bar" id="catBar">
    <button class="cat-btn active" onclick="filterCat('all', this)">அனைத்தும்</button>
    <button class="cat-btn" onclick="filterCat('udambadu', this)">உடம்படுமெய்</button>
    <button class="cat-btn" onclick="filterCat('kurriyalugar', this)">குற்றியலுகரம்</button>
    <button class="cat-btn" onclick="filterCat('pannbu', this)">பண்புப்பெயர்</button>
    <button class="cat-btn" onclick="filterCat('vithi', this)">விதிகள்</button>
    <button class="cat-btn" onclick="filterCat('pirithhu', this)">பிரித்து எழுது</button>
    <button class="cat-btn" onclick="filterCat('seerthu', this)">சேர்த்து எழுது</button>
  </div>

  <div id="quizArea"></div>

  <div class="complete-screen" id="completeScreen">
    <div class="complete-icon" id="completeIcon">🏆</div>
    <h2 id="completeTitle">தேர்வு முடிந்தது!</h2>
    <div class="complete-score" id="completePct">0%</div>
    <div class="complete-msg" id="completeMsg">—</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="sb-val sb-green" id="finalCorrect">0</div>
        <div class="sb-label">சரியான விடைகள்</div>
      </div>
      <div class="stat-box">
        <div class="sb-val sb-red" id="finalWrong">0</div>
        <div class="sb-label">தவறான விடைகள்</div>
      </div>
      <div class="stat-box">
        <div class="sb-val sb-blue" id="finalTotal">0</div>
        <div class="sb-label">மொத்த கேள்விகள்</div>
      </div>
    </div>
    <button class="restart-btn" onclick="restartQuiz()">மீண்டும் தொடங்கு</button>
    <button class="restart-btn secondary" onclick="shuffleAndRestart()">புதிய வரிசை</button>
  </div>

</div>

<script>
const ALL_QUESTIONS = [
  // ======= UDAMBADU MEI (உடம்படுமெய்) =======
  {cat:'udambadu', diff:'easy', q:'மணி + அழகு = ?', opts:['மணிழகு','மணியழகு','மணிவழகு','மணியடி'], ans:1,
   exp:'"இ,ஈ,ஐ வழி யவ்வும்" — நிலைமொழி ஈறு இ ஆகையால் யகரம் உடம்படுமெய்யாக வரும்.', rule:'நன்னூல் 162'},

  {cat:'udambadu', diff:'easy', q:'தீ + எரி = ?', opts:['தீவெரி','தீயெரி','தீழெரி','தீஒரி'], ans:1,
   exp:'நிலைமொழி ஈறு "ஈ" ஆகையால் யகரம் (ய்) உடம்படுமெய்யாக வரும்.', rule:'நன்னூல் 162'},

  {cat:'udambadu', diff:'easy', q:'ஓடை + ஓரம் = ?', opts:['ஓடையோரம்','ஓடைவோரம்','ஓடைஓரம்','ஓடைழோரம்'], ans:0,
   exp:'நிலைமொழி ஈறு "ஐ" ஆகையால் யகரம் (ய்) உடம்படுமெய்யாக வரும். ஓடை + ய் + ஓரம் = ஓடையோரம்.', rule:'நன்னூல் 162'},

  {cat:'udambadu', diff:'medium', q:'பல + உயிர் = ?', opts:['பலவுயிர்','பலயுயிர்','பலவியர்','பலுயிர்'], ans:0,
   exp:'நிலைமொழி ஈறு "அ" — இ,ஈ,ஐ அல்ல — ஆகையால் வகரம் (வ்) உடம்படுமெய்யாக வரும்.', rule:'நன்னூல் 162'},

  {cat:'udambadu', diff:'medium', q:'பா + இனம் = ?', opts:['பாயினம்','பாவினம்','பாழினம்','பாவியம்'], ans:1,
   exp:'நிலைமொழி ஈறு "ஆ" — பிற உயிர் — ஆகையால் வகரம் (வ்) உடம்படுமெய்யாக வரும்.', rule:'நன்னூல் 162'},

  {cat:'udambadu', diff:'hard', q:'சே + அடி — இரு வடிவங்களும் எது?', opts:['சேயடி, சேவடி','சேழடி, சேவடி','சேயடி மட்டும்','சேவடி மட்டும்'], ans:0,
   exp:'நிலைமொழி ஈறு "ஏகாரம்" ஆகையால் யகரமும் வகரமும் இருமையும் வரும் — சேயடி, சேவடி.', rule:'நன்னூல் 162'},

  {cat:'udambadu', diff:'medium', q:'"குரு + அருள்" புணர்வதெப்படி?', opts:['குருவருள்','குரூவருள்','குருயருள்','குருவொருள்'], ans:0,
   exp:'நிலைமொழி ஈறு "உ" — பிற உயிர் — வகரம் (வ்) உடம்படுமெய்: குரு + வ் + அருள் = குருவருள்.', rule:'நன்னூல் 162'},

  {cat:'udambadu', diff:'hard', q:'குற்றியலுகரம் ஈறாக இருக்கும்போது உடம்படுமெய் விதி பொருந்துமா?', opts:['ஆம்','இல்லை','சில நேரம்','சூழ்நிலையைப் பொறுத்தது'], ans:1,
   exp:'நிலைமொழி இறுதியில் "உ" ஆக இருந்தும் குற்றியலுகரமாக இருப்பின் உடம்படுமெய் விதி பொருந்தாது.', rule:'நன்னூல் 162'},

  // ======= KURRIYALUGAR (குற்றியலுகரம்) =======
  {cat:'kurriyalugar', diff:'easy', q:'வட்டு + ஆடினான் = ?', opts:['வட்டூடினான்','வட்டாடினான்','வட்டிலினான்','வட்டொடினான்'], ans:1,
   exp:'"உயிர்வரின் உக்குறள் மெய்விட்டு ஓடும்" — வட்டு (ட்+உ); உகரம் மறைந்து ட் நின்று வருமொழி ஆ உடன் சேர்ந்தது.', rule:'நன்னூல் 164'},

  {cat:'kurriyalugar', diff:'medium', q:'கொக்கு + யாது = ?', opts:['கொக்கயாது','கொக்கியாது','கொக்கோயாது','கொக்குயாது'], ans:1,
   exp:'"யவ்வரின் இய்யாம்" — குற்றியலுகரம் யகர முதன்மொழியோடு புணரும்போது உகரம் இகரமாகத் திரியும். கு → கி.', rule:'நன்னூல் 164'},

  {cat:'kurriyalugar', diff:'medium', q:'வீடு + தோட்டம் = ?', opts:['வீடுதோட்டம்','வீட்டுத்தோட்டம்','வீட்டதோட்டம்','வீட்டோட்டம்'], ans:1,
   exp:'நெடில்தொடர் குற்றியலுகரம் + வல்லின முதல்: ஒற்று இரட்டித்து புணரும். வீடு → வீட்டு + தோட்டம்.', rule:'நன்னூல் 183'},

  {cat:'seerthu', diff:'easy', q:'"மணி + அடி" சேர்த்து எழுதுக', opts:['மணிட்','மணியடி','மணிவடி','மணிழடி'], ans:1,
   exp:'மணி (இ — உயிரீறு) + அடி (உயிர்முதல்): யகர உடம்படுமெய் தோன்றும் = மணி + ய் + அடி = மணியடி.', rule:'நன்னூல் 162'},

   exp:'வாழை + மரம் = வாழை மரம் (மெய்ம்முதல் வருமொழி — இயல்புப் புணர்ச்சி).', rule:'இயல்புப் புணர்ச்சி'},

  {cat:'seerthu', diff:'medium', q:'"வடக்கு + மேற்கு" சேர்த்து எழுதுக', opts:['வடக்குமேற்கு','வடமேற்கு','வடக்குமேல்','வடமேல்'], ans:1,
   exp:'திசைப்பெயர் புணர்ச்சி: ஈற்று (கு) + (க்) நீங்கி, வடக்கு → வட + மேற்கு = வடமேற்கு.', rule:'திசைப்பெயர் புணர்ச்சி'},

  {cat:'seerthu', diff:'medium', q:'"தெற்கு + கிழக்கு" சேர்த்து எழுதுக', opts:['தெற்கிழக்கு','தென்கிழக்கு','தெற்குகிழக்கு','தென்கிழக்கும்'], ans:1,
   exp:'திசைப்பெயர் புணர்ச்சி: ஈற்று (கு) நீங்கி, றகரம் னகரமாகத் திரிந்தது (ற் → ன்) = தென்கிழக்கு.', rule:'திசைப்பெயர் புணர்ச்சி'},

   exp:'"பூப்பெயர் முன் இனமென்மையுந்தோன்றும்" — வல்லினமும் மெல்லினமும் இரண்டும் மிகும். பூக்கொடி / பூங்கொடி.', rule:'நன்னூல் 200'},

  {cat:'seerthu', diff:'hard', q:'"பல + பல" சேர்த்து எழுதுக (மூன்று வடிவங்களும்)', opts:['பலபல மட்டும்','பலப்பல மட்டும்','பலபல, பலப்பல, பற்பல','பல்பல, பலப்பல மட்டும்'], ans:2,
   exp:'பல சில புணர்ச்சி: அ) இயல்பு = பலபல; ஆ) வல்லெழுத்து மிகுதல் = பலப்பல; இ) அகரம் கெட்டு றகரம் = பற்பல.', rule:'நன்னூல் 170'},

  {cat:'seerthu', diff:'medium', q:'"மண் + மகள்" சேர்த்து எழுதுக', opts:['மண்மகள்','மண்ணுமகள்','மட்மகள்','மன்மகள்'], ans:0,
   exp:'மண் + மகள் = மண்மகள் (நிலைமொழி இறுதி மெய் + வருமொழி முதல் மெய் — இயல்பாகப் புணர்ந்தது).', rule:'மெய்யீற்றுப் புணர்ச்சி'},

  {cat:'seerthu', diff:'hard', q:'"மா + பழம்" சேர்த்து எழுதுக', opts:['மாவழம்','மாபழம்','மாம்பழம்','மாங்பழம்'], ans:2,
   exp:'மரப்பெயர் (மா) + பழம்: மெல்லினம் மிகும் — மா + ம் + பழம் = மாம்பழம் (மெய்ம்மயக்கம்).', rule:'மெய்ம்மயக்கம்'},

  {cat:'seerthu', diff:'medium', q:'"பூ + சோலை" சேர்த்து எழுதுக (பொருத்தமான வடிவம்)', opts:['பூசோலை','பூச்சோலை மட்டும்','பூஞ்சோலை மட்டும்','பூச்சோலை அல்லது பூஞ்சோலை'], ans:3,
   exp:'"பூப்பெயர் முன் இனமென்மையுந்தோன்றும்" — பூச்சோலை, பூஞ்சோலை இரண்டும் சரி.', rule:'நன்னூல் 200'},
];

// State
let questions = [];
let currentIdx = 0;
let correct = 0, wrong = 0;
let currentCat = 'all';
let answered = false;

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  restartQuiz();
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initQuiz() {
  let pool = currentCat === 'all' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.cat === currentCat);
  questions = shuffleArray(pool);
  currentIdx = 0;
  correct = 0;
  wrong = 0;
  updateScore();
  document.getElementById('completeScreen').classList.remove('show');
  showQuestion();
}

function updateScore() {
  document.getElementById('scoreCorrect').textContent = correct;
  document.getElementById('scoreWrong').textContent = wrong;
  document.getElementById('scoreTotal').textContent = correct + wrong;
  const total = correct + wrong;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  document.getElementById('scorePercent').textContent = pct + '%';
  const progress = questions.length > 0 ? ((currentIdx) / questions.length) * 100 : 0;
  document.getElementById('progressFill').style.width = progress + '%';
}

function showQuestion() {
  answered = false;
  if (currentIdx >= questions.length) {
    showComplete();
    return;
  }
  const q = questions[currentIdx];
  const optLabels = ['அ','ஆ','இ','ஈ'];
  const diffMap = {easy: '<span class="diff-easy">● எளிது</span>', medium: '<span class="diff-med">●● நடுத்தரம்</span>', hard: '<span class="diff-hard">●●● கடினம்</span>'};
  const catNames = {udambadu:'உடம்படுமெய்', kurriyalugar:'குற்றியலுகரம்', pannbu:'பண்புப்பெயர்', vithi:'விதிகள்', pirithhu:'பிரித்து எழுது', seerthu:'சேர்த்து எழுது'};

  const html = `
    <div class="quiz-card" id="quizCard">
      <div class="card-header">
        <div class="q-number">கேள்வி ${currentIdx + 1} / ${questions.length}</div>
        <div class="q-category">${catNames[q.cat] || q.cat}</div>
        <div class="q-difficulty">${diffMap[q.diff]}</div>
      </div>
      <div class="card-body">
        <div class="question-text">${q.q}</div>
        <div class="options">
          ${q.opts.map((o, i) => `
            <button class="option-btn" onclick="selectAnswer(${i})" id="opt${i}">
              <span class="opt-label">${optLabels[i]}</span>
              <span>${o}</span>
            </button>
          `).join('')}
        </div>
        <div class="result-badge" id="resultBadge"></div>
        <div class="explanation" id="explanation">
          <div class="exp-title">📖 விளக்கம்:</div>
          ${q.exp}
          <span class="rule-ref">📜 ${q.rule}</span>
        </div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
          ${currentIdx + 1 < questions.length ? '→ அடுத்த கேள்வி' : '🏁 முடிவுகள் காண'}
        </button>
      </div>
    </div>
  `;
  document.getElementById('quizArea').innerHTML = html;
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[currentIdx];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = idx === q.ans;
  if (isCorrect) {
    correct++;
    btns[idx].classList.add('correct');
  } else {
    wrong++;
    btns[idx].classList.add('wrong');
    btns[q.ans].classList.add('correct');
  }

  updateScore();

  const badge = document.getElementById('resultBadge');
  badge.textContent = isCorrect ? '✅ சரியான விடை! மிகவும் நல்லது!' : '❌ தவறான விடை. சரியான விடை கவனி!';
  badge.className = 'result-badge show ' + (isCorrect ? 'correct' : 'wrong');

  document.getElementById('explanation').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentIdx++;
  updateScore();
  showQuestion();
}

function showComplete() {
  document.getElementById('quizArea').innerHTML = '';
  const pct = questions.length > 0 ? Math.round((correct / questions.length) * 100) : 0;
  let icon = '🏆', title = 'அருமை!', msg = '';
  if (pct >= 90) { icon = '🥇'; title = 'தங்கப் பதக்கம்!'; msg = 'நீங்கள் தேர்ந்த மாணவர்! தேர்வில் வெற்றி நிச்சயம்!'; }
  else if (pct >= 75) { icon = '🥈'; title = 'மிகவும் நல்லது!'; msg = 'கொஞ்சம் மேலும் படிக்கவும். வெற்றி உங்கள் பக்கம்!'; }
  else if (pct >= 50) { icon = '📚'; title = 'நல்ல முயற்சி!'; msg = 'மேலும் கவனமாகப் படிக்கவும். நீங்கள் முன்னேறுகிறீர்கள்!'; }
  else { icon = '💪'; title = 'மேலும் முயற்சி செய்யுங்கள்!'; msg = 'விடாமல் படியுங்கள். விதிகளை மீண்டும் படிக்கவும்!'; }

  document.getElementById('completeIcon').textContent = icon;
  document.getElementById('completeTitle').textContent = title;
  document.getElementById('completePct').textContent = pct + '%';
  document.getElementById('completeMsg').textContent = msg;
  document.getElementById('finalCorrect').textContent = correct;
  document.getElementById('finalWrong').textContent = wrong;
  document.getElementById('finalTotal').textContent = questions.length;

  document.getElementById('completeScreen').classList.add('show');
  document.getElementById('progressFill').style.width = '100%';
}

function restartQuiz() {
  initQuiz();
}

function shuffleAndRestart() {
  initQuiz();
}

// Start
initQuiz();
</script>
